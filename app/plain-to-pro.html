<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b1408">
  <link rel="stylesheet" href="./styles.css">
  <title>白话转专业语言</title>
</head>
<body class="prompt-page">
  <main class="prompt-app">
    <header class="keyword-topbar">
      <div>
        <p class="eyebrow">文案提示词专业术语</p>
        <h1>白话转专业语言</h1>
        <p>输入自己的大白话需求和目标内容，生成中文与英文专业表达。</p>
      </div>
      <button class="theme-toggle" type="button" aria-label="切换白天和暗色模式" data-theme-toggle>
        <span data-theme-icon>☾</span>
        <span data-theme-label>暗色</span>
      </button>
    </header>

    <section class="prompt-workspace">
      <section class="prompt-input-card">
        <label class="prompt-field">
          <span>大白话提问</span>
          <textarea placeholder="例如：我想让这款面霜看起来更高级一点，突出补水、温和、不油腻。"></textarea>
        </label>

        <label class="prompt-field compact">
          <span>想要的内容</span>
          <textarea placeholder="例如：小红书标题、电商详情页卖点、品牌介绍、海报主文案。"></textarea>
        </label>

        <div>
          <span class="mini-label">分类</span>
          <div class="keyword-option-grid four-options">
            <button class="option active" type="button">文案</button>
            <button class="option" type="button">市场部</button>
            <button class="option" type="button">品牌部</button>
            <button class="option" type="button">电商部</button>
          </div>
        </div>

        <div>
          <span class="mini-label">模型选择</span>
          <div class="keyword-option-grid">
            <button class="option active" type="button">GPT</button>
            <button class="option" type="button">Claude</button>
            <button class="option" type="button">Gemini</button>
          </div>
        </div>

        <button class="primary generate-button" type="button">生成</button>
      </section>

      <aside class="prompt-result-card">
        <div class="result-header">
          <div>
            <h2>生成结果</h2>
            <p>右上角可单独复制每种语言。</p>
          </div>
          <span class="status-pill">待生成</span>
        </div>

        <div class="prompt-result-grid">
          <div class="result-pane copy-pane">
            <div class="pane-title"><h3>中文结果</h3><button class="secondary mini-copy" type="button">复制</button></div>
            <div class="result-box compact-result">等待生成中文专业表达。</div>
          </div>
          <div class="result-pane copy-pane">
            <div class="pane-title"><h3>English Result</h3><button class="secondary mini-copy" type="button">复制</button></div>
            <div class="result-box compact-result">Waiting for English professional copy.</div>
          </div>
        </div>

        <button class="primary" type="button">下载TXT文档</button>
      </aside>
    </section>
  </main>

  <script src="./local-cache.js"></script>
  <script src="./workflow.js"></script>
</body>
</html>
