      seedCanvas();
      renderProjects();
      if (!projectHubPinned) projectHub.classList.remove("open");
      showToast("已新建项目");
    }

    function blobToDataUrl(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(reader.error || new Error("文件读取失败"));
        reader.readAsDataURL(blob);
      });
    }

    async function portableProjectMedia(value) {
      if (typeof value !== "string" || !value) return value || "";
      const resolved = await getLocalMedia(value);
      if (!resolved || resolved.startsWith("data:")) return resolved;
      try {
        const blob = await sourceToBlob(resolved);
        return blob ? await blobToDataUrl(blob) : resolved;
      } catch (error) {
        console.warn("Project media export kept original source", error);
        return resolved;
      }
    }

    async function serializeNodeForProjectExport(node) {
      const copy = JSON.parse(JSON.stringify(node));
      copy.mediaUrl = await portableProjectMedia(copy.mediaUrl);
      copy.previewUrl = await portableProjectMedia(copy.previewUrl);
      copy.fullUrl = await portableProjectMedia(copy.fullUrl);
      if (Array.isArray(copy.references)) {
        copy.references = await Promise.all(copy.references.map(async (item) => ({
          ...item,
          url: await portableProjectMedia(item.url)
        })));
      }
      return copy;
    }

    function safeProjectExportName(name) {
      return String(name || "wandou-project").replace(/[\\/:*?"<>|]/g, "-").trim() || "wandou-project";
    }

    async function exportCurrentProject() {
      const project = projects.find((item) => item.id === activeProjectId);
      if (!project) return;
      exportProjectButton.disabled = true;
      showToast("正在整理项目文件...");
      try {
        await saveCanvasState();
        const cleanNodes = nodesWithoutRemovedTypes();
        const cleanIds = new Set(cleanNodes.map((node) => node.id));
        const payload = {
          format: "wandou-node-project",
          version: 1,
          exportedAt: new Date().toISOString(),
          project: {
            name: project.name,
            color: project.color,
            createdAt: project.createdAt,
            updatedAt: project.updatedAt,
            favorite: Boolean(project.favorite)
          },
          canvas: {
            nodes: await Promise.all(cleanNodes.map(serializeNodeForProjectExport)),
            links: links.filter((link) => cleanIds.has(link.from) && cleanIds.has(link.to)),
            nodeId,
            view
          }
        };
        const blob = new Blob([JSON.stringify(payload)], { type: "application/json;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = `${safeProjectExportName(project.name)}.wandou-project.json`;
        anchor.click();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        showToast("项目已导出");
      } catch (error) {
        console.error("Project export failed", error);
        showToast("项目导出失败，请重试");
      } finally {
        exportProjectButton.disabled = false;
      }
    }

    async function importProjectFile(file) {
      if (!file) return;
      if (projects.length >= 30) {
        showToast("最多只能保留 30 个项目");
        return;
      }
      importProjectButton.disabled = true;
      try {
        const payload = JSON.parse(await file.text());
        if (payload?.format !== "wandou-node-project" || !Array.isArray(payload?.canvas?.nodes) || !Array.isArray(payload?.canvas?.links)) {
          throw new Error("Unsupported project file");
        }
        await saveCanvasState();
        const now = Date.now();
        const importedProject = {
          id: `project-${now}`,
          name: String(payload.project?.name || file.name.replace(/\.wandou-project\.json$|\.json$/i, "") || "导入项目").slice(0, 80),
          color: payload.project?.color || projectColorPalette[projects.length % projectColorPalette.length],
          createdAt: Number(payload.project?.createdAt) || now,
          updatedAt: now,
          favorite: Boolean(payload.project?.favorite)
        };
        projects.push(importedProject);
        activeProjectId = importedProject.id;
        nodes = payload.canvas.nodes;
        links = payload.canvas.links;
        nodeId = Math.max(Number(payload.canvas.nodeId) || 1, ...nodes.map((node) => Number(node.id) || 0)) + 1;
        view = payload.canvas.view && Number.isFinite(payload.canvas.view.scale) ? payload.canvas.view : view;
        selectedNodeId = null;
        historyStack = [];
        redoStack = [];
        removeDeprecatedSelectionNodes();
        await Promise.all(nodes.map(cleanLoadedNode));
        pruneBrokenLinks();
        saveProjects();
        await saveCanvasState();
        renderProjects();
        render();
        if (!projectHubPinned) projectHub.classList.remove("open");
        showToast("项目已导入");
      } catch (error) {
        console.error("Project import failed", error);
        showToast("项目文件无效或已损坏");
      } finally {
        importProjectButton.disabled = false;
        projectImportInput.value = "";
      }
    }

    function getCanvasSnapshot() {
      const cleanNodes = nodesWithoutRemovedTypes();
      const cleanIds = new Set(cleanNodes.map((node) => node.id));
      return JSON.stringify({
        nodes: cleanNodes.map(serializeNodeForHistory),
        links: links.filter((link) => cleanIds.has(link.from) && cleanIds.has(link.to)),
        nodeId,
        view
      });
    }

    function serializeNodeForHistory(node) {
      const copy = JSON.parse(JSON.stringify(node));
      return compactNodeMediaForSnapshot(copy);
    }

    function queueLargeMediaPersist(value) {
      const id = mediaStorageId(value);
      if (!pendingHistoryMediaPersistIds.has(id)) {
        pendingHistoryMediaPersistIds.add(id);
        putLocalMedia(value).finally(() => pendingHistoryMediaPersistIds.delete(id));
      }
      return `${localMediaPrefix}${id}`;
    }

    function compactMediaForSnapshot(value) {
      if (!isLargeDataUrl(value, largeMediaDataUrlLimit)) return value;
      return queueLargeMediaPersist(value);
    }

    function compactNodeMediaForSnapshot(copy) {
      copy.mediaUrl = compactMediaForSnapshot(copy.mediaUrl);
      copy.previewUrl = compactMediaForSnapshot(copy.previewUrl);
      copy.fullUrl = compactMediaForSnapshot(copy.fullUrl);
      if (Array.isArray(copy.references)) {
        copy.references = copy.references.map((item) => ({
          ...item,
          url: compactMediaForSnapshot(item.url)
        }));
      }
      return copy;
    }

    function parseCanvasSnapshot(snapshot) {
      const state = JSON.parse(snapshot);
      if (!Array.isArray(state.nodes)) throw new Error("Invalid canvas snapshot");
      state.nodes = state.nodes.filter((node) => node && node.id && node.type);
      if (!state.nodes.length) throw new Error("Empty canvas snapshot");
      if (!Array.isArray(state.links)) state.links = [];
      return state;
    }

    function isUsableCanvasSnapshot(snapshot) {
      try {
        parseCanvasSnapshot(snapshot);
        return true;
      } catch (error) {
        return false;
      }
    }

    async function applyCanvasSnapshot(snapshot) {
      const state = parseCanvasSnapshot(snapshot);
      isApplyingHistory = true;
      try {
        nodes = Array.isArray(state.nodes) ? state.nodes : [];
        removeDeprecatedSelectionNodes();
        await Promise.all(nodes.map(cleanLoadedNode));
        links = Array.isArray(state.links) ? state.links : [];
        pruneBrokenLinks();
        nodeId = Number(state.nodeId) || 1;
        view = state.view || view;
        selectedNodeId = null;
        render();
        syncDeletedResultsWithCanvas();
      } finally {
        isApplyingHistory = false;
      }
      scheduleCanvasSave();
    }

    function pushHistorySnapshot(snapshot) {
      if (isApplyingHistory || isRestoring) return;
      if (!isUsableCanvasSnapshot(snapshot)) return;
      if (historyStack[historyStack.length - 1] === snapshot) return;
      historyStack.push(snapshot);
      if (historyStack.length > historyStackLimit) historyStack.shift();
      redoStack = [];
    }

    function pushHistory() {
      pushHistorySnapshot(getCanvasSnapshot());
    }

    async function undoCanvas() {
      const current = getCanvasSnapshot();
      while (historyStack.length) {
        const snapshot = historyStack.pop();
        if (!isUsableCanvasSnapshot(snapshot)) continue;
        redoStack.push(current);
        await applyCanvasSnapshot(snapshot);
        return;
      }
    }

    async function redoCanvas() {
      const current = getCanvasSnapshot();
      while (redoStack.length) {
        const snapshot = redoStack.pop();
        if (!isUsableCanvasSnapshot(snapshot)) continue;
        historyStack.push(current);
        await applyCanvasSnapshot(snapshot);
        return;
      }
    }

    function createNode(type, x, y, extra = {}) {
      pushHistory();
      const id = `node-${nodeId++}`;
      const base = {
        id,
        type,
        x,
        y,
        title: nodeTitle(type),
        prompt: type === "keyword" ? defaultKeywordPrompt : type === "png" ? "请只抠出上传原图里的主体，移除背景并输出透明底 PNG，不要重绘、不要美化、不要改变人物/产品/文字/Logo/衣服/姿势/构图。" : type === "upscale" ? "将输入图片无损放大到 4K，保持原图构图、比例、文字、Logo、人物和产品细节不变，只增强清晰度与纹理细节。" : type === "generator" || type === "video" ? defaultPrompt : "",
        model: type === "video" ? videoPrimaryModel : type === "keyword" ? "GPT" : "GPT-image-2",
        promptFormat: "paragraph",
        promptReverseMode: type === "keyword" ? "image" : "",
        negativePrompt: "",
        ratio: type === "video" ? "9:16 竖屏" : "Auto自适应",
        resolution: type === "video" ? "720P" : type === "upscale" ? "4K" : "1K",
        count: 1,
        duration: type === "video" ? "default" : "5s",
        videoMode: type === "video" ? "text" : "",
        mediaUrl: "",
        references: [],
        mediaType: type === "video" ? "video" : "image",
        transparent: type === "png",
        favorite: false,
        pending: false,
        elapsed: 0,
        status: "",
        ...extra
      };
      nodes.push(base);
      render();
      return base;
    }

    function nodeTitle(type) {
      if (type === "generator") return "AI文字绘图";
      if (type === "video") return "AI视频";
      if (type === "keyword") return "反推/生成提示词";
      if (type === "png") return "PNG/透明底工作流";
      if (type === "upscale") return "4K放大";
      if (type === "result") return "效果图";
      if (type === "selection") return "选区";
      return "参考图";
    }

    function iconFor(type) {
      if (type === "video") return "▶";
      if (type === "keyword") return "#";
      if (type === "png") return "◫";
      if (type === "upscale") return "4K";
      if (type === "generator") return "✦";
      if (type === "result") return "↓";
      return "▣";
    }

    function render() {
      [...canvas.querySelectorAll(".node")].forEach((node) => node.remove());
      nodes.forEach((node) => {
        const nodeEl = renderNode(node);
        canvas.appendChild(nodeEl);
        stabilizeMountedNode(nodeEl, node);
      });
      syncPromptOverlayLayers();
      applyCanvasTransform();
      updatePendingPort();
      scheduleDrawLinks();
      scheduleCanvasSave();
    }

    function stabilizeMountedNode(nodeEl, node) {
      requestAnimationFrame(() => {
        nodeEl.querySelectorAll("textarea[data-autogrow]").forEach((field) => {
          autoGrowTextarea(field);
          if (field.dataset.field === "prompt") {
            const height = Math.ceil(field.getBoundingClientRect().height);
            if (height && node.promptHeight !== height) {
              node.promptHeight = height;
              scheduleCanvasSave();
            }
          }
        });
      });
    }

    function applyCanvasTransform() {
      canvas.style.transform = `translate3d(${view.x}px, ${view.y}px, 0) scale(${view.zoom})`;
      zoomValue.textContent = `${Math.round(view.zoom * 100)}%`;
      canvasWrap.classList.toggle("low-detail", view.zoom < 0.2);
      updatePromptLibraryPosition();
    }

    function scheduleCanvasTransform() {
      if (canvasTransformFrame) return;
      canvasTransformFrame = requestAnimationFrame(() => {
        canvasTransformFrame = null;
        applyCanvasTransform();
      });
    }

      function scheduleDrawLinks() {
        if (linkDrawFrame) return;
        linkDrawFrame = requestAnimationFrame(() => {
          linkDrawFrame = null;
          drawLinks();
        });
      }

      function markZoomInteraction() {
        canvasWrap.classList.add("is-zooming");
        clearTimeout(zoomInteractionTimer);
        zoomInteractionTimer = setTimeout(() => {
          canvasWrap.classList.remove("is-zooming");
        }, 140);
      }

    function screenToWorld(clientX, clientY) {
      const rect = canvasWrap.getBoundingClientRect();
      return {
        x: (clientX - rect.left - view.x) / view.zoom,
        y: (clientY - rect.top - view.y) / view.zoom
      };
    }

    function clientToCanvas(clientX, clientY) {
      const rect = canvasWrap.getBoundingClientRect();
      return {
        x: clientX - rect.left,
        y: clientY - rect.top
      };
    }

    function positionCanvasOverlay(element, clientX, clientY) {
      const point = clientToCanvas(clientX, clientY);
      element.style.left = `${point.x}px`;
      element.style.top = `${point.y}px`;
    }

    function addNodeInView(type) {
      const rect = canvasWrap.getBoundingClientRect();
      const world = screenToWorld(rect.left + rect.width / 2, rect.top + rect.height / 2);
      const offset = nodes.length * 18;
      return createNode(type, world.x - 180 + offset, world.y - 90 + offset);
    }

    function updateSelection() {
      canvas.querySelectorAll(".node").forEach((nodeEl) => {
        nodeEl.classList.toggle("selected", nodeEl.dataset.id === selectedNodeId);
      });
    }

    function centerOnNode(id) {
      const node = nodes.find((item) => item.id === id);
      if (!node) return;
      const rect = canvasWrap.getBoundingClientRect();
      view.x = rect.width / 2 - (node.x + nodeWidth(node) / 2) * view.zoom;
      view.y = rect.height / 2 - (node.y + 180) * view.zoom;
      selectedNodeId = id;
      applyCanvasTransform();
      updateSelection();
      drawLinks();
    }

    function renderNode(node) {
      const el = document.createElement("section");
      el.className = `node ${node.type}${selectedNodeId === node.id ? " selected" : ""}${boxSelectedIds.includes(node.id) ? " box-selected" : ""}`;
      el.dataset.id = node.id;
      el.style.left = `${node.x}px`;
      el.style.top = `${node.y}px`;
      if (node.frameWidth) el.style.width = `${node.frameWidth}px`;
      if (node.frameHeight) el.style.minHeight = `${node.frameHeight}px`;
      const pngRef = node.type === "png" ? normalizeReferences(node).find((item) => item.width && item.height) : null;
      el.style.setProperty("--preview-ratio", pngRef ? `${pngRef.width} / ${pngRef.height}` : cssAspectRatio(node.ratio));
      const isSelection = node.type === "selection";

      el.innerHTML = `
        ${isSelection ? "" : '<div class="port in" data-port="in" title="输入"></div><div class="port out" data-port="out" title="输出"></div>'}
        <div class="node-header" data-drag-handle>
          <div class="node-title"><span class="node-icon">${iconFor(node.type)}</span>${node.title}</div>
          <div class="node-menu">
            ${node.type === "generator" ? `<button class="favorite-button prompt-library-trigger" data-prompt-library type="button" title="提示词" aria-label="提示词">
              <svg class="prompt-bookmark-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3.5h12v17l-6-3.6-6 3.6v-17Z"/><text x="12" y="13.2">文</text></svg>
            </button>` : (!isSelection && node.type !== "image" ? `<button class="favorite-button ${node.favorite ? "active" : ""}" data-favorite type="button" title="收藏">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 3 2.7 5.5 6.1.9-4.4 4.3 1 6.1L12 17l-5.4 2.8 1-6.1-4.4-4.3 6.1-.9L12 3Z"/></svg>
            </button>` : "")}
            ${isSelection ? "" : `<button class="mini ghost" data-duplicate type="button">复制</button>`}
            <button class="mini danger" data-delete type="button" title="删除">
              <svg class="delete-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path fill="currentColor" d="M9 3h6l1 2h4v2H4V5h4l1-2Zm1 6h2v9h-2V9Zm4 0h2v9h-2V9ZM7 9h2l1 11h4l1-11h2l-1.2 13H8.2L7 9Z"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="node-body"></div>
        ${!isSelection && (node.type === "generator" || node.type === "video" || node.type === "keyword" || node.type === "png" || node.type === "upscale") ? '<div class="node-resize" data-resize-handle title="拖动缩放节点"></div>' : ''}
      `;

      const body = el.querySelector(".node-body");
      if (node.type === "keyword") {
        body.appendChild(renderPromptReverseBody(node));
      } else if (node.type === "png") {
        body.appendChild(renderPngWorkflowBody(node));
      } else if (node.type === "upscale") {
        body.appendChild(renderUpscaleBody(node));
      } else if (node.type === "generator" || node.type === "video") {
        body.appendChild(renderGeneratorBody(node));
      } else if (node.type === "selection") {
        body.innerHTML = "";
      } else {
        body.appendChild(renderMediaBody(node));
      }

      el.addEventListener("pointerdown", () => {
        activePasteNodeId = node.id;
        if (node.type === "image") {
          selectedNodeId = node.id;
          updateSelection();
        }
      }, { capture: true });

      el.addEventListener("pointerdown", (event) => {
        if (isInteractiveTarget(event.target)) return;
        startDrag(event, node.id);
      });

      el.querySelectorAll("button, input, textarea, select, label, [data-resize-handle]").forEach((control) => {
        control.addEventListener("pointerdown", (event) => event.stopPropagation());
      });
      el.querySelectorAll("[data-favorite]").forEach((fav) => fav.addEventListener("click", (event) => {
          event.stopPropagation();
          pushHistory();
          node.favorite = !node.favorite;
          scheduleCanvasSave();
          render();
        }));
      el.querySelectorAll("[data-prompt-library]").forEach((button) => button.addEventListener("click", (event) => {
          event.stopPropagation();
          openPromptLibrary(node.id);
        }));
      const titleEl = el.querySelector(".node-title");
      if (node.type === "selection" && titleEl) {
        titleEl.addEventListener("dblclick", (event) => {
          event.stopPropagation();
          const next = window.prompt("修改选区名称", node.title || "选区");
          if (next === null) return;
          pushHistory();
          node.title = next.trim() || "选区";
          render();
        });
      }

      const resizeHandle = el.querySelector("[data-resize-handle]");
      if (resizeHandle) {
        resizeHandle.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          event.stopPropagation();
          beginResize(event, node.id, el);
        });
      }

      el.querySelector("[data-delete]").addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        deleteNode(node.id);
      });

      el.querySelector("[data-duplicate]").addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        createNode(node.type, node.x + 36, node.y + 36, {
          prompt: node.prompt,
          model: node.model,
          ratio: node.ratio,
          resolution: node.resolution,
          mediaUrl: node.mediaUrl,
          references: cloneReferences(node.references),
          mediaType: node.mediaType,
          transparent: node.transparent,
          frameWidth: node.frameWidth,
          frameHeight: node.frameHeight,
          text: node.text || "",
          promptFormat: node.promptFormat,
          negativePrompt: node.negativePrompt
        });
      });

      el.querySelectorAll(".port").forEach((port) => {
        port.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          event.stopPropagation();
          if (port.dataset.port === "out") {
            beginPortDrag(event, node.id);
          }
        });
        port.addEventListener("pointerup", (event) => {
          event.preventDefault();
          event.stopPropagation();
          finishPortDrag(node.id, port.dataset.port, event);
        });
        port.addEventListener("click", (event) => {
          event.stopPropagation();
          handlePortClick(node.id, port.dataset.port);
        });
      });

      return el;
    }

    function refreshRenderedNode(id) {
      const node = nodes.find((item) => item.id === id);
      const current = canvas.querySelector(`[data-id="${id}"]`);
      if (!node || !current) return;
      current.replaceWith(renderNode(node));
      scheduleDrawLinks();
    }

    function isInteractiveTarget(target) {
      return Boolean(target.closest("button, input, textarea, select, label, .port, video, img, .preview, .thumb, [data-resize-handle]"));
    }

    function renderPromptReverseBody(node) {
      const wrap = document.createElement("div");
      if (!promptModelOptions.includes(node.model)) node.model = "GPT";
      if (!node.promptFormat) node.promptFormat = "paragraph";
      if (!["image", "text"].includes(node.promptReverseMode)) node.promptReverseMode = "image";
      const modelButtons = promptModelOptions.map((model) => (
        `<button class="choice-option ${node.model === model ? "active" : ""}" data-prompt-model="${model}" type="button">${model}</button>`
      )).join("");
      const modeButtons = [
        ["image", "图片反推"],
        ["text", "文字反推生成"]
      ].map(([value, label]) => (
        `<button class="choice-option ${node.promptReverseMode === value ? "active" : ""}" data-prompt-reverse-mode="${value}" type="button">${label}</button>`
      )).join("");
      const output = parsePromptOutput(node.text || "");
      wrap.innerHTML = `
        ${node.promptReverseMode === "image" ? `
        <div class="field">
          <div class="upload-box" data-prompt-drop>
            ${renderPromptReferenceGallery(node)}
            <label class="add-thumb">+
              <input data-upload type="file" accept="image/*" multiple hidden>
            </label>
          </div>
        </div>` : `
        <div class="field">
          <textarea class="prompt-textarea" data-field="prompt" data-autogrow placeholder="输入文字需求，例如：帮我生成适合商业海报的中英文绘图提示词">${node.prompt || ""}</textarea>
        </div>`}
        <div class="form-row">
          <label>反推模式</label>
          <div class="choice-options">${modeButtons}</div>
        </div>
        <div class="form-row">
          <label>模型</label>
          <div class="choice-options">${modelButtons}</div>
        </div>
        <div class="form-row">
          <label>文本提示词</label>
          <div class="choice-options">
            <button class="choice-option ${node.promptFormat === "paragraph" ? "active" : ""}" data-prompt-format="paragraph" type="button">段落</button>
            <button class="choice-option ${node.promptFormat === "sentence" ? "active" : ""}" data-prompt-format="sentence" type="button">整句</button>
          </div>
        </div>
        <button data-generate class="wide-button" type="button">${node.promptReverseMode === "image" ? "提取提示词" : "生成提示词"}</button>
        <div class="prompt-output">
          <div class="prompt-output-head prompt-output-title">
            <label>提示词结果</label>
            <div class="prompt-tools">
              <button class="mini ghost" data-prompt-favorite-text type="button">${node.favorite ? "已收藏" : "收藏"}</button>
              <button class="mini ghost" data-prompt-preview-all type="button">放大查看</button>
            </div>
          </div>
          <div class="prompt-output-head">
            <label>中文提示词</label>
            <div class="prompt-tools">
              <button class="mini ghost" data-prompt-copy="zh" type="button">复制</button>
              <button class="mini ghost" data-prompt-download="zh" type="button">下载</button>
            </div>
          </div>
          <textarea data-prompt-output="zh" data-autogrow readonly placeholder="提取后显示中文提示词">${output.zh}</textarea>
          <div class="prompt-output-head">
            <label>英文提示词</label>
            <div class="prompt-tools">
              <button class="mini ghost" data-prompt-copy="en" type="button">复制</button>
              <button class="mini ghost" data-prompt-download="en" type="button">下载</button>
            </div>
          </div>
          <textarea data-prompt-output="en" data-autogrow readonly placeholder="提取后显示英文提示词">${output.en}</textarea>
        </div>
        <div class="status">${node.status || (node.promptReverseMode === "image" ? "连接参考图后，选择模型提取中英文提示词。" : "输入文字需求后，选择模型生成中英文提示词。")}</div>
      `;
      bindFields(wrap, node);
      wrap.querySelectorAll("[data-prompt-reverse-mode]").forEach((button) => {
        button.addEventListener("click", () => {
          pushHistory();
          node.promptReverseMode = button.dataset.promptReverseMode;
          node.status = "";
          render();
        });
      });
      wrap.querySelectorAll("[data-prompt-model]").forEach((button) => {
        button.addEventListener("click", () => {
          pushHistory();
          node.model = button.dataset.promptModel;
          render();
        });
      });
      wrap.querySelectorAll("[data-prompt-format]").forEach((button) => {
        button.addEventListener("click", () => {
          pushHistory();
          node.promptFormat = button.dataset.promptFormat;
          render();
        });
      });
      const upload = wrap.querySelector("[data-upload]");
      if (upload) upload.addEventListener("change", async (event) => {
        pushHistory();
        const addedCount = await addFilesToNode(node, event.target.files);
        if (!addedCount) {
          event.target.value = "";
          render();
          return;
        }
        node.status = "参考素材已上传。";
        event.target.value = "";
        render();
      });
      const promptDrop = wrap.querySelector("[data-prompt-drop]");
      if (promptDrop) {
        promptDrop.addEventListener("dragover", (event) => {
          if (!hasImageFiles(event.dataTransfer?.items || event.dataTransfer?.files)) return;
          event.preventDefault();
          promptDrop.classList.add("drop-ready");
        });
        promptDrop.addEventListener("dragleave", () => promptDrop.classList.remove("drop-ready"));
        promptDrop.addEventListener("drop", async (event) => {
          const files = Array.from(event.dataTransfer?.files || []).filter(isImageFile);
          if (!files.length) return;
          event.preventDefault();
          event.stopPropagation();
          promptDrop.classList.remove("drop-ready");
          pushHistory();
          await addFilesToNode(node, files);
          node.status = `已拖入并压缩 ${files.length} 张参考图。`;
          render();
        });
      }
      wrap.querySelectorAll("[data-prompt-copy]").forEach((button) => {
        button.addEventListener("click", () => copyPromptText(output[button.dataset.promptCopy] || ""));
      });
      wrap.querySelectorAll("[data-prompt-download]").forEach((button) => {
        button.addEventListener("click", () => downloadPromptText(output[button.dataset.promptDownload] || "", button.dataset.promptDownload));
      });
      const previewAll = wrap.querySelector("[data-prompt-preview-all]");
      if (previewAll) previewAll.addEventListener("click", () => openPromptPreview(output.zh || "", output.en || "", ""));
      const favoriteText = wrap.querySelector("[data-prompt-favorite-text]");
      if (favoriteText) favoriteText.addEventListener("click", () => {
        const hasText = Boolean((output.zh || output.en || node.text || "").trim());
        if (!hasText) {
          showToast("还没有可收藏的提示词文字");
          return;
        }
        pushHistory();
        node.favorite = !node.favorite;
        node.mediaType = "text";
        scheduleCanvasSave();
        render();
        showToast(node.favorite ? "提示词已收藏" : "已取消收藏");
      });
      wrap.querySelectorAll("[data-ref-index]").forEach((thumb) => {
        thumb.addEventListener("click", (event) => {
          if (event.target.closest("button")) return;
          const ref = normalizeReferences(node)[Number(thumb.dataset.refIndex)];
          if (ref?.url) openLightbox(ref.url, { mode: "paint", nodeId: node.id, refIndex: Number(thumb.dataset.refIndex) });
        });
        thumb.addEventListener("dragstart", (event) => {
          event.dataTransfer.effectAllowed = "move";
          event.dataTransfer.setData("text/plain", thumb.dataset.refIndex);
        });
        thumb.addEventListener("dragover", (event) => event.preventDefault());
        thumb.addEventListener("drop", (event) => {
          if (event.dataTransfer?.files?.length) return;
          event.preventDefault();
          reorderReference(node, Number(event.dataTransfer.getData("text/plain")), Number(thumb.dataset.refIndex));
        });
      });
      wrap.querySelectorAll("[data-remove-ref]").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          removeReference(node, Number(button.dataset.removeRef));
        });
      });
      wrap.querySelector("[data-generate]").addEventListener("click", () => generateFromNode(node.id));
      wrap.querySelector("[data-prompt-refine-open]")?.addEventListener("click", () => {
        closePromptLibrary();
        node.promptRefineOpen = !node.promptRefineOpen;
        render();
      });
      wrap.querySelector("[data-prompt-refine-close]")?.addEventListener("click", () => {
        node.promptRefineOpen = false;
        render();
      });
      wrap.querySelectorAll("[data-prompt-refine-model]").forEach((button) => button.addEventListener("click", () => {
        node.promptRefineModel = button.dataset.promptRefineModel;
        render();
      }));
      wrap.querySelector("[data-prompt-refine-run]")?.addEventListener("click", () => refineNodePrompt(node));
      wrap.querySelector("[data-prompt-refine-apply]")?.addEventListener("click", () => {
        if (!node.promptRefineResult) return;
        pushHistory();
        node.prompt = node.promptRefineResult;
        node.promptRefineOpen = false;
        render();
      });
      autoGrowTextareas(wrap);
      return wrap;
    }

    function keywordPresetItems() {
      let custom = [];
      let edits = {};
      try {
        custom = JSON.parse(localStorage.getItem("aiCanvasCustomKeywordPresets") || "[]");
      } catch (error) {
        custom = [];
      }
      try {
        edits = JSON.parse(localStorage.getItem("aiCanvasPromptPresetEdits") || "{}");
      } catch (error) {
        edits = {};
      }
      const builtIns = builtInKeywordPresets.map((item) => ({ ...item, ...(edits[item.name] || {}), _key: item.name, _source: "builtin" }));
      const customs = custom.map((item, index) => ({ ...item, _key: `custom:${index}`, _source: "custom" })).filter((item) => item?.name && item?.text);
      return [...builtIns, ...customs];
    }

    function promptItemTag(item) {
      return String(item.tag || item.name || "其他").replace(/^#/, "");
    }

    function promptLibraryTarget() {
      return nodes.find((node) => node.id === activePromptLibraryNodeId && node.type === "generator")
        || nodes.find((node) => node.id === selectedNodeId && node.type === "generator")
        || nodes.find((node) => node.type === "generator");
    }

    function applyPromptPreset(text) {
      const node = promptLibraryTarget();
      if (!node) return showToast("请先创建或选择一个 AI文字绘图 节点");
      pushHistory();
      node.prompt = [String(node.prompt || "").trim(), String(text || "").trim()].filter(Boolean).join("，");
      scheduleCanvasSave();
      render();
      showToast("提示词已添加到 AI文字绘图");
    }

    function filteredPromptItems(query = "", tag = "全部") {
      const q = query.trim().toLowerCase();
      return keywordPresetItems().filter((item) => {
        const matchesTag = tag === "全部" || promptItemTag(item) === tag;
        const haystack = `${item.name} ${item.text} ${promptItemTag(item)}`.toLowerCase();
        return matchesTag && (!q || haystack.includes(q));
      });
    }

    function promptItemsHtml(items, manager = false) {
      if (!items.length) return `<div class="prompt-empty">暂无提示词，请点击“新增”创建</div>`;
      return items.map((item) => `<button class="prompt-library-item ${manager && selectedPromptManagerKey === item._key ? "selected" : ""}" ${manager ? `data-manager-prompt="${escapeHtml(item._key)}"` : `data-apply-prompt="${escapeHtml(item.text)}"`} type="button"><b>${escapeHtml(item.name)}</b><span>${escapeHtml(item.text)}</span>${manager ? `<small>#${escapeHtml(promptItemTag(item))}</small>` : ""}</button>`).join("");
    }

    function bindPromptItemClicks(root) {
      root.querySelectorAll("[data-apply-prompt]").forEach((button) => button.addEventListener("click", () => applyPromptPreset(button.dataset.applyPrompt)));
    }

    function renderPromptLibraryPanel() {
      promptLibraryList.innerHTML = promptItemsHtml(filteredPromptItems(promptLibrarySearch.value));
      bindPromptItemClicks(promptLibraryList);
    }

    function syncPromptOverlayLayers() {
      const ownerIds = new Set(
        nodes.filter((node) => Boolean(node.promptRefineOpen)).map((node) => node.id)
      );
      if (promptLibraryPanel.classList.contains("open") && activePromptLibraryNodeId) {
        ownerIds.add(activePromptLibraryNodeId);
      }
      canvas.querySelectorAll(".node").forEach((nodeEl) => {
        nodeEl.classList.toggle("prompt-overlay-owner", ownerIds.has(nodeEl.dataset.id));
      });
    }

    function closePromptLibrary() {
      promptLibraryPanel.classList.remove("open");
      activePromptLibraryNodeId = null;
      syncPromptOverlayLayers();
    }

    function updatePromptLibraryPosition() {
      if (!promptLibraryPanel.classList.contains("open") || !activePromptLibraryNodeId) return;
      const nodeEl = canvas.querySelector(`[data-id="${activePromptLibraryNodeId}"]`);
      if (nodeEl) {
        const rect = nodeEl.getBoundingClientRect();
        const panelWidth = 310;
        const gap = 10;
        let left = rect.right + gap;
        if (left + panelWidth > window.innerWidth - 12) left = Math.max(12, rect.left - panelWidth - gap);
        const panelHeight = Math.min(430, window.innerHeight - 24);
        const top = Math.max(12, Math.min(rect.top, window.innerHeight - panelHeight - 12));
        promptLibraryPanel.style.left = `${left}px`;
        promptLibraryPanel.style.top = `${top}px`;
      }
    }

    function openPromptLibrary(nodeId = null) {
      if (nodeId) activePromptLibraryNodeId = nodeId;
      const targetNode = nodes.find((node) => node.id === activePromptLibraryNodeId);
      if (targetNode?.promptRefineOpen) {
        targetNode.promptRefineOpen = false;
        render();
      }
      renderPromptLibraryPanel();
      promptLibraryPanel.classList.add("open");
      updatePromptLibraryPosition();
      syncPromptOverlayLayers();
      promptLibrarySearch.focus();
    }

    function renderPromptManager() {
      const items = keywordPresetItems();
      const tags = ["全部", ...new Set(items.map(promptItemTag))];
      promptTagList.innerHTML = tags.map((tag) => `<button class="prompt-tag ${activePromptTag === tag ? "active" : ""}" data-prompt-tag="${escapeHtml(tag)}" type="button">${escapeHtml(tag)}</button>`).join("");
      promptManagerList.innerHTML = promptItemsHtml(filteredPromptItems(promptManagerSearch.value, activePromptTag), true);
      promptManagerList.querySelectorAll("[data-manager-prompt]").forEach((button) => {
        button.addEventListener("click", () => {
          selectedPromptManagerKey = button.dataset.managerPrompt;
          promptManagerList.querySelectorAll("[data-manager-prompt]").forEach((item) => item.classList.toggle("selected", item === button));
        });
        button.addEventListener("dblclick", () => openPromptEditor(button.dataset.managerPrompt));
      });
      promptTagList.querySelectorAll("[data-prompt-tag]").forEach((button) => button.addEventListener("click", () => { activePromptTag = button.dataset.promptTag; renderPromptManager(); }));
    }

    function openPromptManager() {
      closePromptLibrary();
      activePromptTag = "全部";
      selectedPromptManagerKey = "";
      promptManagerSearch.value = "";
      renderPromptManager();
      promptManagerBackdrop.classList.add("open");
    }

    function openPromptEditor(key = "") {
      editingPromptKey = key;
      const item = key ? keywordPresetItems().find((entry) => entry._key === key) : null;
      document.getElementById("promptEditorTitle").textContent = item ? "编辑提示词" : "新增提示词";
      document.getElementById("promptEditorName").value = item?.name || "";
      document.getElementById("promptEditorContent").value = item?.text || "";
      document.getElementById("promptEditorTag").value = item ? promptItemTag(item) : "";
      promptEditor.classList.add("open");
      document.getElementById("promptEditorName").focus();
    }

    function imageFavoriteItems() {
      try { return JSON.parse(localStorage.getItem("aiCanvasImageFavorites") || "[]"); } catch (error) { return []; }
    }

    function isActiveLightboxFavorited() {
      return Boolean(activeLightbox.src && imageFavoriteItems().some((item) => item.url === activeLightbox.src));
    }

    function updateLightboxFavoriteButton() {
      const show = activeLightbox.mode === "image" || activeLightbox.mode === "paint";
      lightboxFavorite.hidden = !show;
      const active = show && isActiveLightboxFavorited();
      lightboxFavorite.classList.toggle("active", active);
      lightboxFavorite.textContent = active ? "★ 已收藏" : "☆ 收藏";
    }

    function keywordLibraryHtml() {
      return `<div class="keyword-library-menu" data-keyword-menu>
        ${keywordPresetItems().map((item) => `<button class="keyword-preset" data-keyword-text="${escapeHtml(item.text)}" type="button"><b>${escapeHtml(item.name)}</b><span>${escapeHtml(item.text)}</span></button>`).join("")}
        <div class="keyword-custom-row"><input data-keyword-custom placeholder="添加自定义关键词"><button class="mini ghost" data-keyword-add type="button">添加</button></div>
      </div>`;
    }

    function renderGeneratorBody(node) {
      const wrap = document.createElement("div");
      const actionText = node.type === "keyword" ? "提取提示词" : node.type === "video" ? "生成视频" : "生成图片";
      const isVideoNode = node.type === "video";
      const models = isVideoNode ? videoModelOptions : imageModelOptions;
      if (!models.includes(node.model)) node.model = models[0];
      const ratios = isVideoNode ? videoRatioOptionsForModel(node.model) : imageRatioOptions;
      const resolutions = isVideoNode ? videoResolutionOptionsForModel(node.model) : imageResolutionOptionsForModel(node.model);
      if (!ratios.includes(node.ratio)) node.ratio = ratioKey(node.ratio) === "Auto" ? "Auto自适应" : ratios[0];
      if (!resolutions.includes(node.resolution)) node.resolution = resolutions[0];
      if (!node.duration) node.duration = isVideoNode ? "default" : "5s";
      const videoReferenceCount = isVideoNode
        ? collectReferenceItems([...getInputMediaList(node.id), node]).filter((item) => isRenderableImageUrl(item?.url)).length
        : 0;
      if (isVideoNode) {
        if (!videoModelOptions.includes(node.model)) node.model = videoPrimaryModel;
        if (!videoCountOptions.includes(Number(node.count))) node.count = 1;
        node.duration = "default";
        if (!videoModeOptions.some((item) => item.value === node.videoMode)) node.videoMode = "text";
        if (!videoReferenceCount && node.videoMode !== "text") node.videoMode = "text";
        if (node.videoMode === "firstLast" && Array.isArray(node.references) && node.references.length > 2) {
          node.references = node.references.slice(0, 2);
          node.mediaUrl = node.references[0]?.url || "";
        }
      }
      const modelMenuHtml = models.map((model) => `<button class="node-select-option ${node.model === model ? "active" : ""}" data-node-model="${escapeHtml(model)}" type="button"><span>${escapeHtml(model)}</span>${node.model === model ? '<svg viewBox="0 0 20 20" aria-hidden="true"><path d="m5 10 3 3 7-7"/></svg>' : ""}</button>`).join("");
      const ratioMenuHtml = ratios.map((ratio) => `<button class="node-select-option ${node.ratio === ratio ? "active" : ""}" data-node-ratio="${escapeHtml(ratio)}" type="button"><span>${escapeHtml(ratio)}</span>${node.ratio === ratio ? '<svg viewBox="0 0 20 20" aria-hidden="true"><path d="m5 10 3 3 7-7"/></svg>' : ""}</button>`).join("");
      const durationHtml = `<button class="count-option active model-default" type="button" disabled>默认时长</button>`;
      const countHtml = (isVideoNode ? videoCountOptions : [1, 2, 3, 4, 5, 6, 7, 8, 9]).map((count) => (
        `<button class="count-option ${Number(node.count) === count ? "active" : ""}" data-count="${count}" type="button">${count}</button>`
      )).join("");
      const resolutionHtml = resolutions.map((resolution) => (
        `<button class="choice-option ${node.resolution === resolution ? "active" : ""}" data-resolution="${resolution}" type="button" ${resolution === "DEFAULT" ? "disabled" : ""}>${resolutionLabel(resolution)}</button>`
      )).join("");
      const modeHtml = [1, 2].map((row) => (
        `<div class="choice-options mode-choice-row">
          ${videoModeOptions.filter((mode) => mode.row === row).map((mode) => (
            `<button class="choice-option ${node.videoMode === mode.value ? "active" : ""}" data-video-mode="${mode.value}" type="button" ${mode.needsImage && !videoReferenceCount ? 'disabled title="添加图片后可用"' : ""}>${mode.label}</button>`
          )).join("")}
        </div>`
      )).join("");
      const referenceHint = isVideoNode && node.videoMode === "text"
        ? "文生视频模式不需要参考图。"
        : isVideoNode && node.videoMode === "firstLast"
        ? "首位帧模式只保留 2 张参考图：第 1 张为首帧，第 2 张为尾帧。"
        : isVideoNode
        ? "多图参考模式可上传多张参考图。"
        : "可上传参考图。";

      const refineModel = promptModelOptions.includes(node.promptRefineModel) ? node.promptRefineModel : "GPT";
      node.promptRefineModel = refineModel;
      const promptRefinePanelHtml = !isVideoNode && node.promptRefineOpen ? `
        <aside class="prompt-refine-panel" data-prompt-refine-panel>
          <div class="prompt-refine-head"><strong>AI修改提示词</strong><button class="mini ghost" data-prompt-refine-close type="button">×</button></div>
          <div class="prompt-refine-models">${promptModelOptions.map((model) => `<button class="${refineModel === model ? "active" : ""}" data-prompt-refine-model="${model}" type="button">${model}</button>`).join("")}</div>
          <div class="prompt-refine-output">${escapeHtml(node.promptRefineLoading ? "正在修改提示词…" : node.promptRefineResult || "选择模型后点击“开始修改”，修改结果会显示在这里。")}</div>
          <div class="prompt-refine-actions"><button class="ghost" data-prompt-refine-run type="button" ${node.promptRefineLoading ? "disabled" : ""}>开始修改</button><button class="primary" data-prompt-refine-apply type="button" ${node.promptRefineResult ? "" : "disabled"}>应用结果</button></div>
        </aside>` : "";

      wrap.innerHTML = `
        <div class="field">
          <div class="prompt-field-wrap">
            ${!isVideoNode ? `<div class="prompt-corner-tools"><button class="prompt-corner-button" data-prompt-library type="button" data-tooltip="提示词管理" aria-label="提示词管理"><svg viewBox="0 0 24 24"><path d="M6 3.5h12v17l-6-3.6-6 3.6v-17Z"/></svg></button><button class="prompt-corner-button" data-prompt-refine-open type="button" data-tooltip="AI修改提示词" aria-label="AI修改提示词"><svg viewBox="0 0 24 24"><path d="m13 2-8 12h7l-1 8 8-12h-7l1-8Z"/></svg></button></div>` : ""}
            <textarea class="prompt-textarea" data-field="prompt" data-autogrow style="${node.promptHeight ? `height:${node.promptHeight}px;` : ""}" placeholder="输入提示词">${node.prompt}</textarea>
          </div>
        </div>
        ${isVideoNode ? `
        <div class="form-row video-mode-row">
          <label>模式选择</label>
          <div class="video-mode-options">
            ${modeHtml}
          </div>
        </div>` : ""}
        <div class="form-row">
          <label>模型</label>
          <div class="node-select" data-node-select><button class="node-select-trigger" data-node-select-toggle type="button" aria-haspopup="listbox" aria-expanded="false"><span>${escapeHtml(node.model)}</span><svg viewBox="0 0 20 20" aria-hidden="true"><path d="m5 7.5 5 5 5-5"/></svg></button><div class="node-select-menu" role="listbox">${modelMenuHtml}</div></div>
        </div>
        <div class="form-row">
          <label>比例尺寸</label>
          <div>
            <div class="node-select" data-node-select><button class="node-select-trigger" data-node-select-toggle type="button" aria-haspopup="listbox" aria-expanded="false"><span>${escapeHtml(node.ratio)}</span><svg viewBox="0 0 20 20" aria-hidden="true"><path d="m5 7.5 5 5 5-5"/></svg></button><div class="node-select-menu ratio-menu" role="listbox">${ratioMenuHtml}</div></div>
            <div class="ratio-readout" data-ratio-readout>当前画面比例：${node.ratio}</div>
          </div>
        </div>
        <div class="form-row resolution-row">
          <label>分辨率</label>
          <div class="choice-options ${(isVideoNode || resolutions.length === 1) ? "align-right" : ""} ${resolutions.length === 1 ? "single-option" : ""}" style="--resolution-option-count:${resolutions.length}">${resolutionHtml}</div>
        </div>
        ${isVideoNode ? `
        <div class="form-row video-duration-row">
          <label>时长</label>
          <div class="count-options">
            ${durationHtml}
          </div>
        </div>
        <div class="form-row video-count-row">
          <label>数量</label>
          <div class="count-options">
            ${countHtml}
          </div>
        </div>
        ` : `
        <div class="form-row generator-count-row">
          <label>数量</label>
          <div class="count-options">
            ${countHtml}
          </div>
        </div>`}
        <div class="field" ${node.type === "keyword" ? "hidden" : ""}>
          <div class="upload-box">
            ${renderGeneratorRefs(node)}
            <label class="add-thumb">+
              <input data-upload type="file" accept="image/*" ${isVideoNode && node.videoMode === "firstLast" ? "" : "multiple"} hidden>
            </label>
          </div>
        </div>
        <button data-generate class="wide-button ${/^正在生成/.test(node.status || "") ? "generating" : ""}" type="button">${actionText}</button>
        <div class="status">${node.status || referenceHint}</div>
        ${promptRefinePanelHtml}
      `;

      bindFields(wrap, node);
      const keywordToggle = wrap.querySelector("[data-keyword-toggle]");
      const keywordMenu = wrap.querySelector("[data-keyword-menu]");
      if (keywordToggle && keywordMenu) {
        keywordToggle.addEventListener("click", () => keywordMenu.classList.toggle("open"));
        keywordMenu.querySelectorAll("[data-keyword-text]").forEach((button) => {
          button.addEventListener("click", () => {
            pushHistory();
            const addition = button.dataset.keywordText || "";
            node.prompt = [String(node.prompt || "").trim(), addition].filter(Boolean).join("，");
            render();
          });
        });
        keywordMenu.querySelector("[data-keyword-add]")?.addEventListener("click", () => {
          const input = keywordMenu.querySelector("[data-keyword-custom]");
          const text = input?.value.trim() || "";
          if (!text) return;
          let custom = [];
          try { custom = JSON.parse(localStorage.getItem("aiCanvasCustomKeywordPresets") || "[]"); } catch (error) { custom = []; }
          custom.push({ name: `自定义${custom.length + 1}`, text });
          localStorage.setItem("aiCanvasCustomKeywordPresets", JSON.stringify(custom.slice(-30)));
          node.prompt = [String(node.prompt || "").trim(), text].filter(Boolean).join("，");
          render();
        });
      }
      wrap.querySelector("[data-generate]").addEventListener("click", () => generateFromNode(node.id));
      wrap.querySelector("[data-prompt-refine-open]")?.addEventListener("click", () => {
        closePromptLibrary();
        node.promptRefineOpen = !node.promptRefineOpen;
        render();
      });
      wrap.querySelector("[data-prompt-refine-close]")?.addEventListener("click", () => {
        node.promptRefineOpen = false;
        render();
      });
      wrap.querySelectorAll("[data-prompt-refine-model]").forEach((button) => button.addEventListener("click", () => {
        node.promptRefineModel = button.dataset.promptRefineModel;
        render();
      }));
      wrap.querySelector("[data-prompt-refine-run]")?.addEventListener("click", () => refineNodePrompt(node));
      wrap.querySelector("[data-prompt-refine-apply]")?.addEventListener("click", () => {
        if (!node.promptRefineResult || /^修改失败：/.test(node.promptRefineResult)) return;
        pushHistory();
        node.prompt = node.promptRefineResult;
        node.promptRefineOpen = false;
        render();
      });
      wrap.querySelectorAll("[data-node-select-toggle]").forEach((toggle) => {
        toggle.addEventListener("click", (event) => {
          event.stopPropagation();
          const select = toggle.closest("[data-node-select]");
          const shouldOpen = !select.classList.contains("open");
          wrap.querySelectorAll("[data-node-select].open").forEach((item) => {
            item.classList.remove("open");
            item.querySelector("[data-node-select-toggle]")?.setAttribute("aria-expanded", "false");
          });
          if (shouldOpen) {
            select.classList.add("open");
            toggle.setAttribute("aria-expanded", "true");
            document.addEventListener("click", () => {
              select.classList.remove("open");
              toggle.setAttribute("aria-expanded", "false");
            }, { once: true });
          }
        });
      });
      wrap.querySelectorAll(".node-select-menu.ratio-menu").forEach((menu) => {
        menu.addEventListener("wheel", (event) => {
          event.preventDefault();
          event.stopPropagation();
        }, { passive: false });
      });
      wrap.querySelectorAll("[data-node-model]").forEach((button) => {
        button.addEventListener("click", () => {
          pushHistory();
          node.model = button.dataset.nodeModel;
          if (isVideoNode) {
            const capabilities = videoCapabilitiesForModel(node.model);
            node.resolution = capabilities.resolutions[0];
            if (!capabilities.ratios.includes(node.ratio)) node.ratio = capabilities.ratios[0];
            node.duration = "default";
            node.status = `${node.model}：时长由模型默认生成（${capabilities.defaultDuration} 秒）。`;
          } else {
            node.resolution = imageResolutionOptionsForModel(node.model)[0];
          }
          render();
        });
      });
      wrap.querySelectorAll("[data-node-ratio]").forEach((button) => {
        button.addEventListener("click", () => {
          pushHistory();
          node.ratio = button.dataset.nodeRatio;
          render();
        });
      });
      wrap.querySelectorAll("[data-count]").forEach((button) => {
        button.addEventListener("click", () => {
          pushHistory();
          node.count = Number(button.dataset.count);
          render();
        });
      });
      wrap.querySelectorAll("[data-resolution]").forEach((button) => {
        button.addEventListener("click", () => {
          pushHistory();
          node.resolution = button.dataset.resolution;
          render();
        });
      });
      wrap.querySelectorAll("[data-duration]").forEach((button) => {
        button.addEventListener("click", () => {
          pushHistory();
          node.duration = button.dataset.duration;
          render();
        });
      });
      wrap.querySelectorAll("[data-video-mode]").forEach((button) => {
        button.addEventListener("click", () => {
          if (button.disabled) return;
          pushHistory();
          node.videoMode = button.dataset.videoMode;
          if (!videoModelOptions.includes(node.model)) node.model = videoPrimaryModel;
          if (node.videoMode === "text") {
            node.status = "文生视频模式：只使用提示词生成视频。";
          } else if (node.videoMode === "firstLast") {
            node.references = normalizeReferences(node).slice(0, 2);
            node.mediaUrl = node.references[0]?.url || "";
            node.status = "首尾帧模式：第 1 张为首帧，第 2 张为尾帧。";
          } else {
            node.status = "多图参考模式：可上传多张参考图。";
          }
          render();
        });
      });
      const upload = wrap.querySelector("[data-upload]");
      if (upload) upload.addEventListener("change", async (event) => {
        pushHistory();
        const addedCount = await addFilesToNode(node, event.target.files);
        if (!addedCount) {
          event.target.value = "";
          render();
          return;
        }
        node.status = node.type === "video" && node.videoMode === "firstLast"
          ? `已上传 ${normalizeReferences(node).length}/2 张，第一张首帧，第二张尾帧。`
          : "参考素材已上传。";
        event.target.value = "";
        render();
      });
      autoGrowTextareas(wrap);
      return wrap;
    }

    function previewFavoriteButton(node) {
      return `<button class="preview-favorite ${node.favorite ? "active" : ""}" data-favorite type="button" title="${node.favorite ? "取消图片收藏" : "收藏图片"}" aria-label="${node.favorite ? "取消图片收藏" : "收藏图片"}"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 3 2.7 5.5 6.1.9-4.4 4.3 1 6.1L12 17l-5.4 2.8 1-6.1-4.4-4.3 6.1-.9L12 3Z"/></svg></button>`;
    }

    function renderUpscaleBody(node) {
      const wrap = document.createElement("div");
      node.model = upscaleModelOptions.includes(node.model) ? node.model : upscaleModelOptions[0];
      node.resolution = "4K";
      node.ratio = "Auto自适应";
      node.count = 1;
      const linkedRefs = getInputMediaList(node.id).flatMap((source) => normalizeReferences(source));
      const refs = [...linkedRefs, ...normalizeReferences(node)].filter((item) => isRenderableImageUrl(item?.url));
      const first = refs[0];
      const upscaleModelMenuHtml = upscaleModelOptions.map((model) => `<button class="node-select-option ${node.model === model ? "active" : ""}" data-upscale-model-option="${escapeHtml(model)}" type="button"><span>${escapeHtml(model)}</span>${node.model === model ? '<svg viewBox="0 0 20 20" aria-hidden="true"><path d="m5 10 3 3 7-7"/></svg>' : ""}</button>`).join("");
      const preview = first
        ? `<img src="${first.url}" alt="4K 放大来源图片" loading="lazy" decoding="async">`
        : `<div class="placeholder-art reference-empty-visual"><span class="reference-empty-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="16" rx="3" stroke-width="1.7"/><path d="m5 18 4.5-4.5 3 3 2.5-2.5 4 4" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></span><strong>添加需要放大的图片</strong><span>上传，或连接参考图/效果图</span><span class="ratio-readout">一次只能上传一张</span></div>`;
      wrap.innerHTML = `
        <div class="preview wide" data-upscale-drop>${preview}${previewFavoriteButton(node)}</div>
        <div class="result-actions" style="grid-template-columns:1fr;margin-top:8px;">
          <label class="button-like ghost mini" style="display:grid;place-items:center;cursor:pointer;">上传图片<input data-upscale-upload type="file" accept="image/*" hidden></label>
        </div>
        <div class="form-row">
          <label>模型</label>
          <div class="node-select" data-node-select><button class="node-select-trigger" data-upscale-model-toggle type="button"><span>${escapeHtml(node.model)}</span><svg viewBox="0 0 20 20" aria-hidden="true"><path d="m5 7.5 5 5 5-5"/></svg></button><div class="node-select-menu">${upscaleModelMenuHtml}</div></div>
        </div>
        <div class="form-row">
          <label>比例尺寸</label>
          <div class="upscale-ratio-copy"><strong>保持上传图片比例尺寸</strong><div class="ratio-readout">不裁切、不拉伸、不改变构图</div></div>
        </div>
        <div class="form-row resolution-row">
          <label>分辨率</label>
          <div class="choice-options"><button class="choice-option active" type="button" disabled>4K（默认）</button></div>
        </div>
        <button data-generate class="wide-button" type="button">生成4K图片</button>
        <div class="status">${node.status || "可上传图片，也可连接参考图或效果图。"}</div>
      `;
      wrap.querySelector("[data-upscale-model-toggle]").addEventListener("click", (event) => {
        event.stopPropagation();
        const select = event.currentTarget.closest("[data-node-select]");
        const shouldOpen = !select.classList.contains("open");
        if (shouldOpen) {
          select.classList.add("open");
          document.addEventListener("click", () => select.classList.remove("open"), { once: true });
        } else select.classList.remove("open");
      });
      wrap.querySelectorAll("[data-upscale-model-option]").forEach((button) => button.addEventListener("click", () => {
        pushHistory();
        node.model = upscaleModelOptions.includes(button.dataset.upscaleModelOption) ? button.dataset.upscaleModelOption : upscaleModelOptions[0];
        render();
      }));
      wrap.querySelector("[data-upscale-upload]").addEventListener("change", async (event) => {
        pushHistory();
        await replaceFilesInNode(node, event.target.files);
        node.status = "图片已上传，将保持原比例放大到 4K。";
        event.target.value = "";
        render();
      });
      const drop = wrap.querySelector("[data-upscale-drop]");
      drop.addEventListener("dragover", (event) => {
        if (!hasImageFiles(event.dataTransfer?.items || event.dataTransfer?.files)) return;
        event.preventDefault();
        drop.classList.add("drop-ready");
      });
      drop.addEventListener("dragleave", () => drop.classList.remove("drop-ready"));
      drop.addEventListener("drop", async (event) => {
        if (!hasImageFiles(event.dataTransfer?.items || event.dataTransfer?.files)) return;
        event.preventDefault();
        drop.classList.remove("drop-ready");
        pushHistory();
        await replaceFilesInNode(node, event.dataTransfer.files);
        node.status = "图片已拖入，将保持原比例放大到 4K。";
        render();
      });
      wrap.querySelector("[data-generate]").addEventListener("click", () => generateFromNode(node.id));
      return wrap;
    }

    function renderPngWorkflowBody(node) {

      if (!node.prompt) node.prompt = "请只抠出上传原图里的主体，移除背景并输出透明底 PNG，不要重绘、不要美化、不要改变人物/产品/文字/Logo/衣服/姿势/构图。";

      node.resolution = node.resolution || "1K";
      if (!pngResolutionOptions.includes(node.resolution)) node.resolution = "2K";
      node.ratio = "Auto自适应";

      const ref = refs.find((item) => item.width && item.height);

        ? `<div class="png-source-wrap">
            <img src="${refs[0].url}" alt="待抠图图片" loading="lazy" decoding="async">
            <span class="png-source-size">${refs[0].width || "-"} x ${refs[0].height || "-"}px</span>

          </div>`

            <strong>添加需要处理的图片</strong>
            <span>上传，或连接参考图/效果图</span>
            <span class="ratio-readout">一次只能上传一张</span>
            <input data-upload type="file" accept="image/*" hidden>
          </label>`;
      const resolutionHtml = pngResolutionOptions.map((resolution) => (
        `<button class="choice-option ${node.resolution === resolution ? "active" : ""}" data-resolution="${resolution}" type="button">${resolution}</button>`
      )).join("");
      wrap.innerHTML = `
        <div class="preview png-upload-preview" data-preview>${uploadPreview}${previewFavoriteButton(node)}</div>
        <div class="result-actions" style="grid-template-columns:1fr;">
          <label class="button-like ghost mini" style="display:grid;place-items:center;cursor:pointer;">${uploadButtonText}
            <input data-upload type="file" accept="image/*" hidden>
          </label>
        </div>
        <div class="form-row">
          <label>分辨率</label>
          <div class="choice-options">${resolutionHtml}</div>
        </div>
        <div class="field">
          <textarea class="prompt-textarea" data-field="prompt" data-autogrow style="${node.promptHeight ? `height:${node.promptHeight}px;` : ""}" placeholder="输入透明底 PNG 编辑关键词">${node.prompt}</textarea>
        </div>
        <button data-generate class="wide-button" type="button">生成透明图/PNG格式</button>
        <div class="status">${node.status || (ref ? `已上传 ${ref.width} x ${ref.height}px，将按原图比例生成透明 PNG。` : "上传图片后会按图片比例自动生成透明底 PNG 效果图。")}</div>
      `;
      bindFields(wrap, node);
      wrap.querySelectorAll("[data-upload]").forEach((upload) => upload.addEventListener("change", async (event) => {
        pushHistory();
        const replaced = await replaceFilesInNode(node, event.target.files);
        if (!replaced) {
          event.target.value = "";
          render();
          return;
        }
        node.ratio = "Auto自适应";
        const first = normalizeReferences(node).find((item) => item.width && item.height);
        node.status = first ? `已上传 ${first.width} x ${first.height}px，将按原图比例自动识别尺寸。` : "图片已上传，将按原图比例自动识别尺寸。";
        event.target.value = "";
        render();
      }));
      wrap.querySelectorAll("[data-remove-ref]").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          removeReference(node, Number(button.dataset.removeRef));
        });
      });
      wrap.querySelectorAll("[data-resolution]").forEach((button) => {
        button.addEventListener("click", () => {
          pushHistory();
          node.resolution = button.dataset.resolution;
          render();
        });
      });
      const dropTarget = wrap.querySelector("[data-preview]");
      dropTarget.addEventListener("dragover", (event) => {
        if (!hasImageFiles(event.dataTransfer?.items || event.dataTransfer?.files)) return;
        event.preventDefault();
        dropTarget.classList.add("drop-ready");
      });
      dropTarget.addEventListener("dragleave", () => dropTarget.classList.remove("drop-ready"));
      dropTarget.addEventListener("drop", async (event) => {
        if (!hasImageFiles(event.dataTransfer?.items || event.dataTransfer?.files)) return;
        event.preventDefault();
        dropTarget.classList.remove("drop-ready");
        pushHistory();
        await replaceFilesInNode(node, event.dataTransfer.files);
        node.ratio = "Auto自适应";
        const first = normalizeReferences(node).find((item) => item.width && item.height);
        node.status = first ? `已上传 ${first.width} x ${first.height}px，将按原图比例自动识别尺寸。` : "图片已上传，将按原图比例自动识别尺寸。";
        render();
      });
      wrap.querySelector("[data-generate]").addEventListener("click", () => generateFromNode(node.id));
      autoGrowTextareas(wrap);
      return wrap;
    }

    function publicNodeStatus(text) {
      return String(text || "").replace(
        /（接口(?:基础图已在本地高质量放大并校验|图片已严格校验)为\s*\d+\s*[×xX]\s*\d+）/g,
        ""
      );
    }

    function renderMediaBody(node) {
      const wrap = document.createElement("div");
      const isVideo = node.mediaType === "video";
      const refs = normalizeReferences(node);
      const publicStatus = publicNodeStatus(node.status);
      const media = node.pending
        ? `<div class="loading-state"><span class="spinner"></span><strong>${isVideo ? "效果视频正在生成" : "效果图正在生成"}</strong><span data-elapsed>${isVideo ? `已等待 ${node.elapsed || 0}s` : `已等待 ${node.elapsed || 0}s，最多 ${generationTimeoutSeconds}s`}</span></div>`
        : node.type === "image"
        ? renderReferenceGallery(node)
        : node.mediaType === "text"
        ? `<div class="text-result">${escapeHtml(node.text || "提示词结果会显示在这里。")}</div>`
        : node.mediaUrl
        ? isVideo
          ? `<video src="${node.mediaUrl}" controls></video>`
          : `<img src="${node.previewUrl || node.mediaUrl}" alt="${node.title}" loading="lazy" decoding="async">`
        : node.type === "result"
        ? `<div class="placeholder-art result-empty-visual"><span class="result-empty-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="16" rx="3" stroke-width="1.7"/><path d="m5 18 4.5-4.5 3 3 2.5-2.5 4 4" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></span><strong>效果图将在这里显示</strong><span>生成后可放大查看并下载原始尺寸</span></div>`
        : `<div class="placeholder-art"><strong>参考图片</strong><span>可上传素材，也可连接生成节点输出。</span></div>`;

      wrap.innerHTML = `
        <div class="preview ${isVideo ? "wide" : ""}${node.pending ? " loading" : ""}${node.transparent ? " transparent-preview" : ""}" data-preview>${media}${node.type === "result" ? previewFavoriteButton(node) : ""}</div>
        ${node.type === "result" ? `<div class="meta-line" data-meta>${resultMetaText(node)}</div>` : ""}
        <div class="result-actions" style="${node.type === "result" || node.type === "image" ? "grid-template-columns:1fr;" : ""}">
          ${node.type === "result" ? "" : `<label class="button-like ghost mini" style="display:grid;place-items:center;cursor:pointer;">上传
            <input data-upload type="file" accept="image/*,video/*" ${node.type === "image" ? "multiple" : ""} hidden>
          </label>`}
          ${node.type === "image" ? "" : `<button class="mini ghost" data-download type="button">下载</button>`}
        </div>
        ${(node.type === "image" || node.type === "result") && !publicStatus ? "" : `<div class="status">${publicStatus || "可作为参考图输入，或保存生成结果。"}</div>`}
      `;

      const uploadInput = wrap.querySelector("[data-upload]");
      if (uploadInput) uploadInput.addEventListener("change", async (event) => {
        pushHistory();
        if (node.type === "image") {
          const addedCount = await addFilesToNode(node, event.target.files);
          if (!addedCount) {
            event.target.value = "";
            render();
            return;
          }
        } else {
          const file = event.target.files[0];
          if (!file) {
            event.target.value = "";
            return;
          }
          node.mediaUrl = file.type.startsWith("image") ? await compressImageFileToDataUrl(file) : await readFileAsDataUrl(file);
          node.mediaType = file.type.startsWith("video") ? "video" : "image";
        }
        node.status = node.type === "image" ? "参考图已自动转换为 JPG。" : "素材已上传。";
        event.target.value = "";
        render();
      });
      const dropTarget = wrap.querySelector("[data-preview]");
      if (dropTarget && node.type === "image") {
        const openImagePicker = (event) => {
          if (!event.target.closest(".reference-empty-visual")) return;
          event.preventDefault();
          event.stopPropagation();
          uploadInput?.click();
        };
        dropTarget.addEventListener("click", openImagePicker);
        dropTarget.addEventListener("keydown", (event) => {
          if (event.key !== "Enter" && event.key !== " ") return;
          openImagePicker(event);
        });
        dropTarget.addEventListener("dragover", (event) => {
          if (!hasImageFiles(event.dataTransfer?.items || event.dataTransfer?.files)) return;
          event.preventDefault();
          dropTarget.classList.add("drop-ready");
        });
        dropTarget.addEventListener("dragleave", () => dropTarget.classList.remove("drop-ready"));
        dropTarget.addEventListener("drop", async (event) => {
          if (Array.from(event.dataTransfer?.types || []).includes("application/x-wandou-reference-index")) return;
          const files = Array.from(event.dataTransfer?.files || []).filter(isImageFile);
          if (!files.length) return;
          event.preventDefault();
          event.stopPropagation();
          dropTarget.classList.remove("drop-ready");
          pushHistory();
          await addFilesToNode(node, files);
          node.status = `已拖入并转换 ${files.length} 张 JPG 参考图。`;
          selectedNodeId = node.id;
          activePasteNodeId = node.id;
          render();
          showToast("参考图已自动转换为 JPG");
        });
      }
      wrap.querySelector("[data-download]")?.addEventListener("click", () => downloadNodeMedia(node));
      wrap.querySelector("[data-preview]").addEventListener("click", (event) => {
        const media = event.target.closest("img, video");
        if (node.type === "result" && media && !node.pending) openLightbox(favoriteMediaUrl(node), { mode: node.mediaType === "video" ? "video" : "image", nodeId: node.id });
      });
      const previewImg = wrap.querySelector("[data-preview] img");
      if (node.type === "result" && previewImg) {
        const syncRatio = () => {
          if (!previewImg.naturalWidth || !previewImg.naturalHeight) return;
          if (!node.width) node.width = previewImg.naturalWidth;
          if (!node.height) node.height = previewImg.naturalHeight;
          node.ratio = `${node.width}:${node.height}`;
          const nodeEl = canvas.querySelector(`[data-id="${node.id}"]`);
          if (nodeEl) nodeEl.style.setProperty("--preview-ratio", `${previewImg.naturalWidth} / ${previewImg.naturalHeight}`);
          const meta = nodeEl?.querySelector("[data-meta]");
          if (meta) meta.textContent = resultMetaText(node);
        };
        previewImg.addEventListener("load", syncRatio, { once: true });
        if (previewImg.complete) syncRatio();
      }
      wrap.querySelectorAll("[data-ref-index]").forEach((thumb) => {
        thumb.addEventListener("click", (event) => {
          if (event.target.closest("button")) return;
          const index = Number(thumb.dataset.refIndex);
          const ref = normalizeReferences(node)[index];
          if (ref?.url) openLightbox(ref.url, { mode: "paint", nodeId: node.id, refIndex: index });
        });
        thumb.addEventListener("dragstart", (event) => {
          event.dataTransfer.effectAllowed = "move";
          event.dataTransfer.setData("application/x-wandou-reference-index", thumb.dataset.refIndex);
          event.dataTransfer.setData("text/plain", thumb.dataset.refIndex);
          thumb.classList.add("dragging");
        });
        thumb.addEventListener("dragend", () => thumb.classList.remove("dragging"));
        thumb.addEventListener("dragover", (event) => {
          if (!Array.from(event.dataTransfer?.types || []).includes("application/x-wandou-reference-index")) return;
          event.preventDefault();
          event.dataTransfer.dropEffect = "move";
          thumb.classList.add("reorder-target");
        });
        thumb.addEventListener("dragleave", () => thumb.classList.remove("reorder-target"));
        thumb.addEventListener("drop", (event) => {
          if (event.dataTransfer?.files?.length) return;
          event.preventDefault();
          event.stopPropagation();
          thumb.classList.remove("reorder-target");
          const sourceIndex = event.dataTransfer.getData("application/x-wandou-reference-index");
          if (sourceIndex === "") return;
          reorderReference(node, Number(sourceIndex), Number(thumb.dataset.refIndex));
        });
      });
      wrap.querySelectorAll("[data-remove-ref]").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          removeReference(node, Number(button.dataset.removeRef));
        });
      });
      return wrap;
    }

    function bindFields(wrap, node) {
      wrap.querySelectorAll("[data-field]").forEach((field) => {
        field.addEventListener("focus", () => {
          field._historySnapshot = getCanvasSnapshot();
          field._historyValue = field.value;
        });
        field.addEventListener("input", () => {
          const key = field.dataset.field;
          node[key] = key === "count" ? Math.max(1, Math.min(8, Number(field.value) || 1)) : field.value;
          if (field.matches("textarea[data-autogrow]")) {
            autoGrowTextarea(field);
            if (key === "prompt") node.promptHeight = Math.ceil(field.getBoundingClientRect().height);
          }
          if (key === "model" && node.type === "generator") {
            node.resolution = imageResolutionOptionsForModel(node.model)[0];
            render();
            return;
          }
          updateInlineReadouts(field, node);
          scheduleCanvasSave(typingCanvasSaveDelayMs);
        });
        field.addEventListener("change", () => {
          const key = field.dataset.field;
          if (field._historySnapshot && field._historyValue !== field.value) {
            pushHistorySnapshot(field._historySnapshot);
          } else {
            pushHistory();
          }
          field._historySnapshot = "";
          field._historyValue = "";
          node[key] = key === "count" ? Math.max(1, Math.min(8, Number(field.value) || 1)) : field.value;
          if (key === "model" && node.type === "generator") {
            node.resolution = imageResolutionOptionsForModel(node.model)[0];
            render();
            return;
          }
          updateInlineReadouts(field, node);
        });
      });
    }

    function autoGrowTextarea(field) {
      const minHeight = Number.parseInt(getComputedStyle(field).minHeight, 10) || 0;
      field.style.height = "auto";
      field.style.height = `${Math.max(field.scrollHeight + 8, minHeight)}px`;
    }

    function autoGrowTextareas(root) {
      root.querySelectorAll("textarea[data-autogrow]").forEach(autoGrowTextarea);
    }

    function normalizeReferences(node) {
      if (!Array.isArray(node.references)) node.references = [];
      if (node.mediaUrl && !node.references.length) {
        node.references.unshift({ url: node.mediaUrl, mediaType: node.mediaType || "image" });
      }
      return node.references;
    }

    function cloneReferences(references) {
      return Array.isArray(references) ? references.map((item) => ({ ...item })) : [];
    }

    function renderGeneratorRefs(node) {
      const refs = [
        ...getInputMediaList(node.id).flatMap((source) => normalizeReferences(source)),
        ...normalizeReferences(node)
      ];
      if (!refs.length) return "";
      const limit = node.type === "video" && node.videoMode === "firstLast" ? 2 : 8;
      return refs.slice(0, limit).map((item, index) => {
        const label = node.type === "video" && node.videoMode === "firstLast"
          ? index === 0 ? "首帧" : "尾帧"
          : index + 1;
        return `
        <div class="thumb" title="${node.type === "video" && node.videoMode === "firstLast" ? label : `参考图 ${index + 1}`}">
          <img src="${item.url}" alt="参考图 ${index + 1}" style="width:100%;height:100%;object-fit:contain;border-radius:8px;">
          <span class="thumb-index">${label}</span>
        </div>
      `;
      }).join("");
    }

    function renderPromptReferenceGallery(node) {
      const linkedRefs = getInputMediaList(node.id).flatMap((source) => normalizeReferences(source));
      const ownRefs = normalizeReferences(node);
      const linkedHtml = linkedRefs.map((item, index) => `
        <div class="thumb" title="连接参考图 ${index + 1}">
          <img src="${item.url}" alt="连接参考图 ${index + 1}" style="width:100%;height:100%;object-fit:contain;border-radius:8px;">
          <span class="thumb-index">连${index + 1}</span>
        </div>
      `).join("");
      const ownHtml = ownRefs.map((item, index) => `
        <div class="thumb" draggable="true" data-ref-index="${index}" title="拖动调整顺序，点击放大或涂抹编辑">
          <img src="${item.url}" alt="参考图 ${index + 1}" style="width:100%;height:100%;object-fit:contain;border-radius:8px;">
          <span class="thumb-index">${index + 1}</span>
          <button class="thumb-remove" data-remove-ref="${index}" type="button">×</button>
        </div>
      `).join("");
      return linkedHtml || ownHtml ? `${linkedHtml}${ownHtml}` : "";
    }

    function renderReferenceGallery(node) {
      const refs = normalizeReferences(node);
      const visibleRefs = refs.map((item, index) => ({ item, index })).filter(({ item }) => isRenderableImageUrl(item?.url));
      if (!visibleRefs.length) {
        return `<div class="placeholder-art reference-empty-visual" role="button" tabindex="0" aria-label="点击上传参考图片"><span class="reference-empty-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="16" rx="3" stroke-width="1.7"/><circle cx="9" cy="10" r="2" stroke-width="1.7"/><path d="m5 18 4.5-4.5 3 3 2.5-2.5 4 4" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></span><strong>添加参考图片</strong><span>拖入或点击此处上传</span><small>自动转为 JPG，上传后可拖动调整顺序</small></div>`;
      }
      return `<div class="upload-box">${visibleRefs.map(({ item, index }) => `
        <div class="thumb" draggable="true" data-ref-index="${index}" title="拖动调整顺序">
          <img src="${item.url}" alt="参考图 ${index + 1}" style="width:100%;height:100%;object-fit:contain;border-radius:8px;">
          <span class="thumb-index">${index + 1}</span>
          <button class="thumb-remove" data-remove-ref="${index}" type="button">×</button>
        </div>
      `).join("")}</div>`;
    }

    function isImageFile(file) {
      if (!file) return false;
      if (file.type?.startsWith("image/")) return true;
      if (/\.(png|jpe?g|webp|gif|bmp|avif)$/i.test(file.name || "")) return true;
      return !file.type && file.size > 0;
    }

    function hasImageFiles(items) {
      return Array.from(items || []).some((item) => {
        if (item.kind === "file") return item.type?.startsWith("image/") || !item.type;
        return isImageFile(item);
      });
    }

    function inferImageMime(file) {
      if (file.type?.startsWith("image/")) return file.type;
      const name = file.name || "";
      if (/\.jpe?g$/i.test(name)) return "image/jpeg";
      if (/\.webp$/i.test(name)) return "image/webp";
      if (/\.gif$/i.test(name)) return "image/gif";
      if (/\.bmp$/i.test(name)) return "image/bmp";
      if (/\.avif$/i.test(name)) return "image/avif";
      return "image/png";
    }

    function isRenderableImageUrl(url) {
      return typeof url === "string" && (/^data:image\//i.test(url) || /^blob:/i.test(url) || /^https?:\/\//i.test(url));
    }

    async function readImageFileAsDataUrl(file) {
      let url = await readFileAsDataUrl(file);
      if (!/^data:image\//i.test(url)) {
        url = url.replace(/^data:[^;]*;/i, `data:${inferImageMime(file)};`);
      }
      return url;
    }

    async function imageFileToReference(file) {
      let originalDimensions = {};
      if ("createImageBitmap" in window) {
        try {
          const bitmap = await createImageBitmap(file);
          originalDimensions = { width: bitmap.width, height: bitmap.height };
          bitmap.close?.();
        } catch (error) {
          originalDimensions = {};
        }
      }
      let url = await compressImageFileToDataUrl(file);
