      let dimensions = await getImageDimensions(url);
      if (!dimensions.width && originalDimensions.width) dimensions = originalDimensions;
      const sourceName = file.name || `参考图-${Date.now()}`;
      const jpgName = `${sourceName.replace(/\.[^.]+$/, "") || "参考图"}.jpg`;
      return { url, mediaType: "image", name: jpgName, mimeType: "image/jpeg", ...dimensions, ...originalDimensions };
    }

    async function compressImageFileToDataUrl(file, options = {}) {
      const maxSide = options.maxSide || 1600;
      const quality = options.quality || 0.82;
      let bitmap = null;
      let fallbackImage = null;
      let objectUrl = "";
      try {
        if ("createImageBitmap" in window) bitmap = await createImageBitmap(file);
      } catch (error) {
        bitmap = null;
      }
      try {
        if (!bitmap) {
          objectUrl = URL.createObjectURL(file);
          fallbackImage = await new Promise((resolve, reject) => {
            const image = new Image();
            image.onload = () => resolve(image);
            image.onerror = reject;
            image.src = objectUrl;
          });
        }
        const source = bitmap || fallbackImage;
        const sourceWidth = bitmap?.width || fallbackImage?.naturalWidth || fallbackImage?.width || 1;
        const sourceHeight = bitmap?.height || fallbackImage?.naturalHeight || fallbackImage?.height || 1;
        const scale = Math.min(1, maxSide / Math.max(sourceWidth, sourceHeight));
        const width = Math.max(1, Math.round(sourceWidth * scale));
        const height = Math.max(1, Math.round(sourceHeight * scale));
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = options.background || "#ffffff";
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(source, 0, 0, width, height);
        return canvas.toDataURL("image/jpeg", quality);
      } catch (error) {
        console.warn("JPG conversion failed", error);
        throw new Error("图片无法转换为 JPG，请更换图片后重试。");
      } finally {
        bitmap?.close?.();
        if (objectUrl) URL.revokeObjectURL(objectUrl);
      }
    }

    async function addImageUrlsToNode(node, urls) {
      const cleanUrls = Array.from(new Set(urls || [])).filter((url) => /^data:image\//i.test(url) || /^https?:\/\//i.test(url));
      if (!cleanUrls.length) return 0;
      const existing = normalizeReferences(node);
      const videoReferenceLimit = node.type === "video"
        ? (node.videoMode === "firstLast" ? 2 : videoCapabilitiesForModel(node.model).maxReferences)
        : Number.POSITIVE_INFINITY;
      const room = Math.max(0, Math.min(cleanUrls.length, videoReferenceLimit - existing.length));
      const limitedUrls = cleanUrls.slice(0, room);
      if (!limitedUrls.length) return 0;
      const added = [];
      for (const url of limitedUrls) {
        const dimensions = await getImageDimensions(url);
        added.push({ url, mediaType: "image", name: `剪贴板参考图-${added.length + 1}`, ...dimensions });
      }
      existing.push(...added);
      node.mediaUrl = node.references[0]?.url || "";
      node.mediaType = "image";
      node.width = node.references[0]?.width || node.width;
      node.height = node.references[0]?.height || node.height;
      return added.length;
    }

    async function addFilesToNode(node, files) {
      const list = Array.from(files || []).filter(isImageFile);
      if (!list.length) {
        node.status = "未识别到图片文件。";
        return 0;
      }
      const existing = normalizeReferences(node);
      const videoReferenceLimit = node.type === "video"
        ? (node.videoMode === "firstLast" ? 2 : videoCapabilitiesForModel(node.model).maxReferences)
        : Number.POSITIVE_INFINITY;
      const room = Math.max(0, Math.min(list.length, videoReferenceLimit - existing.length));
      const limitedList = list.slice(0, room);
      if (!limitedList.length) {
        node.status = node.type === "video"
          ? `${node.model} 当前最多支持 ${videoReferenceLimit} 张参考图。`
          : "没有可添加的图片。";
        return 0;
      }
      const added = [];
      for (const file of limitedList) {
        try {
          added.push(await imageFileToReference(file));
        } catch (error) {
          node.status = error.message || "部分图片无法转换为 JPG。";
        }
      }
      if (!added.length) return 0;
      existing.push(...added);
      node.mediaUrl = node.references[0]?.url || "";
      node.mediaType = "image";
      node.width = node.references[0]?.width || node.width;
      node.height = node.references[0]?.height || node.height;
      return added.length;
    }

    async function replaceFilesInNode(node, files) {
      const file = Array.from(files || []).find(isImageFile);
      if (!file) {
        node.status = "未识别到图片文件。";
        return false;
      }
      let reference;
      try {
        reference = await imageFileToReference(file);
      } catch (error) {
        node.status = error.message || "图片无法转换为 JPG。";
        return false;
      }
      node.references = [reference];
      node.mediaUrl = reference.url || "";
      node.mediaType = "image";
      node.width = reference.width || node.width;
      node.height = reference.height || node.height;
      return true;
    }

    function reorderReference(node, fromIndex, toIndex) {
      const refs = normalizeReferences(node);
      if (fromIndex === toIndex || fromIndex < 0 || toIndex < 0 || fromIndex >= refs.length || toIndex >= refs.length) return;
      pushHistory();
      const [item] = refs.splice(fromIndex, 1);
      refs.splice(toIndex, 0, item);
      node.mediaUrl = refs[0]?.url || "";
      node.status = `参考图顺序已调整：第 ${fromIndex + 1} 张移到第 ${toIndex + 1} 位。`;
      scheduleCanvasSave();
      render();
    }

    function removeReference(node, index) {
      const refs = normalizeReferences(node);
      pushHistory();
      refs.splice(index, 1);
      node.mediaUrl = refs[0]?.url || "";
      render();
    }

    async function copyPromptText(text) {
      if (!text.trim()) {
        showToast("当前没有可复制的提示词");
        return;
      }
      await navigator.clipboard.writeText(text);
      showToast("提示词已复制");
    }

    function promptDownloadContent(text, lang, negative = "") {
      const title = lang === "zh" ? "中文提示词" : "英文提示词";
      const negativeText = (negative || "").trim();
      return `${title}\n\n${text.trim()}${negativeText ? `\n\n负面提示词\n\n${negativeText}` : ""}`;
    }

    function promptBundleContent(zh, en, negative = "") {
      const parts = [];
      if ((zh || "").trim()) parts.push(`中文提示词\n\n${zh.trim()}`);
      if ((en || "").trim()) parts.push(`英文提示词\n\n${en.trim()}`);
      if ((negative || "").trim()) parts.push(`负面提示词\n\n${negative.trim()}`);
      return parts.join("\n\n--------------------\n\n");
    }

    function promptPlainContent(zh, en) {
      return [zh, en].map((item) => (item || "").trim()).filter(Boolean).join("\n\n");
    }

    function downloadTextFile(content, filename) {
      try {
        const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 3000);
        return true;
      } catch (error) {
        console.warn("Text download failed", error);
        showToast("下载失败");
        return false;
      }
    }

    function downloadPromptText(text, lang, negative = "") {
      if (!text.trim()) {
        showToast("当前没有可下载的提示词");
        return;
      }
      downloadTextFile(promptDownloadContent(text, lang, negative), `${lang === "zh" ? "中文提示词" : "英文提示词"}-${Date.now()}.txt`);
    }

    function downloadPromptBundle(zh, en, negative = "") {
      const content = promptBundleContent(zh, en, negative);
      if (!content.trim()) {
        showToast("当前没有可下载的提示词");
        return;
      }
      downloadTextFile(content, `提示词合集-${Date.now()}.txt`);
    }

    function openPromptPreview(zh, en, negative = "") {
      if (!zh.trim() && !en.trim() && !negative.trim()) {
        showToast("当前没有可查看的提示词");
        return;
      }
      lightboxScale = 1;
      lightboxPan = { x: 0, y: 0 };
      activeLightbox = { src: "", mode: "prompt", nodeId: null, refIndex: null };
      activePromptPreview = { zh, en, negative };
      promptPreviewZh.textContent = zh || "暂无中文提示词";
      promptPreviewEn.textContent = en || "";
      promptPreviewNegative.innerHTML = negative.trim()
        ? `<strong>负面提示词</strong>${escapeHtml(negative.trim())}`
        : "";
      promptPreviewNegative.hidden = !negative.trim();
      lightbox.classList.remove("paint-mode");
      lightbox.classList.add("prompt-mode", "open");
      lightboxImage.src = "";
      updateLightboxScale();
    }

    async function pasteClipboardImages(event) {
      const active = document.activeElement;
      if (active && active.closest?.("input, textarea, select")) return;
      const targetId = activePasteNodeId || selectedNodeId;
      const node = nodes.find((item) => item.id === targetId && ["image", "video", "keyword", "png"].includes(item.type));
      if (!node) return;
      const clipboard = event.clipboardData;
      const files = Array.from(clipboard?.files || []).filter(isImageFile);
      const itemFiles = Array.from(event.clipboardData?.items || [])
        .filter((item) => item.kind === "file" && (item.type.startsWith("image/") || !item.type))
        .map((item) => item.getAsFile())
        .filter(isImageFile);
      const images = files.length ? files : itemFiles;
      const html = clipboard?.getData("text/html") || "";
      const plain = clipboard?.getData("text/plain") || "";
      const htmlUrls = Array.from(html.matchAll(/<img[^>]+src=["']([^"']+)["']/gi)).map((match) => match[1]);
      const plainUrls = /^data:image\//i.test(plain.trim()) || /^https?:\/\/.+\.(png|jpe?g|webp|gif|bmp|avif)(\?.*)?$/i.test(plain.trim())
        ? [plain.trim()]
        : [];
      if (!images.length && !htmlUrls.length && !plainUrls.length) return;
      event.preventDefault();
      pushHistory();
      if (images.length) await addFilesToNode(node, images);
      const urlCount = await addImageUrlsToNode(node, [...htmlUrls, ...plainUrls]);
      const total = images.length + urlCount;
      node.status = `已从剪贴板粘贴 ${total} 张参考图。`;
      selectedNodeId = node.id;
      activePasteNodeId = node.id;
      render();
      showToast("剪贴板图片已加入参考图");
    }

    function resultMetaText(node) {
      if (node.pending) return node.mediaType === "video" ? `生成中 · ${node.elapsed || 0}s` : `生成中 · ${node.elapsed || 0}s / ${generationTimeoutSeconds}s`;
      if (node.width && node.height) return `尺寸 ${node.width} × ${node.height}px${node.transparent ? ` · 模型 ${node.model || "gpt-image-2"}` : ""}`;
      if (node.mediaUrl) return `尺寸识别中`;
      return `暂无图片尺寸`;
    }

    function updateInlineReadouts(field, node) {
      if (field.dataset.field !== "ratio") return;
      const readout = field.closest(".form-row")?.querySelector("[data-ratio-readout]");
      if (readout) readout.textContent = `当前画面比例：${node.ratio}`;
    }

    function renderTinyPreview(media) {
      if (!media) return "";
      if (media.mediaType === "text") return "#";
      if (media.mediaType === "video") return "▶";
      const src = media.previewUrl || media.mediaUrl;
      return `<img src="${src}" alt="" loading="lazy" decoding="async" style="width:100%;height:100%;object-fit:contain;border-radius:8px;">`;
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function getInputMedia(targetId) {
      const link = links.find((item) => item.to === targetId);
      if (!link) return null;
      const source = nodes.find((node) => node.id === link.from);
      return source && (source.mediaUrl || normalizeReferences(source).length) ? source : null;
    }

    function getInputMediaList(targetId) {
      return links
        .filter((item) => item.to === targetId)
        .map((item) => nodes.find((node) => node.id === item.from))
        .filter((node) => node && (node.mediaUrl || normalizeReferences(node).length));
    }

    function handlePortClick(nodeIdValue, port) {
      if (port === "out") {
        linkingFrom = nodeIdValue;
        updatePendingPort();
        showToast("请选择目标节点的输入圆点");
        return;
      }

      if (!linkingFrom || linkingFrom === nodeIdValue) return;
      connectNodes(linkingFrom, nodeIdValue);
      linkingFrom = null;
      updatePendingPort();
      drawLinks();
    }

    function beginPortDrag(event, nodeIdValue) {
      linkingFrom = nodeIdValue;
      portDragState = {
        from: nodeIdValue,
        startX: event.clientX,
        startY: event.clientY,
        currentX: event.clientX,
        currentY: event.clientY,
        snapTo: null,
        moved: false
      };
      document.body.classList.add("no-select");
      updatePendingPort();
      drawLinks();
      showToast("拖到节点输入点连接，拖到空白处选择新建节点");
    }

    function finishPortDrag(nodeIdValue, port, event) {
      if (!portDragState || port !== "in" || portDragState.from === nodeIdValue) return;
      connectNodes(portDragState.from, nodeIdValue);
      linkingFrom = null;
      portDragState = null;
      document.body.classList.remove("no-select");
      updatePendingPort();
      drawLinks();
    }

    function connectNodes(from, to) {
      if (!from || !to || from === to) return;
      const normalized = normalizeConnectionDirection(from, to);
      from = normalized.from;
      to = normalized.to;
      pushHistory();
      links = links.filter((link) => !(link.from === from && link.to === to));
      links.push({ from, to });
      scheduleCanvasSave();
      showToast("节点已连接");
    }

    function normalizeConnectionDirection(from, to) {
      const fromNode = nodes.find((item) => item.id === from);
      const toNode = nodes.find((item) => item.id === to);
      if (fromNode?.type === "generator" && toNode?.type === "image") {
        return { from: to, to: from };
      }
      if (fromNode?.type === "upscale" && (toNode?.type === "image" || toNode?.type === "result")) {
        return { from: to, to: from };
      }
      return { from, to };
    }

    function linkPathData(from, to) {
      const horizontalGap = to.x - from.x;
      const verticalGap = to.y - from.y;
      if (horizontalGap >= 0 && Math.abs(horizontalGap) <= 110) {
        return `M ${from.x} ${from.y} L ${to.x} ${to.y}`;
      }
      const handle = Math.min(140, Math.max(28, Math.abs(horizontalGap) * 0.36));
      const fromHandle = horizontalGap >= 0 ? from.x + handle : from.x + Math.min(48, handle);
      const toHandle = horizontalGap >= 0 ? to.x - handle : to.x - Math.min(48, handle);
      if (Math.abs(verticalGap) < 4) return `M ${from.x} ${from.y} L ${to.x} ${to.y}`;
      return `M ${from.x} ${from.y} C ${fromHandle} ${from.y}, ${toHandle} ${to.y}, ${to.x} ${to.y}`;
    }

    function disconnectLink(from, to) {
      const exists = links.some((link) => link.from === from && link.to === to);
      if (!exists) return;
      pushHistory();
      links = links.filter((link) => !(link.from === from && link.to === to));
      drawLinks();
      scheduleCanvasSave();
      showToast("连线已断开");
    }

    function updatePendingPort() {
      canvas.querySelectorAll(".port.out").forEach((portEl) => {
        portEl.classList.toggle("pending", portEl.closest(".node")?.dataset.id === linkingFrom);
      });
    }

    function drawLinks() {
      lines.setAttribute("viewBox", "0 0 6200 4200");
      lines.setAttribute("overflow", "visible");
      lines.innerHTML = "";
      links.forEach((link) => {
        const from = getPortCenter(link.from, "out");
        const to = getPortCenter(link.to, "in");
        if (!from || !to) return;
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("class", "line-path");
        path.dataset.from = link.from;
        path.dataset.to = link.to;
        path.setAttribute("d", linkPathData(from, to));
        path.addEventListener("pointerdown", (event) => event.stopPropagation());
        path.addEventListener("dblclick", (event) => {
          event.preventDefault();
          event.stopPropagation();
          disconnectLink(link.from, link.to);
        });
        path.addEventListener("contextmenu", (event) => {
          event.preventDefault();
          event.stopPropagation();
          disconnectLink(link.from, link.to);
        });
        lines.appendChild(path);
        const cut = document.createElementNS("http://www.w3.org/2000/svg", "g");
        cut.setAttribute("class", "line-cut");
        cut.dataset.from = link.from;
        cut.dataset.to = link.to;
        cut.setAttribute("transform", `translate(${(from.x + to.x) / 2} ${(from.y + to.y) / 2})`);
        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("r", "11");
        const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
        label.textContent = "×";
        cut.appendChild(circle);
        cut.appendChild(label);
        cut.addEventListener("pointerdown", (event) => event.stopPropagation());
        cut.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          disconnectLink(link.from, link.to);
        });
        lines.appendChild(cut);
      });
      if (portDragState) {
        const from = getPortCenter(portDragState.from, "out");
        const snap = portDragState.snapTo ? getPortCenter(portDragState.snapTo, "in") : null;
        const to = snap || screenToWorld(portDragState.currentX || portDragState.startX, portDragState.currentY || portDragState.startY);
        if (from && to) {
          const tempPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
          tempPath.setAttribute("class", "line-path temp-line");
          tempPath.setAttribute("d", linkPathData(from, to));
          lines.appendChild(tempPath);
        }
      }
    }

    function getPortCenter(nodeIdValue, port) {
      const nodeEl = canvas.querySelector(`[data-id="${nodeIdValue}"]`);
      if (!nodeEl) return null;
      const node = nodes.find((item) => item.id === nodeIdValue);
      if (!node) return null;
      return {
        x: node.x + (port === "out" ? nodeEl.offsetWidth : 0),
        y: node.y + nodeEl.offsetHeight / 2
      };
    }

    function drawLinks() {
      lines.setAttribute("viewBox", "0 0 6200 4200");
      lines.setAttribute("overflow", "visible");
      const activeKeys = new Set();
      const metricCache = new Map();
      links.forEach((link) => {
        const key = `${link.from}:${link.to}`;
        activeKeys.add(key);
        const from = getPortCenterFast(link.from, "out", metricCache);
        const to = getPortCenterFast(link.to, "in", metricCache);
        if (!from || !to) return;
        let entry = linkElements.get(key);
        if (!entry) {
          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          path.setAttribute("class", "line-path");
          path.dataset.from = link.from;
          path.dataset.to = link.to;
          const cut = document.createElementNS("http://www.w3.org/2000/svg", "g");
          cut.setAttribute("class", "line-cut");
          cut.dataset.from = link.from;
          cut.dataset.to = link.to;
          const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          circle.setAttribute("r", "11");
          const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
          label.textContent = "x";
          cut.append(circle, label);
          path.addEventListener("pointerdown", (event) => event.stopPropagation());
          path.addEventListener("dblclick", (event) => {
            event.preventDefault();
            event.stopPropagation();
            disconnectLink(link.from, link.to);
          });
          path.addEventListener("contextmenu", (event) => {
            event.preventDefault();
            event.stopPropagation();
            disconnectLink(link.from, link.to);
          });
          cut.addEventListener("pointerdown", (event) => event.stopPropagation());
          cut.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            disconnectLink(link.from, link.to);
          });
          entry = { path, cut };
          linkElements.set(key, entry);
          lines.append(path, cut);
        }
        entry.path.setAttribute("d", linkPathData(from, to));
        entry.cut.setAttribute("transform", `translate(${(from.x + to.x) / 2} ${(from.y + to.y) / 2})`);
      });
      linkElements.forEach((entry, key) => {
        if (activeKeys.has(key)) return;
        entry.path.remove();
        entry.cut.remove();
        linkElements.delete(key);
      });
      if (!portDragState) {
        clearTemporaryLink();
        return;
      }
      const from = getPortCenterFast(portDragState.from, "out", metricCache);
      const snap = portDragState.snapTo ? getPortCenterFast(portDragState.snapTo, "in", metricCache) : null;
      const to = snap || screenToWorld(portDragState.currentX || portDragState.startX, portDragState.currentY || portDragState.startY);
      if (!from || !to) return;
      if (!temporaryLinkElement) {
        temporaryLinkElement = document.createElementNS("http://www.w3.org/2000/svg", "path");
        temporaryLinkElement.setAttribute("class", "line-path temp-line");
        lines.appendChild(temporaryLinkElement);
      }
      temporaryLinkElement.setAttribute("d", linkPathData(from, to));
      temporaryLinkElement.hidden = false;
    }

    function clearTemporaryLink() {
      if (temporaryLinkElement) temporaryLinkElement.remove();
      temporaryLinkElement = null;
      lines.querySelectorAll(".temp-line").forEach((element) => element.remove());
    }

    function getPortCenterFast(nodeIdValue, port, metricCache) {
      const nodeEl = canvas.querySelector(`[data-id="${nodeIdValue}"]`);
      if (!nodeEl) return null;
      const node = nodes.find((item) => item.id === nodeIdValue);
      if (!node) return null;
      let metrics = metricCache.get(nodeIdValue);
      if (!metrics) {
        metrics = { width: nodeEl.offsetWidth, height: nodeEl.offsetHeight };
        metricCache.set(nodeIdValue, metrics);
      }
      return {
        x: node.x + (port === "out" ? metrics.width : 0),
        y: node.y + metrics.height / 2
      };
    }

    function worldToScreen(point) {
      const rect = canvasWrap.getBoundingClientRect();
      return {
        x: rect.left + view.x + point.x * view.zoom,
        y: rect.top + view.y + point.y * view.zoom
      };
    }

    function nearestInputNode(clientX, clientY, fromId, maxDistance = 56) {
      let nearest = null;
      let nearestDistance = maxDistance;
      nodes.forEach((node) => {
        if (node.id === fromId) return;
        const center = getPortCenter(node.id, "in");
        if (!center) return;
        const screen = worldToScreen(center);
        const distance = Math.hypot(clientX - screen.x, clientY - screen.y);
        if (distance < nearestDistance) {
          nearest = node.id;
          nearestDistance = distance;
        }
      });
      return nearest;
    }

    function updateSnapPreview(fromId, toId) {
      canvas.querySelectorAll(".node.snap-ready").forEach((nodeEl) => nodeEl.classList.remove("snap-ready"));
      if (!fromId || !toId) return;
      canvas.querySelector(`[data-id="${fromId}"]`)?.classList.add("snap-ready");
      canvas.querySelector(`[data-id="${toId}"]`)?.classList.add("snap-ready");
    }

    function clearSnapPreview() {
      updateSnapPreview(null, null);
    }

    function connectWithSnapFeedback(from, to) {
      updateSnapPreview(from, to);
      setTimeout(() => {
        connectNodes(from, to);
        clearSnapPreview();
        scheduleDrawLinks();
      }, 180);
    }

    function startDrag(event, nodeIdValue) {
      event.stopPropagation();
      event.preventDefault();
      clearTextSelection();
      if (boxSelectedIds.length && !boxSelectedIds.includes(nodeIdValue)) clearBoxSelection();
      selectedNodeId = nodeIdValue;
      updateSelection();
      const node = nodes.find((item) => item.id === nodeIdValue);
      if (!node) return;
      const selectedGroup = boxSelectedIds.includes(nodeIdValue)
        ? boxSelectedIds
          .map((id) => nodes.find((item) => item.id === id))
          .filter((item) => item && item.id !== nodeIdValue)
        : [];
      showToast(selectedGroup.length ? `拖动 ${selectedGroup.length + 1} 个已框选节点` : "已选中节点，按 Delete 或 Enter 删除");
      const nodeEl = canvas.querySelector(`[data-id="${nodeIdValue}"]`);
      if (nodeEl) nodeEl.classList.add("dragging");
      document.body.classList.add("no-select");
      linkingFrom = null;
      portDragState = null;
      clearTemporaryLink();
      updatePendingPort();
      dragState = {
        id: nodeIdValue,
        startX: event.clientX,
        startY: event.clientY,
        nodeX: node.x,
        nodeY: node.y,
        childPositions: selectedGroup.length
          ? selectedGroup.map((item) => ({ id: item.id, x: item.x, y: item.y }))
          : node.type === "selection" && Array.isArray(node.childIds)
          ? node.childIds
            .map((id) => nodes.find((item) => item.id === id))
            .filter(Boolean)
            .map((item) => ({ id: item.id, x: item.x, y: item.y }))
          : []
      };
      panState = null;
      canvasWrap.classList.remove("is-panning");
      if (nodeEl && nodeEl.setPointerCapture) nodeEl.setPointerCapture(event.pointerId);
    }

    function beginResize(event, nodeIdValue, nodeEl) {
      const node = nodes.find((item) => item.id === nodeIdValue);
      if (!node) return;
      selectedNodeId = nodeIdValue;
      updateSelection();
      document.body.classList.add("no-select");
      resizeState = {
        id: nodeIdValue,
        startX: event.clientX,
        startY: event.clientY,
        width: nodeEl.offsetWidth,
        height: nodeEl.offsetHeight
      };
      if (nodeEl.setPointerCapture) nodeEl.setPointerCapture(event.pointerId);
    }

    window.addEventListener("pointermove", (event) => {
      if (boxSelectState) {
        event.preventDefault();
        boxSelectState.moved = boxSelectState.moved || Math.hypot(event.clientX - boxSelectState.startX, event.clientY - boxSelectState.startY) > 8;
        updateSelectionBox(event.clientX, event.clientY);
        previewBoxSelection();
        return;
      }
      if (resizeState) {
        event.preventDefault();
        const node = nodes.find((item) => item.id === resizeState.id);
        const el = canvas.querySelector(`[data-id="${resizeState.id}"]`);
        if (!node || !el) return;
        const width = Math.max(430, resizeState.width + (event.clientX - resizeState.startX) / view.zoom);
        const height = Math.max(360, resizeState.height + (event.clientY - resizeState.startY) / view.zoom);
        node.frameWidth = Math.round(width);
        node.frameHeight = Math.round(height);
        el.style.width = `${node.frameWidth}px`;
        el.style.minHeight = `${node.frameHeight}px`;
        scheduleDrawLinks();
        return;
      }
      if (portDragState) {
        const dx = event.clientX - portDragState.startX;
        const dy = event.clientY - portDragState.startY;
        portDragState.currentX = event.clientX;
        portDragState.currentY = event.clientY;
        portDragState.moved = portDragState.moved || Math.hypot(dx, dy) > 8;
        portDragState.snapTo = nearestInputNode(event.clientX, event.clientY, portDragState.from);
        updateSnapPreview(portDragState.from, portDragState.snapTo);
        scheduleDrawLinks();
      }
      if (!dragState) return;
      event.preventDefault();
      clearTextSelection();
      const node = nodes.find((item) => item.id === dragState.id);
      if (!node) return;
      node.x = dragState.nodeX + (event.clientX - dragState.startX) / view.zoom;
      node.y = dragState.nodeY + (event.clientY - dragState.startY) / view.zoom;
      const moveDx = node.x - dragState.nodeX;
      const moveDy = node.y - dragState.nodeY;
      (dragState.childPositions || []).forEach((child) => {
        const childNode = nodes.find((item) => item.id === child.id);
        if (!childNode) return;
        childNode.x = child.x + moveDx;
        childNode.y = child.y + moveDy;
        const childEl = canvas.querySelector(`[data-id="${child.id}"]`);
        if (childEl) {
          childEl.style.left = `${childNode.x}px`;
          childEl.style.top = `${childNode.y}px`;
        }
      });
      const el = canvas.querySelector(`[data-id="${node.id}"]`);
      if (el) {
        el.style.left = `${node.x}px`;
        el.style.top = `${node.y}px`;
      }
      scheduleDrawLinks();
      updatePromptLibraryPosition();
    });

    window.addEventListener("pointerup", (event) => {
      if (boxSelectState) {
        finishBoxSelection(event);
        return;
      }
      if (resizeState) {
        resizeState = null;
        scheduleCanvasSave();
      }
      if (dragState) {
        const nodeEl = canvas.querySelector(`[data-id="${dragState.id}"]`);
        if (nodeEl) nodeEl.classList.remove("dragging");
      }
      if (portDragState) {
        const targetPort = event.target.closest?.(".port.in");
        const snapTo = portDragState.snapTo || nearestInputNode(event.clientX, event.clientY, portDragState.from);
        if (snapTo) {
          connectWithSnapFeedback(portDragState.from, snapTo);
        } else if (!targetPort && portDragState.moved) {
          openLinkCreateMenu(event, portDragState.from);
        }
        linkingFrom = null;
        portDragState = null;
        clearTemporaryLink();
        updatePendingPort();
        if (!snapTo) clearSnapPreview();
        drawLinks();
      }
      document.body.classList.remove("no-select");
      dragState = null;
      panState = null;
      canvasWrap.classList.remove("is-panning");
      scheduleCanvasSave();
    });

    function openLinkCreateMenu(event, from) {
      pendingLinkCreate = {
        from,
        world: screenToWorld(event.clientX, event.clientY)
      };
      positionCanvasOverlay(linkCreateMenu, event.clientX, event.clientY);
      linkCreateMenu.classList.add("open");
      contextMenu.classList.remove("open");
      suppressMenuCloseOnce = true;
      setTimeout(() => {
        suppressMenuCloseOnce = false;
      }, 250);
      showToast("请选择要连接的新节点类型");
    }

    function createLinkedNode(type) {
      if (!pendingLinkCreate) return;
      const source = nodes.find((item) => item.id === pendingLinkCreate.from);
      const node = createNode(type, pendingLinkCreate.world.x, pendingLinkCreate.world.y - 120);
      connectNodes(pendingLinkCreate.from, node.id);
      if (source?.type === "image") {
        node.status = type === "video"
          ? "已连接参考图，可直接生成视频。"
          : type === "keyword"
          ? "已连接参考图，可反推/生成提示词。"
          : "已连接参考图，可直接生成图片。";
      }
      pendingLinkCreate = null;
      linkCreateMenu.classList.remove("open");
      render();
    }

    function beginBoxSelection(event) {
      if (event.button !== 2 || event.target.closest(".node, .context-menu, .topbar, .project-hub, .toast")) return false;
      event.preventDefault();
      event.stopPropagation();
      contextMenu.classList.remove("open");
      selectionMenu.classList.remove("open");
      clearBoxSelection();
      boxSelectState = {
        startX: event.clientX,
        startY: event.clientY,
        currentX: event.clientX,
        currentY: event.clientY,
        moved: false,
        candidates: [...canvas.querySelectorAll(".node")].map((nodeEl) => {
          const node = nodes.find((item) => item.id === nodeEl.dataset.id);
          if (!node) return null;
          return {
            id: node.id,
            element: nodeEl,
            left: node.x,
            top: node.y,
            right: node.x + nodeEl.offsetWidth,
            bottom: node.y + nodeEl.offsetHeight
          };
        }).filter(Boolean),
        previewIds: new Set(),
        previewFrame: null
      };
      document.body.classList.add("no-select");
      updateSelectionBox(event.clientX, event.clientY);
      return true;
    }

    function updateSelectionBox(clientX, clientY) {
      if (!boxSelectState) return;
      boxSelectState.currentX = clientX;
      boxSelectState.currentY = clientY;
      const wrapRect = canvasWrap.getBoundingClientRect();
      const left = Math.min(boxSelectState.startX, clientX) - wrapRect.left;
      const top = Math.min(boxSelectState.startY, clientY) - wrapRect.top;
      selectionBox.style.left = `${left}px`;
      selectionBox.style.top = `${top}px`;
      selectionBox.style.width = `${Math.abs(clientX - boxSelectState.startX)}px`;
      selectionBox.style.height = `${Math.abs(clientY - boxSelectState.startY)}px`;
      selectionBox.classList.toggle("open", boxSelectState.moved);
    }

    function previewBoxSelection() {
      if (!boxSelectState?.moved) return;
      if (boxSelectState.previewFrame) return;
      boxSelectState.previewFrame = requestAnimationFrame(() => {
        if (!boxSelectState) return;
        boxSelectState.previewFrame = null;
        const ids = selectedCandidateIds(boxSelectState);
        boxSelectState.candidates.forEach((candidate) => {
          const selected = ids.has(candidate.id);
          if (boxSelectState.previewIds.has(candidate.id) === selected) return;
          candidate.element.classList.toggle("box-selected", selected);
        });
        boxSelectState.previewIds = ids;
      });
    }

    function selectedCandidateIds(state) {
      const start = screenToWorld(state.startX, state.startY);
      const current = screenToWorld(state.currentX, state.currentY);
      const rect = {
        left: Math.min(start.x, current.x),
        top: Math.min(start.y, current.y),
        right: Math.max(start.x, current.x),
        bottom: Math.max(start.y, current.y)
      };
      return new Set(state.candidates.filter((candidate) => rectsIntersect(rect, candidate)).map((candidate) => candidate.id));
    }

    function finishBoxSelection(event) {
      const state = boxSelectState;
      boxSelectState = null;
      if (state?.previewFrame) cancelAnimationFrame(state.previewFrame);
      document.body.classList.remove("no-select");
      if (!state?.moved) {
        selectionBox.classList.remove("open");
        clearBoxSelection();
        return;
      }
      suppressNextContextMenu = true;
      selectionBox.classList.remove("open");
      boxSelectedIds = [...selectedCandidateIds(state)];
      if (!boxSelectedIds.length) {
        clearBoxSelection();
        return;
      }
      boxSelectedIds.forEach((id) => canvas.querySelector(`[data-id="${id}"]`)?.classList.add("box-selected"));
      positionCanvasOverlay(selectionMenu, event.clientX, event.clientY);
      selectionMenu.classList.add("open");
      suppressMenuCloseOnce = true;
      setTimeout(() => {
        suppressMenuCloseOnce = false;
      }, 250);
      showToast(`已框选 ${boxSelectedIds.length} 个节点`);
    }

    function rectsIntersect(a, b) {
      return !(a.right < b.left || a.left > b.right || a.bottom < b.top || a.top > b.bottom);
    }

    function clearBoxSelection() {
      boxSelectedIds = [];
      canvas.querySelectorAll(".node.box-selected").forEach((nodeEl) => nodeEl.classList.remove("box-selected"));
      selectionMenu.classList.remove("open");
    }

    function autoArrangeSelection() {
      const selected = boxSelectedIds.map((id) => nodes.find((node) => node.id === id)).filter(Boolean);
      if (!selected.length) return;
      pushHistory();
      arrangeWorkflowSelection(selected);
      render();
      showToast("已自动排列所选节点");
    }

    function arrangeNodesTightly(selected, offsetX = 0, offsetY = 0) {
      const sorted = [...selected].sort((a, b) => (a.y - b.y) || (a.x - b.x));
      const originX = Math.min(...selected.map((node) => node.x)) + offsetX;
      const originY = Math.min(...selected.map((node) => node.y)) + offsetY;
      const totalArea = sorted.reduce((sum, node) => sum + estimatedNodeWidth(node) * estimatedNodeHeight(node), 0);
      const targetWidth = Math.max(720, Math.sqrt(totalArea) * 1.35);
      const gapX = 28;
      const gapY = 28;
      let cursorX = originX;
      let cursorY = originY;
      let rowHeight = 0;
      sorted.forEach((node, index) => {
        const width = estimatedNodeWidth(node);
        const height = estimatedNodeHeight(node);
        if (index > 0 && cursorX + width > originX + targetWidth) {
          cursorX = originX;
          cursorY += rowHeight + gapY;
          rowHeight = 0;
        }
        node.x = cursorX;
        node.y = cursorY;
        cursorX += width + gapX;
        rowHeight = Math.max(rowHeight, height);
      });
      const minX = Math.min(...sorted.map((node) => node.x));
      const minY = Math.min(...sorted.map((node) => node.y));
      const maxX = Math.max(...sorted.map((node) => node.x + estimatedNodeWidth(node)));
      const maxY = Math.max(...sorted.map((node) => node.y + estimatedNodeHeight(node)));
      return { minX, minY, width: maxX - minX, height: maxY - minY };
    }

    function arrangeWorkflowSelection(selected) {
      const left = selected.filter((node) => node.type === "image").sort(sortNodesByCanvasPosition);
      const middle = selected
        .filter((node) => ["generator", "video", "keyword", "png"].includes(node.type))
        .sort(sortNodesByCanvasPosition);
      const right = selected.filter((node) => node.type === "result").sort(sortNodesByCanvasPosition);
      const classified = new Set([...left, ...middle, ...right].map((node) => node.id));
      const other = selected
        .filter((node) => !classified.has(node.id) && node.type !== "selection")
        .sort(sortNodesByCanvasPosition);
      const originX = Math.min(...selected.map((node) => node.x));
      const originY = Math.min(...selected.map((node) => node.y));
      const columnGap = 96;
      const leftWidth = Math.max(300, maxEstimatedWidth(left));
      const middleWidth = Math.max(520, maxEstimatedWidth([...middle, ...other]));
      const resultWidth = Math.max(320, maxEstimatedWidth(right));
      const leftX = originX;
      const middleX = leftX + leftWidth + columnGap;
      const rightX = middleX + middleWidth + columnGap;
      layoutVerticalColumn(left, leftX, originY);
      layoutVerticalColumn([...middle, ...other], middleX, originY);
      layoutResultGrid(right, rightX, originY, resultWidth);
    }

    function layoutVerticalColumn(items, x, y) {
      let cursorY = y;
      items.forEach((node) => {
        node.x = x;
        node.y = cursorY;
        cursorY += estimatedNodeHeight(node) + 34;
      });
    }

    function layoutResultGrid(items, x, y, fallbackWidth = 320) {
      const sorted = [...items];
      if (!sorted.length) return;
      const columns = sorted.length === 1 ? 1 : sorted.length <= 4 ? 2 : 3;
      const columnWidths = Array.from({ length: columns }, () => 0);
      const rowHeights = [];
      sorted.forEach((node, index) => {
        const col = index % columns;
        const row = Math.floor(index / columns);
        columnWidths[col] = Math.max(columnWidths[col], estimatedNodeWidth(node), fallbackWidth);
        rowHeights[row] = Math.max(rowHeights[row] || 0, estimatedNodeHeight(node));
      });
      const columnX = [];
      let cursorX = x;
      for (let col = 0; col < columns; col++) {
        columnX[col] = cursorX;
        cursorX += columnWidths[col] + 34;
      }
      const rowY = [];
      let cursorY = y;
      for (let row = 0; row < rowHeights.length; row++) {
        rowY[row] = cursorY;
        cursorY += rowHeights[row] + 34;
      }
      sorted.forEach((node, index) => {
        const col = index % columns;
        const row = Math.floor(index / columns);
        node.x = columnX[col];
        node.y = rowY[row];
      });
    }

    function sortNodesByCanvasPosition(a, b) {
      return (a.y - b.y) || (a.x - b.x);
    }

    function maxEstimatedWidth(items) {
      if (!items.length) return 0;
      return Math.max(...items.map((node) => estimatedNodeWidth(node)));
    }

    function estimatedNodeWidth(node) {
      return node.frameWidth || nodeWidth(node);
    }

    function deleteSelectionNodes() {
      if (!boxSelectedIds.length) return;
      if (!window.confirm(`确认删除选中的 ${boxSelectedIds.length} 个节点吗？`)) return;
      boxSelectedIds.forEach((id) => canvas.querySelector(`[data-id="${id}"]`)?.classList.add("deleting-confirm"));
      pushHistory();
      const selected = new Set(boxSelectedIds);
      nodes.forEach((node) => {
        if (selected.has(node.id)) archiveDeletedResult(node);
      });
      nodes = nodes.filter((node) => !selected.has(node.id));
      links = links.filter((link) => !selected.has(link.from) && !selected.has(link.to));
      clearBoxSelection();
      render();
      showToast("已删除所选节点");
    }

    canvasWrap.addEventListener("pointerdown", (event) => {
      if (beginBoxSelection(event)) return;
      if (event.target.closest(".node") || event.target.closest(".topbar") || event.target.closest(".project-hub") || event.target.closest(".toast") || event.target.closest(".context-menu")) return;
      clearBoxSelection();
      clearTextSelection();
      panState = {
        startX: event.clientX,
        startY: event.clientY,
        viewX: view.x,
        viewY: view.y
      };
      canvasWrap.classList.add("is-panning");
      document.body.classList.add("no-select");
      canvasWrap.setPointerCapture(event.pointerId);
    });

    window.addEventListener("pointermove", (event) => {
      if (!panState || dragState) return;
      view.x = panState.viewX + event.clientX - panState.startX;
      view.y = panState.viewY + event.clientY - panState.startY;
      scheduleCanvasTransform();
    });

    canvasWrap.addEventListener("wheel", (event) => {
      event.preventDefault();
      markZoomInteraction();
      const before = screenToWorld(event.clientX, event.clientY);
      const factor = event.deltaY < 0 ? 1.08 : 0.92;
      view.zoom = Math.max(0.12, Math.min(2.5, view.zoom * factor));
      const rect = canvasWrap.getBoundingClientRect();
      view.x = event.clientX - rect.left - before.x * view.zoom;
      view.y = event.clientY - rect.top - before.y * view.zoom;
      scheduleCanvasTransform();
      scheduleCanvasSave();
    }, { passive: false });

    canvasWrap.addEventListener("contextmenu", (event) => {
      if (boxSelectState) {
        event.preventDefault();
        return;
      }
      if (suppressNextContextMenu) {
        event.preventDefault();
        suppressNextContextMenu = false;
        return;
      }
      if (event.target.closest(".node") || event.target.closest(".topbar") || event.target.closest(".project-hub")) return;
      event.preventDefault();
      contextMenuWorld = screenToWorld(event.clientX, event.clientY);
      positionCanvasOverlay(contextMenu, event.clientX, event.clientY);
      contextMenu.classList.add("open");
    });

    window.addEventListener("click", (event) => {
      if (suppressMenuCloseOnce) return;
      if (!event.target.closest(".context-menu")) contextMenu.classList.remove("open");
      if (!event.target.closest("#selectionMenu")) selectionMenu.classList.remove("open");
      if (!event.target.closest("#linkCreateMenu")) linkCreateMenu.classList.remove("open");
      if (!projectHubPinned && !event.target.closest("#projectHub")) projectHub.classList.remove("open");
      if (!event.target.closest("#projectMenu")) projectMenu.classList.remove("open");
      if (!event.target.closest("#settingsPopover") && !event.target.closest("#settingsButton")) {
        setSettingsOpen(false);
      }
    });

    function clearTextSelection() {
      const selection = window.getSelection && window.getSelection();
      if (selection && selection.rangeCount) selection.removeAllRanges();
    }

    function deleteNode(id) {
      pushHistory();
      const node = nodes.find((item) => item.id === id);
      archiveDeletedResult(node);
      nodes = nodes.filter((node) => node.id !== id);
      links = links.filter((link) => link.from !== id && link.to !== id);
      render();
    }

    function promptUploadForNode(id) {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = "image/*,video/*";
      input.addEventListener("change", async () => {
        const file = input.files[0];
        if (!file) return;
        const node = nodes.find((item) => item.id === id);
        if (!node) return;
        if (node.type === "png" && isImageFile(file)) {
          await replaceFilesInNode(node, [file]);
          node.ratio = "Auto自适应";
        } else if (node.type === "image" && isImageFile(file)) {
          await addFilesToNode(node, [file]);
        } else {
          node.mediaUrl = file.type.startsWith("image") ? await compressImageFileToDataUrl(file) : await readFileAsDataUrl(file);
          node.mediaType = file.type.startsWith("video") ? "video" : "image";
        }
        node.status = "素材已上传。";
        render();
      });
      input.click();
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error || new Error("文件读取失败"));
        reader.readAsDataURL(file);
      });
    }

    function getImageDimensions(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve({ width: img.naturalWidth, height: img.naturalHeight });
        img.onerror = () => resolve({});
        img.src = src;
      });
    }

    async function generateFromNode(id) {
      const node = nodes.find((item) => item.id === id);
      if (!node) return;
      if (!apiKeyInput.value.trim()) {
        setSettingsOpen(true);
        apiKeyInput.focus();
        showToast("生成前必须先填写 API 密钥");
        return;
      }
      const saveHandle = nativeAutoSaveDirectory || autoSaveDirectoryHandle || await loadAutoSaveDirectoryHandle();
      const saveReady = nativeAutoSaveDirectory || (saveHandle && await hasAutoSaveDirectoryPermission(saveHandle, true));
      if (!saveReady) {
        showToast("生成前必须先设置英文名称的强制保存位置");
        await chooseAutoSaveDirectory();
        return;
      }
      const inputMedia = getInputMedia(node.id);
      const inputMediaList = getInputMediaList(node.id);
      const referenceSources = node.type === "png"
        ? [node]
        : [
          ...(inputMediaList.length ? inputMediaList : inputMedia ? [inputMedia] : []),
          node
        ];
      let references = collectReferenceItems(referenceSources);
      if (node.type === "upscale") references = references.slice(0, 1);
      await ensureReferenceDimensions(references);
      if (node.type === "upscale" && !references.length) {
        node.status = "请先上传图片，或连接一个参考图/效果图节点。";
        render();
        return;
      }
      const autoOptions = {
        randomAuto: node.type === "generator" || node.type === "video",
        prompt: node.prompt
      };
      const fixedVideoRatio = node.type === "video" ? fixedVideoAspectRatio(node.model) : "";
      const sizeDecision = node.type === "png"
        ? { size: transparentTargetSize(references, node.resolution), source: "透明 PNG 原图比例" }
        : fixedVideoRatio
        ? { size: sizeFromRatio(fixedVideoRatio, node.resolution, [], { prompt: "" }), source: `视频模型固定 ${fixedVideoRatio}` }
        : sizeDecisionFromRatio(node.ratio, node.resolution, references, autoOptions);
      const targetSize = sizeDecision.size;
      const count = node.type === "keyword" || node.type === "png" || node.type === "upscale"
        ? 1
        : node.type === "video"
        ? (videoCountOptions.includes(Number(node.count)) ? Number(node.count) : 1)
        : Math.max(1, Math.min(9, Number(node.count) || 1));
      const pendingNodes = [];
      const parsed = parseSize(targetSize);

      if (node.type === "keyword") {
        if (node.promptReverseMode === "text" && !(node.prompt || "").trim()) {
          node.status = "请先输入文字需求，再生成提示词。";
          render();
          return;
        }
        setNodeStatus(id, "正在反推/生成提示词...");
        try {
          const apiResult = await callApi({ ...node, count: 1 }, new AbortController().signal);
          node.text = apiResult.text || "";
          node.status = apiResult.fromApi ? "提示词提取完成。" : "演示提示词已生成。";
        } catch (error) {
          node.status = `提示词提取失败：${friendlyApiError(error)}`;
        }
        render();
        return;
      }

      const layout = resultGridPositioner(node, count, parsed);
      for (let index = 0; index < count; index++) {
        const position = layout(index);
        const isLandscapeResult = parsed.width > parsed.height && node.type !== "video";
        const pending = createNode("result", position.x, position.y, {
          title: node.type === "keyword" ? "反推/生成提示词" : node.type === "video" ? "效果视频" : node.type === "png" ? "透明PNG效果图" : node.type === "upscale" ? "4K效果图" : "效果图",
          ratio: node.ratio,
          width: parsed.width,
          height: parsed.height,
          frameWidth: isLandscapeResult ? 600 : undefined,
          model: node.model,
          mediaType: node.type === "video" ? "video" : node.type === "keyword" ? "text" : "image",
          transparent: node.type === "png",
          pending: true,
          elapsed: 0,
          status: node.type === "video" ? "正在生成视频，已等待 0s。" : `正在生成，已等待 0s，最多 ${generationTimeoutSeconds}s。`
        });
        links.push({ from: node.id, to: pending.id });
        pendingNodes.push(pending);
      }

      render();
      if (pendingNodes.length >= 6) fitCanvasToContent(true);
      setNodeStatus(id, "正在生成，已创建效果图窗口...");
      const timer = setInterval(() => {
        pendingNodes.forEach((pending) => {
          if (!pending.pending) return;
          if (pending.apiReturned) {
            const text = `接口已返回，用时 ${pending.apiSeconds || pending.elapsed || 0}s，正在处理显示...`;
            pending.status = text;
            updatePendingElapsed(pending.id, pending.apiSeconds || pending.elapsed || 0, text);
            setNodeStatus(pending.id, text);
            return;
          }
          pending.elapsed = node.type === "video" ? (pending.elapsed || 0) + 1 : Math.min(generationTimeoutSeconds, (pending.elapsed || 0) + 1);
          pending.status = node.type === "video" ? `正在生成视频，已等待 ${pending.elapsed}s。` : `正在生成，已等待 ${pending.elapsed}s，最多 ${generationTimeoutSeconds}s。`;
          updatePendingElapsed(pending.id, pending.elapsed);
          setNodeStatus(pending.id, pending.status);
        });
      }, 1000);

      if (node.type === "generator" && pendingNodes.length > 1) {
        let nextIndex = 0;
        const workerCount = Math.min(2, pendingNodes.length);
        const workers = Array.from({ length: workerCount }, async () => {
          while (nextIndex < pendingNodes.length) {
            const index = nextIndex++;
            await generateOneResult(node, pendingNodes[index], index, targetSize);
            await saveCanvasState();
            refreshRenderedNode(pendingNodes[index].id);
          }
        });
        await Promise.all(workers);
      } else {
        for (let index = 0; index < pendingNodes.length; index++) {
          await generateOneResult(node, pendingNodes[index], index, targetSize);
          await saveCanvasState();
          refreshRenderedNode(pendingNodes[index].id);
        }
      }
      clearInterval(timer);
      const failed = pendingNodes.filter((pending) => !pending.mediaUrl && pending.mediaType !== "text").length;
      node.status = failed ? `已完成，${failed} 张失败。` : "接口返回成功。";
      render();
      await saveCanvasState();
    }

    function resultGridPositioner(node, count, parsed = { width: 1024, height: 1024 }) {
      const columns = count === 4 ? 2 : count >= 5 ? 3 : count;
      const isLandscape = parsed.width > parsed.height;
      const resultWidth = isLandscape ? 600 : 300;
      const resultHeight = isLandscape ? Math.max(280, Math.round(resultWidth * parsed.height / Math.max(1, parsed.width)) + 150) : 440;
      const gapX = resultWidth + 40;
      const gapY = resultHeight + 40;
      const startX = node.x + nodeWidth(node) + 110;
      const existing = links
        .filter((link) => link.from === node.id)
        .map((link) => nodes.find((item) => item.id === link.to))
        .filter((item) => item?.type === "result");
      const startY = existing.length
        ? Math.max(...existing.map((item) => item.y + estimatedNodeHeight(item))) + 50
        : node.y + 12;
      return (index) => ({
        x: startX + (index % columns) * Math.max(gapX, resultWidth + 40),
        y: startY + Math.floor(index / columns) * gapY
      });
    }

    function estimatedNodeHeight(node) {
      const width = node.frameWidth || nodeWidth(node);
      const mediaHeight = node.width && node.height ? Math.round(width * node.height / Math.max(1, node.width)) : 260;
      return Math.max(260, mediaHeight + 150);
    }

    function fitCanvasToContent(onlyShrink = false) {
      const visibleNodes = nodes.filter((item) => item?.type !== "selection");
      if (!visibleNodes.length) return;
      const rect = canvasWrap.getBoundingClientRect();
      const left = Math.min(...visibleNodes.map((item) => item.x));
      const top = Math.min(...visibleNodes.map((item) => item.y));
      const right = Math.max(...visibleNodes.map((item) => item.x + estimatedNodeWidth(item)));
      const bottom = Math.max(...visibleNodes.map((item) => item.y + estimatedNodeHeight(item)));
      const contentWidth = Math.max(1, right - left);
      const contentHeight = Math.max(1, bottom - top);
      const fittedZoom = Math.max(0.12, Math.min(0.9, (rect.width - 120) / contentWidth, (rect.height - 120) / contentHeight));
      if (onlyShrink && fittedZoom >= view.zoom) return;
      view.zoom = fittedZoom;
      view.x = (rect.width - contentWidth * view.zoom) / 2 - left * view.zoom;
      view.y = (rect.height - contentHeight * view.zoom) / 2 - top * view.zoom;
      applyCanvasTransform();
      scheduleCanvasSave();
    }

    function isRetryableGenerationError(error) {
      const message = String(error?.message || error || "");
      return !/HTTP 4(?:00|01|03|04)|额度不足|spending limit|credits|model.not.found|No available channel|invalid api|API 密钥/i.test(message);
    }

    function generationRetryDelay(attempt) {
      return new Promise((resolve) => setTimeout(resolve, 1200 * attempt));
    }

    async function generateOneResult(sourceNode, pending, index, targetSize, attempt = 1) {
      const controller = new AbortController();
      const timeout = sourceNode.type === "video" ? 0 : setTimeout(() => controller.abort(), generationTimeoutMs);
      const totalStartedAt = Date.now();
      try {
        if (sourceNode.type === "png") {
          const reference = collectReferenceItems([sourceNode])[0];
          if (!reference?.url) throw new Error("请先上传一张需要抠图的原图。");
          let maskUrl = "";
          let apiSeconds = 0;
          try {
            const apiStartedAt = Date.now();
            const apiResult = await callApi({ ...sourceNode, count: 1 }, controller.signal);
            apiSeconds = Math.max(1, Math.round((Date.now() - apiStartedAt) / 1000));
            pending.apiReturned = true;
            pending.apiSeconds = apiSeconds;
            pending.status = `接口已返回，用时 ${apiSeconds}s，正在处理透明底...`;
            setNodeStatus(pending.id, pending.status);
            maskUrl = apiResult.urls?.[0] || apiResult.url || "";
          } catch (maskError) {
            console.warn("PNG mask model fallback", maskError);
          }
          const url = maskUrl
            ? await makeTransparentPngFromOriginalAndMask(reference.url, maskUrl, targetSize)
            : await makeTransparentPngDataUrl(reference.url, targetSize);
          const parsed = parseSize(targetSize);
          pending.pending = false;
          pending.mediaUrl = url;
          pending.previewUrl = url;
          pending.fullUrl = url;
          pending.mediaType = "image";
          pending.transparent = true;
          pending.text = "";
          pending.width = parsed.width;
          pending.height = parsed.height;
          pending.references = [{ url, mediaType: "image", width: parsed.width, height: parsed.height, name: pending.title || "透明PNG效果图" }];
          const totalSeconds = Math.max(1, Math.round((Date.now() - totalStartedAt) / 1000));
          pending.status = apiSeconds
            ? `透明 PNG 已生成。接口用时 ${apiSeconds}s，页面总用时 ${totalSeconds}s，可下载。`
            : "透明 PNG 已从原图抠出，未重新绘制主体，可放大预览、收藏和下载。";
          setNodeStatus(pending.id, pending.status);
          await autoSaveGeneratedNodeMedia(pending);
          await saveCanvasState();
          return;
        }
        const apiStartedAt = Date.now();
        const forceExactOutput = sourceNode.type === "generator" && modelToApiModel(sourceNode.model) === "gpt-image-2";
        const needsClientUpscale = forceExactOutput && String(sourceNode.resolution || "1K").toUpperCase() !== "1K";
        const requestNode = {
          ...sourceNode,
          count: 1,
          _targetSize: targetSize,
          _apiTargetSize: forceExactOutput ? oneKGenerationSizeForTarget(targetSize) : targetSize,
          _forceBaseGeneration: forceExactOutput
        };
        const apiResult = await callApi(requestNode, controller.signal);
        const apiSeconds = Math.max(1, Math.round((Date.now() - apiStartedAt) / 1000));
        pending.apiReturned = true;
        pending.apiSeconds = apiSeconds;
        pending.status = apiResult.mediaType === "video"
          ? `接口已返回，用时 ${apiSeconds}s，正在处理视频显示...`
          : `接口已返回，用时 ${apiSeconds}s，正在处理图片显示...`;
        setNodeStatus(pending.id, pending.status);
        const rawUrl = apiResult.urls?.[0] || apiResult.url || "";
        // GPT 图片接口只负责返回同画幅的基础图；选择 2K/4K 时，页面强制
        // 放大并校验到目标像素。预览、下载和自动保存统一使用处理后的原图。
        const url = apiResult.mediaType === "image" && rawUrl
          ? (sourceNode.type === "png"
            ? await normalizeGeneratedImage(rawUrl, targetSize, true)
            : forceExactOutput
            ? await normalizeGeneratedImage(rawUrl, targetSize, false, true)
            : rawUrl)
          : rawUrl;
        const previewUrl = apiResult.mediaType === "image" && url
          ? await createPreviewImageUrl(url, 320, sourceNode.type === "png")
          : "";
        const parsed = parseSize(targetSize);
        pending.pending = false;
        pending.mediaUrl = url;
        pending.previewUrl = previewUrl || url;
        pending.fullUrl = url;
        pending.sourceUrl = rawUrl;
        pending.mediaType = apiResult.mediaType;
        pending.transparent = sourceNode.type === "png";
        pending.text = apiResult.text || "";
        pending.width = parsed.width;
        pending.height = parsed.height;
        pending.references = apiResult.mediaType === "image" && url
          ? [{ url, mediaType: "image", width: parsed.width, height: parsed.height, name: pending.title || "效果图" }]
          : [];
        const totalSeconds = Math.max(1, Math.round((Date.now() - totalStartedAt) / 1000));
        pending.status = sourceNode.type === "png"
          ? (apiResult.fromApi ? "透明 PNG 已生成，可放大预览、收藏和下载。" : "透明 PNG 演示图已生成，可下载测试。")
          : apiResult.fromApi ? `接口生成完成。接口用时 ${apiSeconds}s，页面总用时 ${totalSeconds}s，可下载。` : "演示生成完成，可下载。";
        setNodeStatus(pending.id, pending.status);
        await autoSaveGeneratedNodeMedia(pending);
        await saveCanvasState();
      } catch (error) {
        if (sourceNode.type === "generator" && attempt < 3 && isRetryableGenerationError(error)) {
          if (timeout) clearTimeout(timeout);
          pending.pending = true;
          pending.status = `第 ${index + 1} 张正在重试（${attempt}/2）...`;
          setNodeStatus(pending.id, pending.status);
          await generationRetryDelay(attempt);
          return generateOneResult(sourceNode, pending, index, targetSize, attempt + 1);
        }
        pending.pending = false;
        pending.status = `第 ${index + 1} 张生成失败：${friendlyApiError(error)}`;
        setNodeStatus(pending.id, pending.status);
        await saveCanvasState();
      } finally {
        if (timeout) clearTimeout(timeout);
      }
    }

    function setNodeStatus(id, text) {
      const node = nodes.find((item) => item.id === id);
      if (!node) return;
      const publicText = publicNodeStatus(text);
      node.status = publicText;
      const el = canvas.querySelector(`[data-id="${id}"] .status`);
      if (el) el.textContent = publicText;
      const generateButton = canvas.querySelector(`[data-id="${id}"] [data-generate]`);
      if (generateButton) generateButton.classList.toggle("generating", /^正在生成/.test(publicText));
    }

    function updatePendingElapsed(id, seconds, overrideText = "") {
      const el = canvas.querySelector(`[data-id="${id}"] [data-elapsed]`);
      if (el) {
        if (overrideText) {
          el.textContent = overrideText;
          return;
        }
        const node = nodes.find((item) => item.id === id);
        el.textContent = node?.mediaType === "video" ? `已等待 ${seconds}s` : `已等待 ${seconds}s，最多 ${generationTimeoutSeconds}s`;
      }
    }

    function nodeWidth(node) {
      if (node.frameWidth) return node.frameWidth;
      if (node.type === "generator") return 520;
      if (node.type === "keyword") return 460;
      if (node.type === "video") return 420;
      if (node.type === "png") return 420;
      if (node.type === "upscale") return 430;
      if (node.type === "selection") return 760;
      return 300;
    }

    async function refineNodePrompt(node) {
      const source = String(node.prompt || "").trim();
      if (!source) {
        showToast("请先输入需要修改的提示词");
        return;
      }
      if (!apiKeyInput.value.trim()) {
        showToast("请先在右上角设置 API 密钥");
        settingsPopover.classList.add("open");
        apiKeyInput.focus();
        return;
      }
      node.promptRefineLoading = true;
      node.promptRefineResult = "";
      render();
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 120000);
      try {
        const language = /[\u3400-\u9fff]/.test(source) ? "中文" : "英文";
        const configuredUrl = apiUrlInput.value.trim() || defaultApiBaseUrl();
        const headers = { "Content-Type": "application/json", Authorization: `Bearer ${apiKeyInput.value.trim()}` };
        const model = promptModelOptions.includes(node.promptRefineModel) ? node.promptRefineModel : "GPT";
        const response = await postChatCompletion(configuredUrl, headers, {
          model: modelToPromptModel(model),
          messages: [
            { role: "system", content: `你是专业的 AI 绘图提示词编辑器。请优化用户提供的提示词，使画面描述、构图、光线、材质与细节更清晰。必须保持原意，不添加解释，不输出标题，只返回一个修改后的${language}提示词。输入是中文就只输出中文，输入是英文就只输出英文。` },
            { role: "user", content: source }
          ],
          temperature: 0.65
        }, controller.signal);
        node.promptRefineResult = String(response.text || "").trim();
        if (!node.promptRefineResult) throw new Error("接口没有返回修改后的提示词");
      } catch (error) {
        node.promptRefineResult = `修改失败：${friendlyErrorMessage(error)}`;
      } finally {
        clearTimeout(timeout);
        node.promptRefineLoading = false;
        node.promptRefineOpen = true;
        render();
      }
    }

    async function callApi(node, signal) {
      const configuredUrl = apiUrlInput.value.trim() || defaultApiBaseUrl();
      if (!configuredUrl) return createDemoResult(node);

      const inputMedia = getInputMedia(node.id);
      const inputMediaList = getInputMediaList(node.id);
      const referenceSources = node.type === "png"
        ? [node]
        : [
          ...(inputMediaList.length ? inputMediaList : inputMedia ? [inputMedia] : []),
          node
      ];
      const references = collectReferenceItems(referenceSources);
      const jsonHeaders = { "Content-Type": "application/json" };
      if (apiKeyInput.value.trim()) jsonHeaders.Authorization = `Bearer ${apiKeyInput.value.trim()}`;
      if (node.type !== "video" && node.type !== "keyword" && node.type !== "png" && isNanoBananaModel(modelToApiModel(node.model))) {
        return callNanoBananaApi(node, references, configuredUrl, jsonHeaders, signal);
      }
      const request = await buildApiRequest(node, references);
      const headers = request.isFormData ? {} : { ...jsonHeaders };
      if (request.isFormData && apiKeyInput.value.trim()) headers.Authorization = `Bearer ${apiKeyInput.value.trim()}`;

      let url = normalizeApiEndpoint(configuredUrl, node, references.length > 0 && !request.forceGenerationEndpoint);
      if (request.forceGenerationEndpoint) {
        url = url.replace(/\/v1\/images\/edits\/?$/i, "/v1/images/generations");
      }

      let response;
      try {
        response = await fetchMaybeProxied(url, {
          method: "POST",
          headers,
          body: request.body,
          signal
        });
        if (!response.ok && node.type === "video" && response.status === 404) {
          const retryUrl = alternateVideoGenerationEndpoint(url);
          if (retryUrl !== url) {
            response = await fetchMaybeProxied(retryUrl, {
              method: "POST",
              headers,
              body: request.body,
              signal
            });
            url = retryUrl;
          }
        }
      } catch (error) {
        throw new Error("网络请求被浏览器拦截或接口不可访问。常见原因：接口未开启 CORS、地址填错、HTTPS/HTTP 混用，或本地 file 页面不能直连该接口。");
      }

      const raw = await response.text();
      if (!response.ok) {
        if (node.type === "keyword" && node.promptReverseMode === "image" && node.model !== "Gemini") {
          return callKeywordImageReverseWithVisionBridge(node, references, configuredUrl, jsonHeaders, signal);
        }
        throw new Error(`HTTP ${response.status} ${response.statusText}${raw ? `：${raw.slice(0, 180)}` : ""}`);
      }

      const mediaFromPlainText = extractMediaUrl(raw);
      if (mediaFromPlainText && !looksLikeHtml(raw)) {
        return {
          url: mediaFromPlainText,
          urls: extractMediaUrls(raw),
          mediaType: node.type === "video" ? "video" : "image",
          fromApi: true
        };
      }
      if (node.type === "video" && /^data:\s*/m.test(raw)) {
        const streamText = extractSseText(raw);
        const streamMedia = extractMediaUrl(streamText);
        if (streamMedia) {
          return {
            url: streamMedia,
            urls: extractMediaUrls(streamText),
            mediaType: "video",
            fromApi: true
          };
        }
        throw new Error(`Veo 流式请求已返回进度，但没有最终视频地址：${streamText.slice(0, 220) || raw.slice(0, 220)}`);
      }

      if (node.type === "keyword" && /^data:\s*/m.test(raw)) {
        const streamText = extractSseText(raw);
        if (!streamText) throw new Error("接口只返回了用量信息，没有返回提示词正文。");
        return {
          text: streamText,
          mediaType: "text",
          fromApi: true
        };
      }

      let data;
      try {
        data = raw ? JSON.parse(raw) : {};
      } catch (error) {
        throw new Error(`接口返回不是可识别结果。当前请求地址：${url}。返回内容像网页或普通文本：${raw.slice(0, 180)}`);
      }
      const returnedError = extractApiErrorMessage(data);
      if (returnedError) throw new Error(`接口返回错误：${returnedError}`);
      if (node.type === "keyword") {
        return {
          text: extractText(data) || extractMediaUrl(data) || "接口已返回，但没有找到文本字段。",
          mediaType: "text",
          fromApi: true
        };
      }
      const videoTaskId = node.type === "video" ? extractVideoTaskId(data) : "";
      if (videoTaskId && !extractMediaUrl(data)) {
        const pollUrl = videoPollEndpoint(url, videoTaskId);
        data = await pollVideoResult(pollUrl, headers, signal, node.type === "video");
      }
      const mediaUrl = extractMediaUrl(data);
      if (!mediaUrl) throw new Error(`接口返回里没有找到图片或视频地址（返回结构：${describeApiResponseShape(data)}）`);
      return {
        url: mediaUrl,
        urls: extractMediaUrls(data),
        mediaType: node.type === "video" ? "video" : "image",
        fromApi: true
      };
    }

    async function postChatCompletion(configuredUrl, headers, body, signal) {
      const url = normalizeApiEndpoint(configuredUrl, { type: "keyword" }, false);
      const response = await fetchMaybeProxied(url, {
        method: "POST",
        headers,
        body: JSON.stringify({ ...body, stream: true }),
        signal
      });
      const raw = await response.text();
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}${raw ? `：${raw.slice(0, 180)}` : ""}`);
      }
      if (/^data:\s*/m.test(raw)) {
        const streamText = extractSseText(raw);
        if (!streamText) throw new Error("接口只返回了用量信息，没有返回提示词正文。");
        return { raw, text: streamText };
      }
      try {
        const data = raw ? JSON.parse(raw) : {};
        return { raw, data, text: extractText(data) };
      } catch (error) {
        return { raw, text: raw };
      }
    }

    async function callKeywordImageReverseWithVisionBridge(node, references, configuredUrl, headers, signal) {
      if (!references.length) throw new Error("图片反推需要先上传或连接参考图。");
      const targetSize = sizeFromRatio(node.ratio, node.resolution, references);
      const formatInstruction = node.promptFormat === "sentence"
        ? "提示词请写成一整句，用逗号自然连接，不要分行排列。"
        : "提示词请按段落方式一句一句分行排列，便于复制和编辑。";
      const visionPrompt = `${node.prompt || ""}

请详细描述参考图里的主体、场景、构图、光影、风格、颜色、文字元素和商业用途。只输出图像描述，不要生成提示词。`;
      const vision = await postChatCompletion(configuredUrl, headers, {
        model: modelToPromptModel("Gemini"),
        messages: [
          { role: "system", content: "你是图像理解助手。只描述图片内容，不要使用工具。" },
          { role: "user", content: messageContentFor({ ...node, prompt: visionPrompt }, references, targetSize) }
        ]
      }, signal);
      const description = (vision.text || extractText(vision.data) || "").trim();
      if (!description) throw new Error("图片识别没有返回可用描述，请换 Gemini 直接图片反推或重新上传参考图。");
      const finalPrompt = `${node.prompt || ""}

以下是图片识别描述：
${description}

请根据这段图片描述，用 ${node.model} 的文字能力生成适合 AI 绘图/视频生成的中英文提示词。中文提示词必须只写中文；英文提示词必须只写英文，不要混入中文。输出格式必须严格为：
中文提示词：...
英文提示词：...

${formatInstruction}`;
      const final = await postChatCompletion(configuredUrl, headers, {
        model: modelToPromptModel(node.model),
        messages: [
          { role: "system", content: "你是提示词生成助手。只输出中文提示词和英文提示词，不要使用工具，不要输出分析过程。" },
          { role: "user", content: finalPrompt }
        ]
      }, signal);
      return {
        text: final.text || extractText(final.data) || final.raw || "",
        mediaType: "text",
        fromApi: true
      };
    }

    async function pollVideoResult(url, headers, signal, noTimeout = false) {
      const started = Date.now();
      while (noTimeout || Date.now() - started < generationTimeoutMs) {
        const response = await fetchMaybeProxied(url, { headers, signal });
        const raw = await response.text();
        if (!response.ok) {
          throw new Error(`视频轮询失败 HTTP ${response.status}${raw ? `：${raw.slice(0, 180)}` : ""}`);
        }
        let data = {};
        try {
          data = raw ? JSON.parse(raw) : {};
        } catch (error) {
          throw new Error(`视频轮询返回不是 JSON：${raw.slice(0, 180)}`);
        }
        const status = videoStatusFromData(data);
        const media = extractMediaUrl(data);
        if (status === "done" || status === "completed" || status === "succeeded" || status === "success" || media) return normalizeVideoPollData(data);
        if (["failed", "failure", "expired", "canceled", "cancelled"].includes(status)) {
          const reason = videoFailureReason(data) || JSON.stringify(data).slice(0, 180);
          throw new Error(`视频生成${status === "expired" ? "已过期" : "失败"}：${reason}`);
        }
        await wait(5000, signal);
      }
      throw new DOMException(`生成超过 ${generationTimeoutSeconds}s`, "AbortError");
    }

    function wait(ms, signal) {
      return new Promise((resolve, reject) => {
        if (signal?.aborted) {
          reject(new DOMException("请求已取消", "AbortError"));
          return;
        }
        const timer = setTimeout(resolve, ms);
        signal?.addEventListener("abort", () => {
          clearTimeout(timer);
          reject(new DOMException("请求已取消", "AbortError"));
        }, { once: true });
      });
    }

    function extractVideoTaskId(data) {
      if (!data || typeof data !== "object") return "";
      return data.request_id || data.task_id || (String(data.id || "").startsWith("task_") ? data.id : "") || extractVideoTaskId(data.data) || extractVideoTaskId(data.result);
    }

    function videoStatusFromData(data) {
      if (!data || typeof data !== "object") return "";
      return String(data.status || data.state || data.data?.status || data.data?.state || "").toLowerCase();
    }

    function videoFailureReason(data) {
      if (!data || typeof data !== "object") return "";
      return data.fail_reason
        || data.error?.message
        || data.result_url
        || data.data?.fail_reason
        || data.data?.error?.message
        || data.data?.result_url
        || data.data?.data?.error?.message
        || "";
    }

    function normalizeVideoPollData(data) {
      if (!data || typeof data !== "object") return {};
      const nested = data.data && typeof data.data === "object" ? data.data : {};
      return {
        ...data,
        ...nested,
        data,
        raw: data
      };
    }

    function imageDataUrlFromBase64(value, mimeType = "image/png") {
      const raw = String(value || "").trim();
      if (!raw) return "";
      if (/^data:image\//i.test(raw)) return raw;
      const clean = raw.replace(/^data:[^,]+,/, "").replace(/\s+/g, "");
      return clean ? `data:${mimeType};base64,${clean}` : "";
    }

    function likelyImageBase64DataUrl(value, mimeType = "image/png") {
      const clean = String(value || "").trim().replace(/\s+/g, "");
      if (!clean) return "";
      if (/^data:image\//i.test(clean)) return clean;
      if (!/^(?:iVBORw0KGgo|\/9j\/|UklGR|R0lGOD)/.test(clean)) return "";
      return imageDataUrlFromBase64(clean, mimeType);
    }

    function describeApiResponseShape(value, depth = 0) {
      if (depth > 2) return typeof value;
      if (Array.isArray(value)) return `数组(${value.length})${value.length ? `[${describeApiResponseShape(value[0], depth + 1)}]` : ""}`;
      if (!value || typeof value !== "object") return typeof value;
      const keys = Object.keys(value).slice(0, 12);
      const nestedKey = keys.find((key) => ["data", "output", "result", "images", "response"].includes(key));
      return `{${keys.join(",")}}${nestedKey ? `.${nestedKey}=${describeApiResponseShape(value[nestedKey], depth + 1)}` : ""}`;
    }

    function extractApiErrorMessage(data) {
      if (!data || typeof data !== "object" || !data.error) return "";
      if (typeof data.error === "string") return data.error;
      const error = data.error;
      return String(error.message || error.detail || error.code || error.type || describeApiResponseShape(error));
    }

    function extractMediaUrls(data) {
      const urls = [];
      const add = (value) => {
        if (value && !urls.includes(value)) urls.push(value);
      };
      const visit = (value) => {
        if (!value) return;
        if (typeof value === "string") {
          const trimmed = value.trim();
          for (const match of value.matchAll(/!\[[^\]]*]\(([^)]+)\)/gi)) add(match[1]);
          for (const match of value.matchAll(/https?:\/\/[^\s"'<>]+\.(?:png|jpe?g|webp|gif|mp4|mov|webm)(?:\?[^\s"'<>]*)?/gi)) add(match[0]);
          if (/^https?:\/\/\S+$/i.test(trimmed)) add(trimmed);
          if (/^data:(image|video)\//i.test(trimmed)) add(trimmed);
          const encodedImage = likelyImageBase64DataUrl(trimmed);
          if (encodedImage) add(encodedImage);
          return;
        }
        if (Array.isArray(value)) {
          value.forEach(visit);
          return;
        }
        if (typeof value === "object") {
          const encoded = value.b64_json || value.image_base64 || value.imageBase64 || value.base64_image || value.base64Image;
          if (encoded) add(imageDataUrlFromBase64(encoded, value.mime_type || value.mimeType || "image/png"));
          if (/image/i.test(String(value.type || "")) && typeof value.result === "string") {
            add(imageDataUrlFromBase64(value.result, value.mime_type || value.mimeType || "image/png"));
          }
          Object.values(value).forEach(visit);
        }
      };
      visit(data);
      return urls;
    }

    function contentText(value) {
      if (!value) return "";
      if (typeof value === "string") return value;
      if (Array.isArray(value)) return value.map(contentText).filter(Boolean).join("");
      if (typeof value === "object") {
        return contentText(value.text)
          || contentText(value.content)
          || contentText(value.output_text)
          || contentText(value.value);
      }
      return String(value);
    }

    function extractSseText(raw) {
      const parts = [];
      String(raw || "").split(/\r?\n/).forEach((line) => {
        const trimmed = line.trim();
        if (!trimmed.startsWith("data:")) return;
        const payload = trimmed.slice(5).trim();
        if (!payload || payload === "[DONE]") return;
        try {
          const data = JSON.parse(payload);
          const choices = Array.isArray(data.choices) ? data.choices : [];
          choices.forEach((choice) => {
            choice = choice || {};
            const delta = choice.delta || {};
            const message = choice.message || {};
            const text = contentText(delta.content) || contentText(delta.reasoning_content) || contentText(message.content) || contentText(choice.text);
            if (text) parts.push(String(text));
          });
        } catch (error) {
          parts.push(payload);
        }
      });
      const text = parts.join("").trim();
      if (/^data:\s*\[DONE\]\s*$/i.test(text)) return "";
      if (/^data:\s*\{[\s\S]*\"choices\"\s*:\s*\[\]\s*,[\s\S]*\"usage\"\s*:/i.test(text)) return "";
      return text
        .replace(/<tool_use>[\s\S]*?<\/tool_use>/gi, "")
        .replace(/<tool_response>[\s\S]*?<\/tool_response>/gi, "")
        .trim();
    }

    function extractMediaUrl(data) {
      if (!data) return "";
      if (typeof data === "string") {
        const trimmed = data.trim();
        const markdownImage = trimmed.match(/!\[[^\]]*]\(([^)]+)\)/i);
        if (markdownImage) return markdownImage[1];
        if (/^https?:\/\/\S+\.(png|jpe?g|webp|gif|mp4|mov|webm)(\?\S*)?$/i.test(trimmed)) return trimmed;
        if (/^https?:\/\/\S+$/i.test(trimmed)) return trimmed;
        if (/^data:(image|video)\//i.test(trimmed)) return trimmed;
        const encodedImage = likelyImageBase64DataUrl(trimmed);
        if (encodedImage) return encodedImage;
