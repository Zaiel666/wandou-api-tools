        const embedded = trimmed.match(/https?:\/\/[^\s"'<>]+\.(?:png|jpe?g|webp|gif|mp4|mov|webm)(?:\?[^\s"'<>]*)?/i);
        if (embedded) return embedded[0];
        return "";
      }
      if (data.url) return data.url;
      if (data.image_url) return data.image_url;
      if (data.video_url) return data.video_url;
      const inlineData = data.inlineData || data.inline_data;
      if (inlineData?.data) return `data:${inlineData.mimeType || inlineData.mime_type || "image/png"};base64,${String(inlineData.data).replace(/^data:[^,]+,/, "")}`;
      if (data.b64_json) return imageDataUrlFromBase64(data.b64_json, data.mime_type || data.mimeType || "image/png");
      if (data.image_base64) return imageDataUrlFromBase64(data.image_base64, data.mime_type || data.mimeType || "image/png");
      if (data.imageBase64) return imageDataUrlFromBase64(data.imageBase64, data.mime_type || data.mimeType || "image/png");
      if (data.base64_image) return imageDataUrlFromBase64(data.base64_image, data.mime_type || data.mimeType || "image/png");
      if (data.base64Image) return imageDataUrlFromBase64(data.base64Image, data.mime_type || data.mimeType || "image/png");
      if (data.base64) return imageDataUrlFromBase64(data.base64, data.mime_type || data.mimeType || "image/png");
      if (/image/i.test(String(data.type || "")) && typeof data.result === "string") {
        return imageDataUrlFromBase64(data.result, data.mime_type || data.mimeType || "image/png");
      }
      if (data.image) {
        const imageValue = extractMediaUrl(data.image) || likelyImageBase64DataUrl(data.image, data.mime_type || data.mimeType || "image/png");
        if (imageValue) return imageValue;
      }
      if (data.result) {
        const resultValue = extractMediaUrl(data.result) || likelyImageBase64DataUrl(data.result, data.mime_type || data.mimeType || "image/png");
        if (resultValue) return resultValue;
      }
      if (data.output) {
        const outputValue = extractMediaUrl(data.output) || likelyImageBase64DataUrl(data.output, data.mime_type || data.mimeType || "image/png");
        if (outputValue) return outputValue;
      }
      if (Array.isArray(data.data) && data.data[0]) {
        return extractMediaUrl(data.data[0]);
      }
      if (Array.isArray(data.images) && data.images[0]) return extractMediaUrl(data.images[0]);
      if (Array.isArray(data.videos) && data.videos[0]) return data.videos[0].url || data.videos[0];
      if (Array.isArray(data.choices) && data.choices[0]) return extractMediaUrl(data.choices[0]);
      if (typeof data === "object" && data) {
        for (const value of Object.values(data)) {
          const found = extractMediaUrl(value);
          if (found) return found;
        }
      }
      return "";
    }

    function isNanoBananaModel(model) {
      return /^gemini-.*image-preview$/i.test(String(model || ""));
    }

    function normalizeGeminiGenerateEndpoint(url, model) {
      let clean = String(url || defaultApiBaseUrl()).replace(/\/+$/, "");
      clean = clean.replace(/\/v1(?:beta)?\/?$/i, "");
      return `${clean}/v1beta/models/${encodeURIComponent(model)}:generateContent`;
    }

    function dataUrlToGeminiImagePart(dataUrl) {
      const match = String(dataUrl || "").match(/^data:([^;,]+);base64,(.+)$/i);
      if (!match) return null;
      return {
        inlineData: {
          mimeType: match[1] || "image/png",
          data: match[2]
        }
      };
    }

    async function referenceToGeminiImagePart(reference, index) {
      if (!reference?.url) return null;
      if (/^data:image\//i.test(reference.url)) return dataUrlToGeminiImagePart(reference.url);
      const file = await referenceToFile(reference, index);
      if (!file) return null;
      return dataUrlToGeminiImagePart(await readFileAsDataUrl(file));
    }

    async function callNanoBananaApi(node, references, configuredUrl, headers, signal) {
      const model = modelToApiModel(node.model);
      const targetSize = node._targetSize || sizeFromRatio(node.ratio, node.resolution, references);
      const parts = [{
        text: [
          node.prompt || "",
          targetSize ? `输出比例和尺寸参考：${targetSize}` : "",
          node.resolution ? `分辨率：${node.resolution}` : ""
        ].filter(Boolean).join("\n")
      }];
      for (let index = 0; index < references.length; index += 1) {
        const part = await referenceToGeminiImagePart(references[index], index);
        if (part) parts.push(part);
      }
      if (references.length && parts.length === 1) {
        throw new Error("参考图无法转换为 Nano Banana 可读取的图片内容，请重新上传参考图后再生成。");
      }
      const response = await fetchMaybeProxied(normalizeGeminiGenerateEndpoint(configuredUrl, model), {
        method: "POST",
        headers,
        body: JSON.stringify({
          contents: [{ role: "user", parts }],
          generationConfig: {
            responseModalities: ["TEXT", "IMAGE"]
          }
        }),
        signal
      });
      const raw = await response.text();
      if (!response.ok) throw new Error(`HTTP ${response.status} ${response.statusText}${raw ? `：${raw.slice(0, 180)}` : ""}`);
      let data;
      try {
        data = raw ? JSON.parse(raw) : {};
      } catch (error) {
        throw new Error(`Nano Banana 返回内容不是可识别结果：${raw.slice(0, 180)}`);
      }
      const mediaUrl = extractMediaUrl(data);
      if (!mediaUrl) throw new Error("Nano Banana 返回里没有找到图片内容");
      return {
        url: mediaUrl,
        urls: extractMediaUrls(data),
        mediaType: "image",
        fromApi: true
      };
    }

    async function buildApiRequest(node, references) {
      const targetSize = node._apiTargetSize || node._targetSize || (node.type === "png" ? transparentTargetSize(references, node.resolution) : sizeFromRatio(node.ratio, node.resolution, references));
      if (node.type === "keyword") {
        const formatInstruction = node.promptFormat === "sentence"
          ? "提示词请写成一整句，用逗号自然连接，不要分行排列。"
          : "提示词请按段落方式一句一句分行排列，便于复制和编辑。";
        const isTextReverse = node.promptReverseMode === "text";
        const promptText = isTextReverse
          ? `${node.prompt || ""}

请根据上面的文字需求生成适合 AI 绘图/视频生成的中英文提示词。不要依赖图片，只根据文字描述扩写。输出格式必须严格为：
中文提示词：...
英文提示词：...

${formatInstruction}`
          : `${node.prompt || ""}

请根据参考图反推适合 AI 绘图/视频生成的提示词。中文提示词必须只写中文；英文提示词必须只写英文，不要混入中文。输出格式必须严格为：
中文提示词：...
英文提示词：...

${formatInstruction}`;
        return {
          body: JSON.stringify({
            model: modelToPromptModel(node.model),
            messages: [
              { role: "system", content: "你是提示词生成助手。只输出用户要求的中英文提示词，不要使用工具，不要输出分析过程。" },
              { role: "user", content: messageContentFor({ ...node, prompt: promptText }, isTextReverse ? [] : references, targetSize) }
            ],
            stream: true
          }),
          isFormData: false
        };
      }

      if (node.type === "video") {
        const videoMode = node.videoMode || "text";
        const fixedAspectRatio = fixedVideoAspectRatio(node.model);
        const payloadAspectRatio = fixedAspectRatio || ratioKey(node.ratio);
        const videoDuration = videoDefaultDurationForModel(node.model);
        const useModelDefaultResolution = node.resolution === "DEFAULT";
        const videoReferences = videoMode === "text" ? [] : references;
        const imageUrls = videoReferences
          .map((item) => item.url)
          .filter((url) => /^data:image\//i.test(url) || /^https?:\/\//i.test(url));
        if (videoMode === "firstLast" && imageUrls.length < 2) {
          throw new Error("首尾帧模式需要 2 张参考图：第 1 张首帧，第 2 张尾帧。");
        }
        if (videoMode === "multi" && imageUrls.length < 1) {
          throw new Error("多图参考模式至少需要 1 张参考图。");
        }
        const videoPrompt = [
          node.prompt || "",
          `时长：使用模型默认值（${videoDuration} 秒）。`,
          useModelDefaultResolution ? "分辨率：使用模型默认值。" : `分辨率：${String(node.resolution || "720P").toUpperCase()}。`,
          `比例：${payloadAspectRatio === "Auto" ? targetSize : payloadAspectRatio}。`,
          videoMode === "text"
            ? "模式：文生视频，只根据文字提示词生成视频。"
            : videoMode === "firstLast"
            ? "模式：首尾帧，第一张参考图是首帧，第二张参考图是尾帧。"
            : "模式：多图参考。"
        ].filter(Boolean).join("\n");
        const payload = {
          model: modelToApiModel(node.model),
          prompt: node.prompt,
          messages: [{ role: "user", content: messageContentFor({ ...node, prompt: videoPrompt }, videoReferences, targetSize) }],
          size: payloadAspectRatio === "Auto" ? "auto" : payloadAspectRatio,
          stream: /veo/i.test(String(node.model || "")) ? true : false
        };
        if (!useModelDefaultResolution) payload.resolution = String(node.resolution || "720P").toLowerCase();
        const aspectRatio = payloadAspectRatio;
        if (aspectRatio !== "Auto") payload.aspect_ratio = aspectRatio;
        if (videoMode === "text") {
          payload.mode = "text_to_video";
          payload.image_urls = [];
        } else if (videoMode === "firstLast") {
          payload.mode = "first_last_frame";
          payload.first_frame_image = imageUrls[0] || "";
          payload.last_frame_image = imageUrls[1] || "";
          payload.image_urls = imageUrls.slice(0, 2);
        } else {
          payload.mode = "multi_image_reference";
          payload.image_urls = imageUrls;
          if (imageUrls[0]) payload.image_url = imageUrls[0];
        }
        return {
          body: JSON.stringify(payload),
          isFormData: false
        };
      }

      const transparentEditPrompt = [
        node.prompt || "",
        "这是严格的图片抠图任务，不是重新生成图片。必须以用户上传的原图为唯一依据，只移除背景。",
        "不要重新绘制主体，不要美化，不要换脸，不要改变人物、产品、姿势、五官、发型、衣服、Logo、文字、构图、比例、颜色和任何细节。",
        "输出透明背景 PNG，主体必须与上传图片保持一致，只把背景变成完全透明；边缘干净自然，不要白底、灰底、纯色底、阴影底或棋盘格底。"
      ].filter(Boolean).join("\n\n");
      const requestResolution = node._forceBaseGeneration ? "1K" : String(node.resolution || "1K").toUpperCase();
      const imagePayload = {
        model: imageGenerationApiModel(node.model, requestResolution),
        prompt: node.type === "png" ? transparentEditPrompt : node.prompt,
        n: Math.max(1, Math.min(9, Number(node.count) || 1)),
        size: apiSafeGenerationSize(targetSize)
      };
      if (!node._forceBaseGeneration) {
        imagePayload.quality = "high";
        imagePayload.resolution = requestResolution.toLowerCase();
        imagePayload.output_format = "png";
        imagePayload.targetSize = targetSize;
      }
      if (node.type === "png") {
        imagePayload.background = "transparent";
        imagePayload.n = 1;
      }
      // 强制基础图时只发送兼容性最高的标准参数；接口可自行返回 URL 或 base64。
      if (requestResolution === "1K" && !node._forceBaseGeneration) imagePayload.response_format = "b64_json";

      if (!references.length) {
        return {
          body: JSON.stringify(imagePayload),
          isFormData: false
        };
      }

      const form = new FormData();
      Object.entries(imagePayload).forEach(([key, value]) => form.append(key, String(value)));
      let fileCount = 0;
      let urlFallbackCount = 0;
      for (let index = 0; index < references.length; index++) {
        const file = await referenceToFile(references[index], index);
        if (file) {
          form.append("image", file, file.name);
          fileCount += 1;
        } else if (/^https?:\/\//i.test(references[index].url)) {
          form.append("image", references[index].url);
          form.append("image_url", references[index].url);
          form.append("image_urls[]", references[index].url);
          urlFallbackCount += 1;
        }
      }
      if (!fileCount && urlFallbackCount) {
        const imageUrls = references
          .map((item) => item.url)
          .filter((url) => /^https?:\/\//i.test(url));
        return {
          body: JSON.stringify({
            ...imagePayload,
            image: imageUrls[0],
            image_url: imageUrls[0],
            image_urls: imageUrls
          }),
          isFormData: false,
          forceGenerationEndpoint: true
        };
      }
      if (references.length && !fileCount && !urlFallbackCount) {
        throw new Error("参考图无法转换为接口可读取的图片文件，请重新下载或上传这张效果图后再生成。");
      }
      return {
        body: form,
        isFormData: true
      };
    }

    function collectReferenceItems(inputMediaList) {
      const seen = new Set();
      const items = [];
      (inputMediaList || []).forEach((source) => {
        referenceCandidatesForSource(source).forEach((item) => {
          if (!item?.url || item.mediaType === "video" || seen.has(item.url)) return;
          seen.add(item.url);
          items.push({
            ...item,
            width: item.width || source.width,
            height: item.height || source.height
          });
        });
      });
      return items;
    }

    function referenceCandidatesForSource(source) {
      if (!source) return [];
      const refs = normalizeReferences(source).map((item) => ({ ...item }));
      const direct = [];
      if (source.fullUrl) direct.push({ url: source.fullUrl, mediaType: source.mediaType || "image", width: source.width, height: source.height, name: source.title || "效果图原图" });
      if (source.mediaUrl) direct.push({ url: source.mediaUrl, mediaType: source.mediaType || "image", width: source.width, height: source.height, name: source.title || "效果图" });
      if (source.previewUrl) direct.push({ url: source.previewUrl, mediaType: source.mediaType || "image", width: source.width, height: source.height, name: source.title || "效果图预览" });
      return source.type === "result" ? [...direct, ...refs] : [...refs, ...direct];
    }

    async function referenceToFile(reference, index) {
      if (!reference || !reference.url) return null;
      if (/^data:image\//i.test(reference.url)) {
        const response = await fetch(reference.url);
        const blob = await response.blob();
        const ext = blob.type.includes("jpeg") ? "jpg" : blob.type.includes("webp") ? "webp" : "png";
        return new File([blob], `reference-${index + 1}.${ext}`, { type: blob.type || "image/png" });
      }
      try {
        const response = await fetchMaybeProxied(reference.url);
        const blob = await response.blob();
        return new File([blob], `reference-${index + 1}.png`, { type: blob.type || "image/png" });
      } catch (error) {
        return null;
      }
    }

    function promptWithSize(prompt, targetSize) {
      return `${prompt}\n\n请严格按 ${targetSize} 像素比例构图和输出。`;
    }

    function messageContentFor(node, references, targetSize) {
      const prompt = promptWithSize(node.prompt, targetSize);
      if (!references.length) return prompt;
      return [
        { type: "text", text: prompt },
        ...references.map((item) => ({ type: "image_url", image_url: { url: item.url } }))
      ];
    }

    function normalizeApiEndpoint(url, node, hasReferences = false) {
      const clean = url.replace(/\/+$/, "");
      try {
        const parsed = new URL(clean);
        const isRoot = parsed.pathname === "" || parsed.pathname === "/";
        if (!isRoot) return clean;
        if (node.type === "video") return `${clean}/v1/video/generations`;
        if (node.type === "keyword") return `${clean}/v1/chat/completions`;
        return `${clean}/v1/images/${hasReferences ? "edits" : "generations"}`;
      } catch (error) {
        return clean;
      }
    }

    function videoPollEndpoint(generationUrl, requestId) {
      try {
        const parsed = new URL(generationUrl);
        if (/\/video\/generations\/?$/i.test(parsed.pathname)) {
          parsed.pathname = parsed.pathname.replace(/\/video\/generations\/?$/i, `/videos/${encodeURIComponent(requestId)}`);
        } else {
          parsed.pathname = parsed.pathname.replace(/\/videos\/generations\/?$/i, `/videos/${encodeURIComponent(requestId)}`);
        }
        parsed.search = "";
        return parsed.toString();
      } catch (error) {
        if (/\/video\/generations\/?$/i.test(generationUrl)) {
          return generationUrl.replace(/\/video\/generations\/?$/i, `/videos/${encodeURIComponent(requestId)}`);
        }
        return generationUrl.replace(/\/videos\/generations\/?$/i, `/videos/${encodeURIComponent(requestId)}`);
      }
    }

    function alternateVideoGenerationEndpoint(url) {
      if (/\/video\/generations\/?$/i.test(url)) return url.replace(/\/video\/generations\/?$/i, "/videos/generations");
      if (/\/videos\/generations\/?$/i.test(url)) return url.replace(/\/videos\/generations\/?$/i, "/video/generations");
      return url;
    }

    function shouldProxyExternalRequest(url) {
      return false;
    }

    function proxiedUrl(url) {
      return shouldProxyExternalRequest(url) ? `/api/proxy?url=${encodeURIComponent(url)}` : url;
    }

    function fetchMaybeProxied(url, options = {}) {
      return fetch(proxiedUrl(url), options);
    }

    function modelToApiModel(model) {
      const map = {
        "GPT-image-2": "gpt-image-2",
        "Nano Banana2": "gemini-3.1-flash-image-preview",
        "Nano BananaPro": "gemini-3-pro-image-preview",
        "grok-imagine-image-pro": "grok-imagine-image-pro",
        "grok-imagine-video": "grok-imagine-video",
        "omni-flash": "omni-flash",
        "veo3.1-fast": "veo3.1-fast",
        "veo3.1-fast-t2": "veo3.1-fast-t2",
        "veo3.1-fast-t2v-16:9": "veo3.1-fast-t2v-16:9",
        "veo3.1-fast-i2v-16:9": "veo3.1-fast-i2v-16:9",
        "Sd2": "sd2"
      };
      return map[model] || model;
    }

    function imageGenerationApiModel(model) {
      return modelToApiModel(model || "GPT-image-2");
    }

    function fixedVideoAspectRatio(model) {
      const text = String(model || "");
      if (/-16:9\b/.test(text)) return "16:9";
      if (/-9:16\b/.test(text)) return "9:16";
      if (/-1:1\b/.test(text)) return "1:1";
      return "";
    }

    function modelToPromptModel(model) {
      const map = {
        GPT: "gpt-5.4",
        Claude: "claude-sonnet-4-6",
        Gemini: "gemini-3.1-pro-preview"
      };
      return map[model] || "gpt-5.4";
    }

    function apiImageSizeValue(ratio, resolution) {
      const key = ratioKey(ratio);
      if (key === "Auto") return "auto";
      return key;
    }

    function looksLikeHtml(text) {
      return /^\s*<!doctype html|^\s*<html|<body[\s>]/i.test(text || "");
    }

    function extractText(data) {
      if (!data) return "";
      if (typeof data === "string") return data;
      if (data.text) return contentText(data.text);
      if (data.content) return contentText(data.content);
      if (data.output_text) return contentText(data.output_text);
      if (data.message) return contentText(data.message);
      if (data.output) return extractText(data.output);
      if (Array.isArray(data.data) && data.data[0]) return extractText(data.data[0]);
      if (Array.isArray(data.choices) && data.choices[0]) {
        const choice = data.choices[0] || {};
        return contentText(choice.message?.content) || contentText(choice.delta?.content) || contentText(choice.delta?.reasoning_content) || contentText(choice.text);
      }
      return "";
    }

    function parsePromptOutput(text) {
      const raw = String(text || "").trim();
      if (!raw) return { zh: "", en: "" };
      const zhMatch = raw.match(/中文提示词[：:]\s*([\s\S]*?)(?=\n\s*英文提示词[：:]|$)/i);
      const enMatch = raw.match(/英文提示词[：:]\s*([\s\S]*)/i);
      if (zhMatch || enMatch) {
        return {
          zh: cleanChinesePrompt(zhMatch?.[1] || ""),
          en: cleanEnglishPrompt(enMatch?.[1] || "")
        };
      }
      const parts = raw.split(/\n{2,}/).map((item) => item.trim()).filter(Boolean);
      const zhPart = parts.find((item) => /[\u4e00-\u9fff]/.test(item)) || parts[0] || raw;
      const enPart = parts.find((item) => /[a-zA-Z]/.test(item) && !/[\u4e00-\u9fff]/.test(item)) || parts[1] || "";
      return {
        zh: cleanChinesePrompt(zhPart),
        en: cleanEnglishPrompt(enPart)
      };
    }

    function cleanChinesePrompt(text) {
      return String(text || "")
        .replace(/英文提示词[：:][\s\S]*$/i, "")
        .replace(/^中文提示词[：:]\s*/i, "")
        .trim();
    }

    function cleanEnglishPrompt(text) {
      return String(text || "")
        .replace(/^英文提示词[：:]\s*/i, "")
        .split(/\r?\n/)
        .filter((line) => !/^\s*中文提示词[：:]/i.test(line))
        .join(" ")
        .replace(/[\u4e00-\u9fff]+/g, "")
        .replace(/[，。；：！？、]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function friendlyApiError(error) {

        if (!visited[pos]) continue;
        data[pos * 4 + 3] = 0;
      }
      softenTransparentEdge(data, width, height, visited);
    }

    function buildBackgroundProfile(data, width, height) {
      const cornerSize = Math.max(8, Math.round(Math.min(width, height) * 0.035));
      const cornerSamples = [];
      const add = (x, y, target = cornerSamples) => {
        const i = (y * width + x) * 4;
        target.push([data[i], data[i + 1], data[i + 2]]);
      };
      for (let y = 0; y < cornerSize; y++) {
        for (let x = 0; x < cornerSize; x++) {
          add(x, y);
          add(width - 1 - x, y);
          add(x, height - 1 - y);
          add(width - 1 - x, height - 1 - y);
        }
      }
      const neutralCorners = cornerSamples.filter(([r, g, b]) => {
        const chroma = Math.max(r, g, b) - Math.min(r, g, b);
        const brightness = (r + g + b) / 3;
        return chroma < 38 && brightness > 170;
      });
      const source = neutralCorners.length >= cornerSamples.length * 0.35 ? neutralCorners : cornerSamples;
      return {
        colors: reduceColorSamples(source, 10),
        neutralDominant: neutralCorners.length >= cornerSamples.length * 0.35
      };
    }

    function reduceColorSamples(samples, limit) {
      const buckets = new Map();
      samples.forEach(([r, g, b]) => {
        const key = `${Math.round(r / 24)},${Math.round(g / 24)},${Math.round(b / 24)}`;
        const current = buckets.get(key) || { count: 0, r: 0, g: 0, b: 0 };
        current.count += 1;
        current.r += r;
        current.g += g;
        current.b += b;
        buckets.set(key, current);
      });
      return [...buckets.values()]
        .sort((a, b) => b.count - a.count)
        .slice(0, limit)
        .map((item) => [item.r / item.count, item.g / item.count, item.b / item.count]);
    }

    function isLikelyBackground(r, g, b, profile) {
      const chroma = Math.max(r, g, b) - Math.min(r, g, b);
      const brightness = (r + g + b) / 3;
      if (isTransparentWhiteOrGray(chroma, brightness)) return true;
      const threshold = profile.neutralDominant ? 34 : 24;
      return profile.colors.some(([sr, sg, sb]) => {
        const sampleChroma = Math.max(sr, sg, sb) - Math.min(sr, sg, sb);
        const sampleBrightness = (sr + sg + sb) / 3;
        if (!isTransparentWhiteOrGray(sampleChroma, sampleBrightness)) return false;
        return colorDistance(r, g, b, sr, sg, sb) < threshold;
      });
    }

    function isTransparentWhiteOrGray(chroma, brightness) {
      if (brightness > 242 && chroma < 42) return true;
      if (brightness > 222 && chroma < 24) return true;
      if (brightness > 196 && chroma < 12) return true;
      return false;
    }

    function colorDistance(r, g, b, sr, sg, sb) {
      return Math.hypot(r - sr, g - sg, b - sb);
    }

    function softenTransparentEdge(data, width, height, mask) {
      const soften = [];
      for (let y = 1; y < height - 1; y++) {
        for (let x = 1; x < width - 1; x++) {
          const pos = y * width + x;
          if (mask[pos]) continue;
          if (mask[pos - 1] || mask[pos + 1] || mask[pos - width] || mask[pos + width]) soften.push(pos);
        }
      }
      soften.forEach((pos) => {
        const i = pos * 4;
        data[i + 3] = Math.min(data[i + 3], 220);
      });
    }

    async function createPreviewImageUrl(src, maxSide = 960, keepTransparent = false) {
      return new Promise(async (resolve) => {
        let objectUrl = "";
        let bitmap = null;
        const img = new Image();
        img.crossOrigin = "anonymous";
        const makeCanvasPreview = (source, sourceWidth, sourceHeight) => {
          try {
            const scale = Math.min(1, maxSide / Math.max(sourceWidth, sourceHeight));
            const width = Math.max(1, Math.round(sourceWidth * scale));
            const height = Math.max(1, Math.round(sourceHeight * scale));
            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(source, 0, 0, width, height);
            return keepTransparent ? canvas.toDataURL("image/png") : canvas.toDataURL("image/jpeg", 0.78);
          } catch (error) {
            return src;
          }
        };
        img.onload = () => {
          try {
            resolve(makeCanvasPreview(img, img.naturalWidth, img.naturalHeight));
          } finally {
            if (objectUrl) URL.revokeObjectURL(objectUrl);
          }
        };
        img.onerror = () => {
          if (objectUrl) URL.revokeObjectURL(objectUrl);
          resolve(src);
        };
        try {
          if (/^https?:\/\//i.test(src)) {
            const response = await fetch(src);
            const blob = await response.blob();
            if ("createImageBitmap" in window && !keepTransparent) {
              try {
                const probe = await createImageBitmap(blob);
                const scale = Math.min(1, maxSide / Math.max(probe.width, probe.height));
                const resizeWidth = Math.max(1, Math.round(probe.width * scale));
                const resizeHeight = Math.max(1, Math.round(probe.height * scale));
                probe.close && probe.close();
                bitmap = await createImageBitmap(blob, { resizeWidth, resizeHeight, resizeQuality: "high" });
                resolve(makeCanvasPreview(bitmap, bitmap.width, bitmap.height));
                bitmap.close && bitmap.close();
                return;
              } catch (error) {
                if (bitmap?.close) bitmap.close();
              }
            }
            objectUrl = URL.createObjectURL(blob);
            img.src = objectUrl;
          } else {
            img.src = src;
          }
        } catch (error) {
          img.src = src;
        }
      });
    }

      const sourceBlob = await sourceToBlob(src, "image/png");
      if (!sourceBlob) throw new Error("图片读取失败");
      if (sourceBlob.type === "image/png") return sourceBlob;
      const bitmap = await createImageBitmap(sourceBlob);
      try {

        canvas.width = bitmap.width;
        canvas.height = bitmap.height;
        canvas.getContext("2d").drawImage(bitmap, 0, 0);
        return await new Promise((resolve, reject) => {
          canvas.toBlob((blob) => blob ? resolve(blob) : reject(new Error("图片转换失败")), "image/png");
        });
      } finally {

      }
    }

    function loadPaintCanvas(src) {
      const img = new Image();
      img.onload = () => {
        const maxSide = 1400;
        const scale = Math.min(1, maxSide / Math.max(img.naturalWidth, img.naturalHeight));
        paintCanvas.width = Math.round(img.naturalWidth * scale);
        paintCanvas.height = Math.round(img.naturalHeight * scale);
        const ctx = paintCanvas.getContext("2d");
        ctx.clearRect(0, 0, paintCanvas.width, paintCanvas.height);
        ctx.drawImage(img, 0, 0, paintCanvas.width, paintCanvas.height);
        paintUndoStack = [ctx.getImageData(0, 0, paintCanvas.width, paintCanvas.height)];
        paintRedoStack = [];
      };
      img.src = src;
    }

    function paintPointFromEvent(event) {
      const rect = paintCanvas.getBoundingClientRect();
      return {
        x: (event.clientX - rect.left) * (paintCanvas.width / rect.width),
        y: (event.clientY - rect.top) * (paintCanvas.height / rect.height)
      };
    }

    function drawPaintLine(point) {
      if (!paintLastPoint) paintLastPoint = point;
      const ctx = paintCanvas.getContext("2d");
      ctx.strokeStyle = paintColor.value;
      ctx.lineWidth = Number(paintSize.value) * 2;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.beginPath();
      ctx.moveTo(paintLastPoint.x, paintLastPoint.y);
      ctx.lineTo(point.x, point.y);
      ctx.stroke();
      paintLastPoint = point;
    }

    function pushPaintHistory() {
      if (!paintCanvas.width || !paintCanvas.height) return;
      const ctx = paintCanvas.getContext("2d");
      paintUndoStack.push(ctx.getImageData(0, 0, paintCanvas.width, paintCanvas.height));
      if (paintUndoStack.length > 40) paintUndoStack.shift();
      paintRedoStack = [];
    }

    function restorePaintState(state) {
      if (!state) return;
      paintCanvas.getContext("2d").putImageData(state, 0, 0);
    }

    function undoPaint() {
      if (paintUndoStack.length <= 1) return;
      const current = paintUndoStack.pop();
      paintRedoStack.push(current);
      restorePaintState(paintUndoStack[paintUndoStack.length - 1]);
    }

    function redoPaint() {
      const next = paintRedoStack.pop();
      if (!next) return;
      paintUndoStack.push(next);
      restorePaintState(next);
    }

    async function uniqueAutoSaveFileName(directoryHandle, filename) {
      const dot = filename.lastIndexOf(".");
      const base = dot > 0 ? filename.slice(0, dot) : filename;
      const extension = dot > 0 ? filename.slice(dot) : "";
      for (let index = 0; index < 100; index += 1) {
        const candidate = index ? `${base}-${index + 1}${extension}` : filename;
        try {
          await directoryHandle.getFileHandle(candidate, { create: false });
        } catch (error) {
          return candidate;
        }
      }
      return `${base}-${Date.now()}${extension}`;
    }

    async function sourceToBlob(src, fallbackType = "application/octet-stream") {
      if (!src) return null;
      const response = /^https?:\/\//i.test(src)
        ? await fetchMaybeProxied(src, { cache: "no-store" })
        : await fetch(src);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const blob = await response.blob();
      return blob.type ? blob : new Blob([blob], { type: fallbackType });
    }

    async function writeBlobToAutoSaveDirectory(blob, filename) {
      const handle = nativeAutoSaveDirectory || autoSaveDirectoryHandle || await loadAutoSaveDirectoryHandle();
      if (!handle) return false;
      if (window.wandouShell?.writeSaveFile && nativeAutoSaveDirectory) {
        const result = await window.wandouShell.writeSaveFile(filename, new Uint8Array(await blob.arrayBuffer()));
        if (result?.success) {
          showToast(`已自动保存：${result.filename}`);
          return true;
        }
        if (result?.missingDirectory) {
          nativeAutoSaveDirectory = null;
          updateAutoSaveDirectoryButton();
          showToast("原保存文件夹已不存在，请重新选择保存位置");
        }
        return false;
      }
      if (!await hasAutoSaveDirectoryPermission(handle, false)) {
        showToast("\u4fdd\u5b58\u4f4d\u7f6e\u9700\u8981\u91cd\u65b0\u6388\u6743\uff0c\u8bf7\u70b9\u51fb\u66f4\u6539\u4fdd\u5b58\u4f4d\u7f6e");
        return false;
      }
      const dot = filename.lastIndexOf(".");
      const safeBase = safeFilePart(dot > 0 ? filename.slice(0, dot) : filename);
      const safeExtension = dot > 0 ? filename.slice(dot).replace(/[^.\w-]/g, "") : "";
      const safeName = await uniqueAutoSaveFileName(handle, `${safeBase}${safeExtension}`);
      const fileHandle = await handle.getFileHandle(safeName, { create: true });
      const writable = await fileHandle.createWritable();
      await writable.write(blob);
      await writable.close();
      showToast(`\u5df2\u81ea\u52a8\u4fdd\u5b58\uff1a${safeName}`);
      return true;
    }

    async function sourceToBlobUrl(src, fallbackType = "application/octet-stream") {

    function openNamedTab(url, title) {
      const absoluteUrl = new URL(url, location.href).href;
      const tabTitle = title || document.title || "新标签";
      if (window.wandouDesktopTabs && typeof window.wandouDesktopTabs.open === "function") {
        window.wandouDesktopTabs.open(absoluteUrl, tabTitle);
        return;
      }
      if (window.chrome && window.chrome.webview) {
        window.chrome.webview.postMessage(`OPEN_TAB|${encodeURIComponent(tabTitle)}|${encodeURIComponent(absoluteUrl)}`);
        return;
      }
      window.open(absoluteUrl, "_blank", "noopener,noreferrer");
    }

    async function triggerDownload(src, filename, fallbackType = "application/octet-stream") {
      try {
        const objectUrl = await sourceToBlobUrl(src, fallbackType);
        if (!objectUrl && /^https?:\/\//i.test(src)) {
          openNamedTab(src, filename || "下载文件");
          showToast("已在新标签页打开下载/查看");
          return true;
        }
        if (!objectUrl && !src.startsWith("data:") && !src.startsWith("blob:")) {
          showToast("下载失败：没有可下载的文件地址");
          return false;
        }
        const a = document.createElement("a");
        a.href = objectUrl || src;
        a.download = filename;
        a.rel = "noopener";
        document.body.appendChild(a);
        a.click();
        a.remove();
        if (objectUrl && objectUrl !== src) setTimeout(() => URL.revokeObjectURL(objectUrl), 3000);
        return true;
      } catch (error) {
        console.warn("Media download failed", error);
        showToast("下载失败");
        return false;
      }
    }

    async function downloadNodeMedia(node) {
      if (node.mediaType === "text" && node.text) {
        const texts = favoritePromptTexts(node);
        downloadTextFile(promptBundleContent(texts.zh, texts.en), downloadFileName(node, "txt"));
        return;
      }

      const downloadUrl = favoriteMediaUrl(node);
      if (!downloadUrl) {
        showToast("下载失败：这个节点还没有可下载内容");
        return;
      }
      let objectUrl = "";
      if (node.mediaType === "image" && node.width && node.height) {
        objectUrl = await imageToSizedBlobUrl(downloadUrl, node.width, node.height);
      }
      if (node.transparent) {
        const transparentOk = await imageHasTransparentPixels(objectUrl || downloadUrl);
        showToast(transparentOk ? "已检测到透明通道，正在下载 PNG" : "未检测到透明通道，请检查接口是否返回透明 PNG");
      }
      const extension = node.mediaType === "video" ? "mp4" : "png";
      const filename = downloadFileName(node, extension);
      const ok = await triggerDownload(objectUrl || downloadUrl, filename, node.mediaType === "video" ? "video/mp4" : "image/png");
      if (!ok && /^https?:\/\//i.test(downloadUrl)) showToast("浏览器限制跨域下载，请稍后重试");
      if (objectUrl) setTimeout(() => URL.revokeObjectURL(objectUrl), 3000);
    }

    async function imageHasTransparentPixels(src) {
      return new Promise(async (resolve) => {
        let objectUrl = "";
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            const sample = 96;
            const scale = Math.min(1, sample / Math.max(img.naturalWidth, img.naturalHeight));
            canvas.width = Math.max(1, Math.round(img.naturalWidth * scale));
            canvas.height = Math.max(1, Math.round(img.naturalHeight * scale));
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            for (let i = 3; i < data.length; i += 4) {
              if (data[i] < 250) {
                resolve(true);
                return;
              }
            }
            resolve(false);
          } catch (error) {
            resolve(false);
          } finally {
            if (objectUrl) URL.revokeObjectURL(objectUrl);
          }
        };
        img.onerror = () => {
          if (objectUrl) URL.revokeObjectURL(objectUrl);
          resolve(false);
        };
        try {
          if (/^https?:\/\//i.test(src)) {
            const response = await fetch(src, { cache: "no-store" });
            const blob = await response.blob();
            objectUrl = URL.createObjectURL(blob);
            img.src = objectUrl;
          } else {
            img.src = src;
          }
        } catch (error) {
          img.src = src;
        }
      });
    }

    async function imageToSizedBlobUrl(src, width, height) {
      return new Promise(async (resolve) => {
        let objectUrl = "";
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            drawImageAspectSafe(ctx, img, width, height, false);
            canvas.toBlob((blob) => {
              if (!blob) {
                resolve("");
                return;
              }
              resolve(URL.createObjectURL(blob));
            }, "image/png");
          } catch (error) {
            resolve("");
          } finally {
            if (objectUrl) URL.revokeObjectURL(objectUrl);
          }
        };
        img.onerror = () => {
          if (objectUrl) URL.revokeObjectURL(objectUrl);
          resolve("");
        };
        try {
          if (/^https?:\/\//i.test(src)) {
            const response = await fetch(src, { cache: "no-store" });
            const blob = await response.blob();
            objectUrl = URL.createObjectURL(blob);
            img.src = objectUrl;
          } else {
            img.src = src;
          }
        } catch (error) {
          img.src = src;
        }
      });
    }

      pushHistory();
      const columns = [60, 430, 1010, 1400];
      nodes.forEach((node, index) => {
        const col = index % columns.length;
        const row = Math.floor(index / columns.length);
        node.x = columns[col];
        node.y = 110 + row * 360;

    function clearCanvas() {
      pushHistory();
      localStorage.removeItem(projectCanvasStorageKey());
      nodes = [];
      links = [];
      nodeId = 1;
      seedCanvas();
      showToast("画布已重置");

    function deleteIndexedDb(name) {
      return new Promise((resolve) => {
        if (!("indexedDB" in window)) {
          resolve(false);
          return;
        }
        const request = indexedDB.deleteDatabase(name);
        request.onsuccess = () => resolve(true);
        request.onerror = () => resolve(false);
        request.onblocked = () => resolve(false);
      });
    }

    async function clearNodeCache() {
      const ok = window.confirm("确定清理节点画布图片缓存吗？API 密钥、主题和项目文件夹不会被清除。");
      if (!ok) return;
      await deleteIndexedDb(localMediaDbName);
      localStorage.removeItem(deletedResultStorageKey());
      deletedResults = [];
      openLocalMediaDb.promise = null;
      showToast("缓存已清理，重新打开页面后生效。");
    }

    function scheduleCanvasSave(delay = canvasSaveDelayMs) {
      if (isRestoring) return;
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveCanvasState, delay);
    }

    function openLocalMediaDb() {
      if (!("indexedDB" in window)) return Promise.resolve(null);
      if (openLocalMediaDb.promise) return openLocalMediaDb.promise;
      openLocalMediaDb.promise = new Promise((resolve) => {
        const request = indexedDB.open(localMediaDbName, 2);
        request.onupgradeneeded = () => {
          if (!request.result.objectStoreNames.contains(localMediaStoreName)) {
            request.result.createObjectStore(localMediaStoreName, { keyPath: "id" });
          }
          if (!request.result.objectStoreNames.contains(canvasStateStoreName)) {
            request.result.createObjectStore(canvasStateStoreName, { keyPath: "id" });
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => resolve(null);
      });
      return openLocalMediaDb.promise;
    }

    function mediaStorageId(value) {
      let hash = 0;
      for (let index = 0; index < value.length; index += Math.max(1, Math.floor(value.length / 4096))) {
        hash = ((hash << 5) - hash + value.charCodeAt(index)) | 0;
      }
      return `${Math.abs(hash).toString(36)}-${value.length}`;
    }

    async function putLocalMedia(value) {
      const db = await openLocalMediaDb();
      if (!db) return value;
      const id = mediaStorageId(value);
      return new Promise((resolve) => {
        const tx = db.transaction(localMediaStoreName, "readwrite");
        tx.objectStore(localMediaStoreName).put({ id, value, savedAt: Date.now() });
        tx.oncomplete = () => resolve(`${localMediaPrefix}${id}`);
        tx.onerror = () => resolve(value);
      });
    }

    async function getLocalMedia(value) {
      if (typeof value !== "string" || !value.startsWith(localMediaPrefix)) return value;
      const db = await openLocalMediaDb();
      if (!db) return "";
      const id = value.slice(localMediaPrefix.length);
      return new Promise((resolve) => {
        const tx = db.transaction(localMediaStoreName, "readonly");
        const request = tx.objectStore(localMediaStoreName).get(id);
        request.onsuccess = () => resolve(request.result?.value || "");
        request.onerror = () => resolve("");
      });
    }

    async function persistMediaValue(value) {
      if (typeof value !== "string" || !value.startsWith("data:")) return value;
      return putLocalMedia(value);
    }

    async function mirrorLargeLoadedMedia(value) {
      if (!isLargeDataUrl(value, largeMediaDataUrlLimit)) return;
      await putLocalMedia(value);
    }

    function stripLargeMediaForStorage(value) {
      return isLargeDataUrl(value, largeMediaDataUrlLimit) ? "" : value;
    }

    function compactStoredNodeForLocalStorage(node) {
      const copy = { ...node };
      copy.mediaUrl = stripLargeMediaForStorage(copy.mediaUrl);
      copy.previewUrl = stripLargeMediaForStorage(copy.previewUrl);
      copy.fullUrl = stripLargeMediaForStorage(copy.fullUrl);
      if (Array.isArray(copy.references)) {
        copy.references = copy.references
          .map((item) => ({ ...item, url: stripLargeMediaForStorage(item.url) }))
          .filter((item) => item.url);
      }
      return copy;
    }

    function compactStateForLocalStorage(state) {
      return {
        ...state,
        nodes: Array.isArray(state.nodes) ? state.nodes.map(compactStoredNodeForLocalStorage) : []
      };
    }

    function writeCanvasStateToLocalStorage(state) {
      const serialized = JSON.stringify(compactStateForLocalStorage(state));
      localStorage.setItem(projectCanvasStorageKey(), serialized);
      localStorage.setItem(folderCanvasStorageKey(), serialized);
    }

    async function writeCanvasStateBackup(state) {
      const db = await openLocalMediaDb();
      if (!db) return false;
      const records = [projectCanvasStorageKey(), folderCanvasStorageKey()].map((id) => ({ id, state, savedAt: Date.now() }));
      return new Promise((resolve) => {
        const tx = db.transaction(canvasStateStoreName, "readwrite");
        records.forEach((record) => tx.objectStore(canvasStateStoreName).put(record));
        tx.oncomplete = () => resolve(true);
        tx.onerror = () => resolve(false);
        tx.onabort = () => resolve(false);
      });
    }

    async function readCanvasStateBackup() {
      const db = await openLocalMediaDb();
      if (!db) return null;
      for (const id of [projectCanvasStorageKey(), folderCanvasStorageKey()]) {
        const record = await new Promise((resolve) => {
          const tx = db.transaction(canvasStateStoreName, "readonly");
          const request = tx.objectStore(canvasStateStoreName).get(id);
          request.onsuccess = () => resolve(request.result || null);
          request.onerror = () => resolve(null);
        });
        if (record?.state) return record.state;
      }
      return null;
    }

    function warnCanvasStorageSkipped(error) {
      console.warn("Canvas save used compact storage", error);
      if (canvasStorageWarningShown) return;
      canvasStorageWarningShown = true;
      showToast(canvasStorageWarningText);
      setTimeout(() => {
        canvasStorageWarningShown = false;
      }, 5000);
    }

    async function saveCanvasState() {
      try {
        clearTimeout(saveTimer);
        removeDeprecatedSelectionNodes();
        pruneBrokenLinks();
        const cleanNodes = nodesWithoutRemovedTypes();
        const cleanIds = new Set(cleanNodes.map((node) => node.id));
        const storedNodes = await Promise.all(cleanNodes.map(serializeNodeForStorage));
        const activeProject = projects.find((project) => project.id === activeProjectId);
        if (activeProject) {
          activeProject.updatedAt = Date.now();
          activeProject.nodeCount = cleanNodes.length;
        }
        const storedState = {
          savedAt: Date.now(),
          nodes: storedNodes,
          links: links.filter((link) => cleanIds.has(link.from) && cleanIds.has(link.to)),
          nodeId,
          view,
          theme: document.body.classList.contains("dark-theme") ? "dark" : "light",
          collapsed: document.querySelector(".app").classList.contains("sidebar-collapsed")
        };
        try {
          writeCanvasStateToLocalStorage(storedState);
        } catch (storageError) {
          warnCanvasStorageSkipped(storageError);
        }
        await writeCanvasStateBackup(storedState);
        if (activeProject) saveProjects();
      } catch (error) {
        console.warn("Canvas save skipped", error);
        warnCanvasStorageSkipped(error);
      }
    }

    window.wandouSaveBeforeClose = async () => {
      clearTimeout(saveTimer);
      saveTimer = null;
      await saveCanvasState();
      return true;
    };

    function nodesWithoutRemovedTypes() {
      return nodes.filter((node) => node?.type !== "selection");
    }

    function removeDeprecatedSelectionNodes() {
      const removed = new Set(nodes.filter((node) => node?.type === "selection").map((node) => node.id));
      if (!removed.size) return false;
      nodes = nodes.filter((node) => !removed.has(node.id));
      links = links.filter((link) => !removed.has(link.from) && !removed.has(link.to));
      if (removed.has(selectedNodeId)) selectedNodeId = null;
      boxSelectedIds = boxSelectedIds.filter((id) => !removed.has(id));
      return true;
    }

    function pruneBrokenLinks() {
      const ids = new Set(nodes.map((node) => node.id));
      links = links.filter((link) => ids.has(link.from) && ids.has(link.to));
    }

    async function serializeNodeForStorage(node) {
      const copy = { ...node };
      copy.mediaUrl = await persistMediaValue(copy.mediaUrl);
      copy.previewUrl = await persistMediaValue(copy.previewUrl);
      copy.fullUrl = await persistMediaValue(copy.fullUrl);
      if (Array.isArray(copy.references)) {
        copy.references = await Promise.all(copy.references.map(async (item) => ({
          ...item,
          url: await persistMediaValue(item.url)
        })));
      }
      return copy;
    }

    function isLargeDataUrl(value, limit = 1200000) {
      return typeof value === "string" && value.startsWith("data:") && value.length > limit;
    }

    async function cleanLoadedNode(node) {
      if (!node) return;
      node.status = publicNodeStatus(node.status);
      if (node.type === "image" && node.status === "可上传参考图。") node.status = "";
      if (node.type === "result" && node.status === "生成结果会显示在这里。") node.status = "";
      if (node.status === "默认参考图，可替换上传。" || node.status === "演示结果，可下载或继续连接。") {
        node.mediaUrl = "";
        node.previewUrl = "";
        node.fullUrl = "";
        node.references = [];
        node.status = node.type === "result" ? "" : "可上传参考图。";
      }
      node.mediaUrl = await getLocalMedia(node.mediaUrl);
      node.previewUrl = await getLocalMedia(node.previewUrl);
      node.fullUrl = await getLocalMedia(node.fullUrl);
      await Promise.all([
        mirrorLargeLoadedMedia(node.mediaUrl),
        mirrorLargeLoadedMedia(node.previewUrl),
        mirrorLargeLoadedMedia(node.fullUrl)
      ]);
      if (Array.isArray(node.references)) {
        node.references = (await Promise.all(node.references.map(async (item) => ({
          ...item,
          url: await getLocalMedia(item.url)
        })))).filter((item) => item?.url);
        await Promise.all(node.references.map((item) => mirrorLargeLoadedMedia(item.url)));
      } else {
        node.references = [];
      }
    }

    async function loadCanvasState() {
      const raw = localStorage.getItem(projectCanvasStorageKey())
        || (activeProjectId === projects[0]?.id ? (localStorage.getItem(folderCanvasStorageKey()) || localStorage.getItem(canvasStorageKey)) : "");
      try {
        const state = raw ? JSON.parse(raw) : await readCanvasStateBackup();
        if (!state || !Array.isArray(state.nodes)) return false;
        isRestoring = true;
        nodes = Array.isArray(state.nodes) ? state.nodes : [];
        removeDeprecatedSelectionNodes();
        await Promise.all(nodes.map(cleanLoadedNode));
        links = Array.isArray(state.links) ? state.links : [];
        pruneBrokenLinks();
        nodeId = Number(state.nodeId) || 1;
        view = state.view || view;
        document.body.classList.toggle("dark-theme", readGlobalTheme() === "dark");
        document.querySelector(".app").classList.toggle("sidebar-collapsed", Boolean(state.collapsed));
      updateThemeLabel();
      render();
      syncDeletedResultsWithCanvas();
      isRestoring = false;
        return nodes.length > 0;
      } catch (error) {
        localStorage.removeItem(projectCanvasStorageKey());
        isRestoring = false;
        return false;
      }
    }

    function resultNodes(mode = galleryMode) {
      return nodes.filter((node) => {
        if (node.type !== "result" || !node.mediaUrl || node.pending) return false;
        return mode === "video"
          ? node.mediaType === "video" || node.title === "效果视频"
          : node.mediaType === "image" && node.title !== "效果视频";
      });
    }

    function deletedResultStorageKey() {
      return `${canvasStorageKey}:deleted-results:${currentFolderId || "default"}:${activeProjectId || "default"}`;
    }

    function loadDeletedResults() {
      try {
        const raw = localStorage.getItem(deletedResultStorageKey());
        deletedResults = raw ? JSON.parse(raw) : [];
      } catch (error) {
        deletedResults = [];
      }
      pruneDeletedResults();
    }

    function saveDeletedResults() {
      pruneDeletedResults(false);
      try {
        localStorage.setItem(deletedResultStorageKey(), JSON.stringify(deletedResults.slice(0, 120)));
      } catch (error) {
        try {
          deletedResults = deletedResults.slice(0, 40).map((item) => ({ ...item, fullUrl: "", references: [] }));
          localStorage.setItem(deletedResultStorageKey(), JSON.stringify(deletedResults));
        } catch (retryError) {
          console.warn("Deleted result archive skipped", retryError);
        }
      }
    }

    function pruneDeletedResults(save = true) {
      const maxAge = 24 * 60 * 60 * 1000;
      const now = Date.now();
      deletedResults = deletedResults.filter((item) => item?.deletedAt && now - item.deletedAt <= maxAge && (item.mediaUrl || item.previewUrl));
      if (save) {
        try {
          localStorage.setItem(deletedResultStorageKey(), JSON.stringify(deletedResults));
        } catch (error) {
          console.warn("Deleted result prune skipped", error);
        }
      }
    }

    function syncDeletedResultsWithCanvas() {
      loadDeletedResults();
      const liveIds = new Set(nodes.map((node) => node.id));
      const before = deletedResults.length;
      deletedResults = deletedResults.filter((item) => !item.originalId || !liveIds.has(item.originalId));
      if (deletedResults.length !== before) saveDeletedResults();
      if (galleryOverlay.classList.contains("open")) renderGallery();
    }

    function permanentlyDeleteGalleryNode(id) {
      if (galleryTab !== "deleted") return;
      loadDeletedResults();
      deletedResults = deletedResults.filter((item) => item.id !== id);
      saveDeletedResults();
      renderGallery();
      showToast("已永久删除");
    }

    async function archiveDeletedResult(node) {
      if (!node || node.type !== "result" || node.pending || node.mediaType !== "image" || !favoriteMediaUrl(node)) return;
      loadDeletedResults();
      const sourceUrl = favoriteMediaUrl(node);
      let preview = node.previewUrl || node.mediaUrl || sourceUrl;
      try {
        preview = await createPreviewImageUrl(sourceUrl, 420, Boolean(node.transparent));
      } catch (error) {
        preview = node.previewUrl || node.mediaUrl || sourceUrl;
      }
      const media = preview;
      const copy = {
        ...node,
        id: `deleted-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
        originalId: node.id,
        mediaUrl: media,
        previewUrl: preview,
        fullUrl: /^https?:\/\//i.test(node.fullUrl || "") ? node.fullUrl : "",
        references: [],
        deletedAt: Date.now()
      };
      deletedResults.unshift(copy);
      saveDeletedResults();
    }

    function openGallery(mode = "image") {
      galleryMode = mode;
      galleryTab = "canvas";
      loadDeletedResults();
      renderGallery();
      galleryOverlay.classList.add("open");
    }

    function closeGallery() {
      galleryOverlay.classList.remove("open");
      galleryMenu.classList.remove("open");
    }

    function renderGallery() {
      const sizeMap = { small: 130, medium: 190, large: 280 };
      galleryGrid.style.setProperty("--gallery-card", `${sizeMap[gallerySize] || 190}px`);
      loadDeletedResults();
      galleryOverlay.querySelectorAll("[data-gallery-tab]").forEach((button) => {
        button.classList.toggle("active", button.dataset.galleryTab === galleryTab);
      });
      deletedGalleryNote.classList.toggle("open", galleryTab === "deleted");
      const items = galleryTab === "deleted" ? deletedResults.filter((node) => {
        return galleryMode === "video"
          ? node.mediaType === "video" || node.title === "效果视频"
          : node.mediaType === "image" && node.title !== "效果视频";
      }) : resultNodes();
      galleryGrid.innerHTML = items.length ? items.map((node) => {
        const preview = node.mediaType === "video"
          ? `<video src="${favoriteMediaUrl(node)}" muted playsinline preload="metadata"></video>`
          : `<img src="${node.previewUrl || node.mediaUrl}" alt="${node.title || "效果图"}" loading="lazy" decoding="async">`;
        return `
          <article class="gallery-card" data-gallery-node="${node.id}" style="--item-ratio:${node.width || 1} / ${node.height || 1}">
            ${preview}
            <div class="meta-line">${resultMetaText(node)}</div>
            ${galleryTab === "deleted" ? `<div class="meta-line">删除时间：${new Date(node.deletedAt).toLocaleString()}</div>` : ""}
          </article>
        `;
      }).join("") : `<div class="hint">${galleryTab === "deleted" ? "暂无已删除效果图。" : `还没有生成${galleryMode === "video" ? "视频" : "效果图"}。`}</div>`;
    }

    function favoriteNodes(mode = favoriteMode) {
      return nodes.filter((node) => {
        if (!node.favorite) return false;
        if (mode === "image") return node.mediaType === "image" && (node.mediaUrl || normalizeReferences(node).length);
        return node.type === "keyword" || node.mediaType === "text" || Boolean(node.prompt || node.text);
      });
    }

    function openFavorites(mode = "image") {
      favoriteMode = mode;
      renderFavorites();
      favoriteOverlay.classList.add("open");
    }

    function closeFavorites() {
      favoriteOverlay.classList.remove("open");
    }

    function renderFavorites() {
      const items = favoriteNodes();
      favoriteOverlay.querySelectorAll("[data-favorite-tab]").forEach((button) => {
        button.classList.toggle("active", button.dataset.favoriteTab === favoriteMode);
      });
      const savedImages = favoriteMode === "image" ? imageFavoriteItems() : [];
      const nodeCards = items.map((node) => {
        if (favoriteMode === "image") {
          const ref = normalizeReferences(node)[0];
          const src = favoriteMediaUrl(node) || ref?.url || "";
          const media = node.mediaType === "video" ? `<video src="${src}" muted controls></video>` : `<img class="${node.transparent ? "transparent-preview" : ""}" src="${src}" alt="${node.title || "收藏图片"}">`;
          return `<article class="favorite-card" data-fav-node="${node.id}">${media}<div class="meta-line">${node.title || "收藏图片"}</div></article>`;
        }
        const texts = favoritePromptTexts(node);
        const text = texts.zh || texts.en || "暂无文字内容";
        return `<article class="favorite-card" data-fav-node="${node.id}"><div class="favorite-text">${escapeHtml(text)}</div><div class="meta-line">${node.title || "提示词收藏"}</div></article>`;

    async function copyTextToClipboard(text) {
      const value = text || "";
      if (!value.trim()) {
        showToast("当前没有可复制的文字");
        return;
      }
      try {
        await navigator.clipboard.writeText(value);
      } catch (error) {
        const textarea = document.createElement("textarea");
        textarea.value = value;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
      }
      showToast("复制成功");
    }

        name: node.title || `收藏参考图-${Date.now()}`,
        width: node.width,

      const baseX = Number.isFinite(node.x) ? node.x : screenToWorld(window.innerWidth / 2, window.innerHeight / 2).x;

      const reference = createNode("image", baseX + nodeWidth(node) + 90, baseY, {
        title: "参考图",
        mediaType: "image",
        mediaUrl: src,
        width: ref.width || node.width,

    async function copyImageToClipboard(node) {

      loadApiConfig();
      loadProjects();
      projectHubPinned = localStorage.getItem(projectHubPinStorageKey) === "1";
      updateProjectHubPinState();
      updateCurrentFolderName();
      applyGlobalTheme(readGlobalTheme());
