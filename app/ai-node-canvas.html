<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#030706">
  <meta name="description" content="豌豆AI节点画布，支持图片生成、视频生成、效果图下载和无限创建。">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./wandou-logo-latest.png" type="image/png">
  <link rel="shortcut icon" href="./wandou-logo-latest.png" type="image/png">
  <link rel="apple-touch-icon" href="./wandou-logo-latest.png">
  <title>豌豆AI节点画布</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #e4e7eb;
      --grid: rgba(80, 92, 104, 0.1);
      --panel: rgba(255, 255, 255, 0.72);
      --panel-soft: rgba(233, 255, 247, 0.52);
      --surface: #ffffff;
      --soft: rgba(67, 209, 59, 0.08);
      --border: rgba(91, 101, 96, 0.28);
      --text: #10211d;
      --muted: #55716a;
      --line: rgba(255, 255, 255, 0.7);
      --blue: #76b900;
      --blue-dark: #4c7f00;
      --blue-soft: rgba(118, 185, 0, 0.16);
      --danger: #d92d20;
      --shadow: 0 24px 70px rgba(15, 23, 42, 0.16);
      --radius: 12px;
    }

    body.dark-theme {
      color-scheme: dark;
      --bg: #030706;
      --grid: rgba(118, 185, 0, 0.12);
      --panel: rgba(38, 42, 40, 0.94);
      --panel-soft: rgba(45, 50, 48, 0.78);
      --surface: #1b1f1d;
      --soft: rgba(67, 209, 59, 0.1);
      --border: rgba(101, 112, 106, 0.42);
      --text: #eefcf8;
      --muted: #9fb8b2;
      --line: rgba(101, 111, 106, 0.28);
      --blue: #76b900;
      --blue-dark: #8bd600;
      --blue-soft: rgba(118, 185, 0, 0.18);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 8%, rgba(148, 163, 184, 0.32), transparent 32%),
        radial-gradient(circle at 86% 16%, rgba(203, 213, 225, 0.42), transparent 30%),
        radial-gradient(circle at 70% 92%, rgba(100, 116, 139, 0.18), transparent 34%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.42), rgba(226, 232, 240, 0.48)),
        var(--bg);
    }

    body.dark-theme {
      background:
        radial-gradient(circle at 24% 8%, rgba(118, 185, 0, 0.16), transparent 30%),
        radial-gradient(circle at 78% 80%, rgba(139, 214, 0, 0.11), transparent 34%),
        #030706;
    }

    body.no-select,
    body.no-select * {
      user-select: none !important;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button,
    .button-like {
      border: 1px solid transparent;
      border-radius: 8px;
      min-height: 36px;
      padding: 7px 11px;
      cursor: pointer;
      background: linear-gradient(135deg, #8bd600, #4c7f00);
      color: #fff;
      font-weight: 500;
    }

    button:hover,
    .button-like:hover {
      background: linear-gradient(135deg, #9bef12, #5f9700);
    }

    button:disabled,
    .button-like.disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .ghost {
      color: var(--text);
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      border-color: var(--line);
    }

    .ghost:hover {
      color: var(--blue);
      background: var(--blue-soft);
      border-color: rgba(118, 185, 0, 0.7);
    }

    .danger {
      color: var(--danger);
      background: #fff;
      border-color: #f2b8b5;
    }

    .delete-icon {
      width: 14px;
      height: 14px;
      display: block;
      color: currentColor;
    }

    .node .node-menu [data-delete] {
      color: #a32934;
      background: #fff7f7;
      border-color: rgba(163, 41, 52, 0.42);
      box-shadow: none;
      transition: color 150ms ease, background 150ms ease, border-color 150ms ease, box-shadow 150ms ease;
    }

    .node .node-menu [data-delete]:hover,
    .node .node-menu [data-delete]:focus-visible {
      color: #ff6b75;
      background: #5d1119;
      border-color: #8f2630;
      box-shadow: 0 0 0 2px rgba(143, 38, 48, 0.22), 0 8px 18px rgba(58, 5, 12, 0.34);
      outline: none;
    }

    .node .node-menu [data-delete]:active {
      color: #ff7d86;
      background: #3f090f;
      border-color: #741923;
      box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.42);
    }

    body.dark-theme .node .node-menu [data-delete] {
      color: #c94b55;
      background: #18090c;
      border-color: rgba(157, 48, 59, 0.48);
    }

    body.dark-theme .node .node-menu [data-delete]:hover,
    body.dark-theme .node .node-menu [data-delete]:focus-visible {
      color: #ff6b75;
      background: #5d1119;
      border-color: #9d303b;
    }

    body.dark-theme .node .node-menu [data-delete]:active {
      color: #ff7d86;
      background: #3f090f;
      border-color: #741923;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-columns: 300px 1fr;
    }

    .app.sidebar-collapsed {
      grid-template-columns: 0 1fr;
    }

    .sidebar {
      position: relative;
      background: linear-gradient(180deg, rgba(255,255,255,.82), rgba(231, 246, 241, .62));
      border-right: 1px solid rgba(255, 255, 255, 0.82);
      padding: 18px;
      overflow-y: auto;
      overflow-x: hidden;
      box-shadow: 18px 0 46px rgba(15, 23, 42, 0.1);
      backdrop-filter: blur(22px);
      z-index: 4;
      transition: transform 180ms ease, opacity 180ms ease;
    }

    body.dark-theme .sidebar {
      background: rgba(14, 18, 17, 0.72);
      border-right-color: rgba(77, 87, 82, 0.28);
    }

    .app.sidebar-collapsed .sidebar {
      transform: translateX(-100%);
      opacity: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .floating-sidebar-button {
      position: absolute;
      left: 14px;
      top: 18px;
      z-index: 30;
      display: none;
      pointer-events: auto;
    }

    .app.sidebar-collapsed .floating-sidebar-button {
      display: inline-grid;
    }

    .project-hub {
      position: absolute;
      right: 40px;
      top: 58px;
      z-index: 32;
      width: min(180px, calc(100vw - 40px));
      pointer-events: auto;
    }

    .project-hub-button {
      width: 100%;
      height: 32px;
      min-height: 32px;
      padding: 0 18px;
      border-radius: 999px;
      color: #76b900;
      background: #050706;
      border-color: rgba(118, 185, 0, 0.82);
      box-shadow: none;
      font-size: 12px;
    }

    .project-hub-button:hover {
      color: #8bd600;
      background: #050706;
      border-color: rgba(139, 214, 0, 0.95);
    }

    body:not(.dark-theme) .project-hub-button {
      color: #256d00;
      background: #fff;
      border-color: rgba(37, 109, 0, 0.8);
      box-shadow: none;
    }

    body:not(.dark-theme) .project-hub-button:hover {
      color: #1f5f00;
      background: #fff;
      border-color: rgba(37, 109, 0, 0.95);
    }

    .project-hub-menu {
      display: none;
      gap: 8px;
      margin-top: 8px;
      padding: 8px;
      width: 296px;
      min-width: 296px;
      max-width: 296px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 14px;
      background: rgba(17, 20, 19, 0.94);
      box-shadow: none;
      backdrop-filter: blur(18px);
    }

    body:not(.dark-theme) .project-hub-menu {
      background: rgba(255, 255, 255, 0.92);
      border-color: rgba(15, 23, 42, 0.12);
    }

    .project-hub.open .project-hub-menu {
      display: grid;
    }

    .project-hub.pinned .project-hub-menu {
      border-color: rgba(118, 185, 0, 0.52);
      box-shadow: none;
    }

    .project-hub.open .project-hub-button {
      box-shadow: none;
    }

    .project-menu-actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 34px;
      column-gap: 8px;
      row-gap: 4px;
      align-items: center;
    }

    .project-transfer-actions {
      grid-row: 2;
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .project-transfer-actions .wide-button {
      margin-top: 0;
      min-height: 32px;
      padding: 0 10px;
      font-size: 12px;
    }

    body.node-canvas-page::before,
    body.node-canvas-page::after,
    .canvas-wrap::before,
    .canvas-wrap::after {
      content: none !important;
      display: none !important;
    }

    body.node-canvas-page .topbar,
    body.node-canvas-page.dark-theme .topbar {
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
      -webkit-backdrop-filter: none !important;
      backdrop-filter: none !important;
    }

    #newProjectButton {
      grid-row: 1;
      grid-column: 1;
      width: 100%;
      justify-self: center;
      margin-top: 0;
      height: 36px;
      min-height: 36px;
      padding: 0 8px;
      color: #fff;
      background: linear-gradient(135deg, #58dc45, #18b932);
      border-color: #20bd35;
      box-shadow: none;
      font-size: 12px;
    }

    #newProjectButton:hover {
      background: linear-gradient(135deg, #65e751, #20c63b);
      border-color: #18ad2d;
    }

    #pinProjectHubButton {
      grid-row: 1;
      grid-column: 2;
      width: 34px;
      min-height: 32px;
      padding: 0;
      border-radius: 11px;
      color: #8c9490;
      border-color: #a2a9a5;
      background: transparent;
      display: inline-grid;
      place-items: center;
      font-size: 16px;
      line-height: 1;
      filter: none;
    }

    #pinProjectHubButton svg { width:18px; height:18px; fill:currentColor; transition:color .18s ease, transform .18s ease; }

    body:not(.dark-theme) #pinProjectHubButton {
      color: #929995;
      border-color: #a2a9a5;
      filter: none;
    }

    #pinProjectHubButton.active {
      color: #ef3f37 !important;
      background: transparent;
      border-color: #ef3f37 !important;
      box-shadow: none;
      filter: none;
    }

    #pinProjectHubButton.active svg { transform:rotate(-8deg); }

    .project-list {
      display: grid;
      gap: 1px;
      max-height: min(520px, calc(100vh - 190px));
      overflow-y: auto;
      padding-left: 6px;
      padding-right: 1px;
      scrollbar-width: thin;
    }

    .project-item {
      position: relative;
      display: grid;
      grid-template-columns: 21px minmax(0, 1fr);
      align-items: center;
      gap: 4px;
      padding: 1px 2px;
      width: 100%;
      box-sizing: border-box;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.18);
      cursor: pointer;
    }

    body:not(.dark-theme) .project-item {
      background: rgba(255, 255, 255, 0.42);
      border-color: rgba(15, 23, 42, 0.1);
    }

    .project-item.active {
      border-color: rgba(118, 185, 0, 0.72);
      box-shadow: inset 0 0 0 1px rgba(118, 185, 0, 0.36);
    }

    .project-badge {
      position: relative;
      width: 21px;
      height: 21px;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 8px;
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      overflow: hidden;
      padding: 0;
      min-height: 21px;
    }

    .project-badge:hover {
      filter: brightness(1.08);
    }

    .project-name-row {
      display: flex;
      align-items: center;
      gap: 3px;
      min-width: 0;
    }

    .project-delete-confirm {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr 34px 34px;
      align-items: center;
      gap: 5px;
      min-height: 28px;
      padding: 3px 4px;
      border-radius: 7px;
      background: rgba(240, 68, 56, 0.1);
      color: #fecaca;
      font-size: 11px;
      font-weight: 800;
    }

    body:not(.dark-theme) .project-delete-confirm {
      color: #991b1b;
      background: rgba(239, 68, 68, 0.1);
    }

    .project-delete-confirm button {
      min-height: 22px;
      padding: 0 8px;
      border-radius: 6px;
      font-size: 11px;
    }

    .project-delete-confirm [data-project-delete-yes] {
      color: #fff;
      background: #dc2626;
      border-color: rgba(220, 38, 38, 0.9);
    }

    .project-number {
      color: var(--muted);
      font-weight: 700;
      flex: 0 0 auto;
    }

    .project-name-input {
      min-height: 21px;
      padding: 1px 4px;
      border-radius: 6px;
      font-size: 11px;
      min-width: 0;
      width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .project-name-input[readonly] {
      cursor: pointer;
      caret-color: transparent;
    }

    .project-edit-button,
    .project-delete-button {
      width: 20px;
      min-height: 21px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      border-radius: 6px;
      color: var(--muted);
      background: transparent;
      border-color: rgba(255, 255, 255, 0.12);
      flex: 0 0 auto;
    }

    .project-edit-button svg,
    .project-delete-button svg {
      width: 11px;
      height: 11px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
    }

    .project-edit-button:hover {
      color: #76b900;
      border-color: rgba(118, 185, 0, 0.68);
    }

    .project-delete-button {
      color: #fca5a5;
    }

    .project-delete-button:hover {
      color: #fff;
      background: #dc2626;
      border-color: rgba(220, 38, 38, 0.9);
    }

    .project-focus-backdrop {
      position: absolute;
      inset: 0;
      z-index: 7;
      display: none;
      pointer-events: none;
      background: rgba(2, 6, 4, 0.18);
      backdrop-filter: blur(5px);
    }

    body:not(.dark-theme) .project-focus-backdrop {
      background: rgba(255, 255, 255, 0.22);
    }

    .project-hub.open:not(.pinned) + .project-focus-backdrop {
      display: block;
    }

    .color-palette {
      position: absolute;
      left: 0;
      top: calc(100% + 6px);
      z-index: 20;
      display: none;
      grid-template-columns: repeat(10, 18px);
      gap: 6px;
      padding: 8px;
      border: 1px solid #d9dfdc;
      border-radius: 12px;
      background: rgba(16, 18, 18, 0.96);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.36);
    }

    .project-item.palette-open .color-palette {
      display: grid;
    }

    .color-swatch {
      width: 18px;
      min-height: 18px;
      padding: 0;
      border-radius: 5px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      background: var(--swatch);
    }

    .floating-sidebar-button.sidebar-collapse-tab {
      display: none;
      left: 10px;
      top: 32px;
      transform: none;
    }

    .app.sidebar-collapsed .floating-sidebar-button.sidebar-collapse-tab {
      display: grid;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .brand-mark {
      width: 54px;
      height: 54px;
      min-width: 54px;
      aspect-ratio: 1 / 1;
      border-radius: 0;
      display: grid;
      place-items: center;
      color: #111;
      background: transparent;
      border: 0;
      box-shadow: none;
    }

    body.dark-theme .brand-mark {
      color: #fff;
      background: transparent;
      border: 0;
    }

    .brand-mark img,
    .brand-mark svg {
      width: 52px;
      height: 52px;
      display: block;
      object-fit: contain;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      letter-spacing: 0;
    }

    h1 {
      font-size: 17px;
      line-height: 1.2;
      font-weight: 700;
    }

    .brand-subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.4;
    }

    .tool-group {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 12px;
      background: rgba(255, 255, 255, 0.56);
      backdrop-filter: blur(18px);
    }

    body.dark-theme .tool-group {
      color: #fff;
      background: #050706;
      border-color: rgba(255, 255, 255, 0.18);
    }

    body.dark-theme .tool-group .tool-title {
      color: #fff;
    }

    body.dark-theme .tool-group .hint {
      color: rgba(255, 255, 255, 0.68);
    }

    .tool-title {
      margin-bottom: 10px;
      font-size: 12px;
      font-weight: 600;
    }

    .sidebar-controls {
      position: fixed;
      left: 284px;
      top: 32px;
      transform: none;
      z-index: 35;
    }

    .app.sidebar-collapsed .sidebar-controls {
      display: none;
    }

    .sidebar-collapse-tab {
      width: 34px;
      height: 34px;
      min-height: 34px;
      padding: 0;
      border-radius: 10px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, #8bd600 0%, #76b900 100%);
      border-color: rgba(118, 185, 0, 0.58);
      font-size: 22px;
      line-height: 1;
      box-shadow: 0 12px 30px rgba(0, 185, 129, 0.22);
    }

    .floating-sidebar-button.sidebar-collapse-tab {
      display: none;
    }

    .app.sidebar-collapsed .floating-sidebar-button.sidebar-collapse-tab {
      display: grid;
    }

    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .button-grid button {
      background: #fff;
      color: #111827;
      border-color: rgba(17, 24, 39, 0.46);
      font-size: 12px;
    }

    .button-grid button[data-add-node="png"],
    .button-grid button[data-add-node="upscale"] {
      white-space: nowrap;
    }

    .button-grid button span {
      display: inline;
      line-height: 1.35;
    }

    body.dark-theme .button-grid button {
      background: #1b1f1d;
      color: rgba(255, 255, 255, 0.92);
      border-color: rgba(92, 102, 97, 0.34);
    }

    body.dark-theme .sidebar-collapse-tab,
    .sidebar-collapse-tab:hover {
      color: #fff;
      background: linear-gradient(135deg, #8bd600 0%, #76b900 100%);
      border-color: rgba(118, 185, 0, 0.58);
    }

    .button-grid button:hover {
      color: #76b900;
      background: #fff;
      border-color: rgba(118, 185, 0, 0.72);
    }

    body.dark-theme .button-grid button:hover {
      color: #8bd600;
      background: #242927;
      border-color: rgba(118, 185, 0, 0.72);
    }

    body.dark-theme .png-upload-preview,
    body.dark-theme .transparent-workflow .preview.png-upload-preview {
      background: #1a1e1c;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }

    label {
      color: #344054;
      font-size: 11px;
      font-weight: 500;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid rgba(15, 23, 42, 0.12);
      border-radius: 8px;
      background: rgba(232, 238, 240, 0.82);
      color: var(--text);
      padding: 9px 10px;
      outline: none;
    }

    body.dark-theme input,
    body.dark-theme textarea,
    body.dark-theme select {
      background: #1b1f1d;
      color: #fff;
      border-color: rgba(91, 101, 96, 0.34);
    }

    body.dark-theme select option {
      color: #fff;
      background: #090d0c;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
      line-height: 1.5;
    }

    .prompt-textarea,
    .prompt-output textarea {
      min-height: 124px;
      overflow: hidden;
      resize: vertical;
      font-size: 15px;
      line-height: 1.68;
      scrollbar-width: thin;
    }

    .prompt-output textarea {
      min-height: 112px;
      font-size: 13px;
    }

    .prompt-textarea::-webkit-resizer,
    .prompt-output textarea::-webkit-resizer {
      background:
        linear-gradient(135deg, transparent 52%, rgba(118, 185, 0, 0.95) 54%, rgba(118, 185, 0, 0.95) 62%, transparent 64%),
        linear-gradient(135deg, transparent 66%, rgba(118, 185, 0, 0.65) 68%, rgba(118, 185, 0, 0.65) 76%, transparent 78%);
      border-radius: 0 0 8px 0;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.13);
    }

    .hint {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.5;
    }

    .canvas-wrap {
      position: relative;
      overflow: hidden;
      cursor: grab;
      background:
        radial-gradient(circle, rgba(82, 190, 55, 0.24) 1px, transparent 1.4px),
        #e4e7e8;
      background-size: 24px 24px;
      contain: layout paint;
      isolation: isolate;
    }

    #canvas {
      will-change: auto;
      transform-origin: 0 0;
      backface-visibility: hidden;
    }

    body.dark-theme .canvas-wrap {
      background:
        radial-gradient(circle, rgba(118, 185, 0, 0.16) 1px, transparent 1.35px),
        #111514;

    /* Wandou typography system: Source Han Sans first, with local CJK fallbacks. */
    :root {
      --wd-font-ui: "Source Han Sans SC", "Noto Sans CJK SC", "Noto Sans SC", "Microsoft YaHei", "PingFang SC", sans-serif;
      --wd-type-title: 15px;
      --wd-type-body: 13px;
      --wd-type-control: 12.5px;
      --wd-type-label: 11.5px;
      --wd-type-caption: 11px;
      --wd-weight-regular: 400;
      --wd-weight-medium: 450;

    body,
    button,
    input,
    textarea,
    select {
      font-family: var(--wd-font-ui);
      font-synthesis: none;
    }

    .node-title {
      font-family: var(--wd-font-ui);
      font-size: var(--wd-type-title);
      font-weight: var(--wd-weight-regular);

    .node-menu .mini,
    .node-menu button {
      font-family: var(--wd-font-ui);
      font-size: 12px;
      font-weight: var(--wd-weight-regular);
      letter-spacing: 0;

    .node-body,
    .node-body input,
    .node-body textarea,
    .node-body select,
    .node-body button,
    .node-body .button-like {
      font-family: var(--wd-font-ui);
    }

    .prompt-textarea,
    .prompt-refine-output,
    .prompt-output textarea {
      font-size: var(--wd-type-body);
      font-weight: var(--wd-weight-regular);
      line-height: 1.65;
      letter-spacing: 0.005em;
    }

    .form-row > label,
    .form-row label,
    .prompt-output-head label,
    .prompt-output label {
      font-size: var(--wd-type-label);
      font-weight: var(--wd-weight-regular);
      line-height: 1.4;
      letter-spacing: 0.01em;
    }

    .node-select-trigger,
    .node-select-option,
    .count-option,
    .choice-option,
    .output-option,
    .result-actions .button-like,
    .wide-button {
      font-family: var(--wd-font-ui);
      font-size: var(--wd-type-control);
      font-weight: var(--wd-weight-regular);
      line-height: 1.35;
      letter-spacing: 0;
    }

    .node-select-trigger,
    .node-select-option.active,
    .count-option.active,
    .choice-option.active,
    .output-option.active {
      font-weight: var(--wd-weight-medium);
    }

    .placeholder-art,
    .reference-empty-visual {
      font-family: var(--wd-font-ui);
      font-weight: var(--wd-weight-regular);
    }

    .placeholder-art strong,
    .reference-empty-visual strong {
      font-size: 16px;
      font-weight: var(--wd-weight-medium);
      line-height: 1.35;
      letter-spacing: 0;
    }

    .placeholder-art span,
    .reference-empty-visual span {
      font-size: 12px;
      font-weight: var(--wd-weight-regular);
      line-height: 1.5;
    }

    .placeholder-art small,
    .reference-empty-visual small,
    .ratio-readout,
    .status {
      font-family: var(--wd-font-ui);
      font-size: var(--wd-type-caption);
      font-weight: var(--wd-weight-regular);
      line-height: 1.5;
      letter-spacing: 0;
    }

    .topbar-actions,
    .topbar-actions button,
    .zoom-pill,
    .folder-name-pill,
    .project-hub,
    .project-hub button,
    .project-name-input {
      font-family: var(--wd-font-ui);
      font-size: 12.5px;
      font-weight: var(--wd-weight-regular);
      letter-spacing: 0;
    }

    .project-hub-button,
    #newProjectButton,
    .project-name-input {
      font-weight: var(--wd-weight-medium);
    }

    .prompt-tools .mini,
    .prompt-output-head .mini {
      font-size: 11px;
      font-weight: var(--wd-weight-regular);
    }

    .upscale-ratio-copy {
      display: grid;
      gap: 2px;
    }

    .upscale-ratio-copy strong {
      font-family: var(--wd-font-ui);
      font-size: 12.5px;
      font-weight: var(--wd-weight-regular);
      line-height: 1.3;
      letter-spacing: 0;
    }

    .upscale-ratio-copy .ratio-readout {
      margin-top: 0;
      font-size: 10.5px;
      line-height: 1.35;
    }

    @media (max-width:760px) { .prompt-manager-modal { grid-template-columns:1fr; } .prompt-tags { display:none; } .prompt-manager-list { grid-template-columns:1fr; } }

    function autoSaveSupported() {
      return Boolean(window.wandouShell?.chooseSaveDirectory) || (typeof window.showDirectoryPicker === "function" && typeof window.indexedDB !== "undefined");
    }

    function openAutoSaveDb() {
      if (!window.indexedDB) return Promise.resolve(null);
      return new Promise((resolve) => {
        const request = indexedDB.open(autoSaveDbName, 1);
        request.onupgradeneeded = () => {
          if (!request.result.objectStoreNames.contains(autoSaveStoreName)) request.result.createObjectStore(autoSaveStoreName);
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => resolve(null);
        request.onblocked = () => resolve(null);
      });
    }

    async function storeAutoSaveDirectoryHandle(handle) {
      const db = await openAutoSaveDb();
      if (!db) return;
      await new Promise((resolve) => {
        const tx = db.transaction(autoSaveStoreName, "readwrite");
        tx.objectStore(autoSaveStoreName).put(handle, autoSaveHandleKey);
        tx.oncomplete = resolve;
        tx.onerror = resolve;
      });
      db.close();
    }

    async function loadAutoSaveDirectoryHandle() {
      if (autoSaveDirectoryLoaded) return nativeAutoSaveDirectory || autoSaveDirectoryHandle;
      autoSaveDirectoryLoaded = true;
      if (window.wandouShell?.getSaveDirectory) {
        nativeAutoSaveDirectory = await window.wandouShell.getSaveDirectory();
        if (!nativeAutoSaveDirectory?.directory) nativeAutoSaveDirectory = null;
        updateAutoSaveDirectoryButton();
        return nativeAutoSaveDirectory;
      }
      if (!window.indexedDB) return null;
      const db = await openAutoSaveDb();
      if (!db) return null;
      autoSaveDirectoryHandle = await new Promise((resolve) => {
        const tx = db.transaction(autoSaveStoreName, "readonly");
        const request = tx.objectStore(autoSaveStoreName).get(autoSaveHandleKey);
        request.onsuccess = () => resolve(request.result || null);
        request.onerror = () => resolve(null);
      });
      db.close();
      updateAutoSaveDirectoryButton();
      return autoSaveDirectoryHandle;
    }

    async function hasAutoSaveDirectoryPermission(handle, requestWrite) {
      if (!handle) return false;
      const options = { mode: "readwrite" };
      if (typeof handle.queryPermission === "function" && await handle.queryPermission(options) === "granted") return true;
      if (requestWrite && typeof handle.requestPermission === "function") {
        return await handle.requestPermission(options) === "granted";
      }
      return !handle.queryPermission;
    }

    function updateAutoSaveDirectoryButton() {
      const button = document.getElementById("autoSaveDirectoryButton");
      if (!button) return;
      const selectedDirectory = nativeAutoSaveDirectory || autoSaveDirectoryHandle;
      const isMissing = !selectedDirectory;
      button.classList.toggle("required-warning", isMissing);
      button.setAttribute("aria-invalid", isMissing ? "true" : "false");
      if (!autoSaveSupported()) {
        button.textContent = "⚠ 需要支持目录保存";
        button.setAttribute("aria-label", "当前浏览器不支持目录保存");
        button.disabled = false;
        button.title = "\u5f53\u524d\u6d4f\u89c8\u5668\u4e0d\u652f\u6301\u81ea\u52a8\u4fdd\u5b58\uff0c\u8bf7\u4f7f\u7528\u4e0b\u8f7d\u6309\u94ae";
        return;
      }
      const directoryName = selectedDirectory?.name?.trim() || "";
      button.textContent = directoryName || (selectedDirectory ? "已设置保存位置" : "⚠ 必须设置保存位置");
      button.setAttribute(
        "aria-label",
        directoryName ? `当前保存位置：${directoryName}，点击更改` : "必须设置保存位置"
      );
      button.disabled = false;
      button.title = directoryName
        ? `当前保存位置：${directoryName}\n点击可更改保存位置`
        : "选择生成图片自动保存的本地文件夹";
    }

    async function chooseAutoSaveDirectory() {
      if (!autoSaveSupported()) {
        showToast("\u5f53\u524d\u6d4f\u89c8\u5668\u4e0d\u652f\u6301\u81ea\u52a8\u4fdd\u5b58\uff0c\u8bf7\u4f7f\u7528\u4e0b\u8f7d\u6309\u94ae");
        updateAutoSaveDirectoryButton();
        return;
      }
      try {
        if (window.wandouShell?.chooseSaveDirectory) {
          const selected = await window.wandouShell.chooseSaveDirectory();
          if (!selected || selected.canceled) return;
          nativeAutoSaveDirectory = selected;
          autoSaveDirectoryHandle = null;
          updateAutoSaveDirectoryButton();
          showToast(`已选择保存位置：${selected.name || selected.directory}`);
          return;
        }
        const handle = await window.showDirectoryPicker({ mode: "readwrite" });
        if (!/^[A-Za-z0-9._ -]+$/.test(handle.name || "")) {
          showToast("保存文件夹名称只能使用英文字母、数字、空格、横线或下划线");
          return;
        }
        if (!await hasAutoSaveDirectoryPermission(handle, true)) {
          showToast("\u672a\u83b7\u5f97\u5199\u5165\u6743\u9650\uff0c\u8bf7\u91cd\u65b0\u9009\u62e9\u6587\u4ef6\u5939");
          return;
        }
        autoSaveDirectoryHandle = handle;
        await storeAutoSaveDirectoryHandle(handle);
        updateAutoSaveDirectoryButton();
        showToast(`\u5df2\u9009\u62e9\u4fdd\u5b58\u4f4d\u7f6e\uff1a${handle.name}`);

      }
    }

        return;
      }
      localStorage.setItem("aiCanvasApi", JSON.stringify({
        url: defaultApiBaseUrl(),
        key
      }));
      localStorage.setItem("ai-tools-api-config", JSON.stringify({
        key,
        savedAt: new Date().toISOString()
      }));

    function setSettingsOpen(open) {
      if (settingsBackdrop.parentElement !== document.body) document.body.appendChild(settingsBackdrop);

    function loadApiConfig() {
      const raw = localStorage.getItem("aiCanvasApi");
      if (!raw) {
        loadGlobalApiConfig();
        if (apiKeyInput.value.trim()) return;
        apiUrlInput.value = defaultApiBaseUrl();
        return;
      }
      try {
        const config = JSON.parse(raw);
        apiUrlInput.value = defaultApiBaseUrl();
        apiKeyInput.value = config.key || "";
        if (!apiKeyInput.value.trim()) loadGlobalApiConfig();
      } catch (error) {
        localStorage.removeItem("aiCanvasApi");
        loadGlobalApiConfig();
        if (apiKeyInput.value.trim()) return;
        apiUrlInput.value = defaultApiBaseUrl();
      }
    }

    function loadGlobalApiConfig() {
      try {
        const globalConfig = JSON.parse(localStorage.getItem("ai-tools-api-config") || "{}");
        apiUrlInput.value = defaultApiBaseUrl();
        apiKeyInput.value = globalConfig.key || "";
        if (apiKeyInput.value.trim()) {
          localStorage.setItem("aiCanvasApi", JSON.stringify({
            url: defaultApiBaseUrl(),
            key: apiKeyInput.value.trim()
          }));
        }
      } catch (error) {
        apiUrlInput.value = defaultApiBaseUrl();
      }

    function defaultProject() {
      const now = Date.now();
      return { id: `project-${now}`, name: "项目01", color: "#76b900", createdAt: now, updatedAt: now, favorite: false };
    }

    function loadProjects() {
      try {
        projects = JSON.parse(localStorage.getItem(projectListStorageKey) || "[]");
      } catch (error) {
        projects = [];
      }
      if (!Array.isArray(projects) || !projects.length) projects = [defaultProject()];
      projects.forEach((project, index) => {
        if (project.name === "默认项目" || /^文件夹\s*\d+$/i.test(project.name || "") || /^文件夹\d+$/i.test(project.name || "")) project.name = `项目${String(index + 1).padStart(2, "0")}`;
        if (!project.createdAt) project.createdAt = Date.now() - (projects.length - index) * 1000;
        if (!project.updatedAt) project.updatedAt = project.createdAt;
        if (typeof project.favorite !== "boolean") project.favorite = false;
        delete project.deleteConfirm;
      });
      activeProjectId = localStorage.getItem(activeProjectStorageKey) || projects[0].id;
      if (!projects.some((project) => project.id === activeProjectId)) activeProjectId = projects[0].id;
      saveProjects();
      renderProjects();
    }

    function saveProjects() {
      localStorage.setItem(projectListStorageKey, JSON.stringify(projects));
      localStorage.setItem(activeProjectStorageKey, activeProjectId);
    }

            setTimeout(() => {
              const stillOpen = projects.find((item) => item.id === project.id && item.paletteOpen);

    async function switchProject(projectId) {
      if (!projectId || projectId === activeProjectId) return;
      saveCanvasState();
      activeProjectId = projectId;
      saveProjects();
      nodes = [];
      links = [];
      nodeId = 1;
      selectedNodeId = null;
      historyStack = [];
      redoStack = [];
      if (!(await loadCanvasState())) seedCanvas();
      renderProjects();
      showToast("已切换项目");
    }

    async function deleteProject(projectId) {
      if (projects.length <= 1) {
        showToast("至少保留一个项目");
        return;
      }
      const index = projects.findIndex((project) => project.id === projectId);
      if (index < 0) return;
      localStorage.removeItem(projectCanvasStorageKey(projectId));
      projects.splice(index, 1);
      if (activeProjectId === projectId) {
        activeProjectId = projects[Math.max(0, index - 1)]?.id || projects[0].id;
        nodes = [];
        links = [];
        nodeId = 1;
        selectedNodeId = null;
        historyStack = [];
        redoStack = [];
        if (!(await loadCanvasState())) seedCanvas();
      }
      saveProjects();
      renderProjects();
      showToast("项目已删除");
    }

    function createProject() {
      if (projects.length >= 30) {
        showToast("最多只能新建 30 个项目");
        projectHub.classList.add("open");
        return;
      }
      saveCanvasState();
      const next = projects.length + 1;

        name: `项目${String(next).padStart(2, "0")}`,
        color: projectColorPalette[(next - 1) % projectColorPalette.length],

        updatedAt: Date.now(),

      };
